<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="#fdf6e3" stroke="#5d4037" stroke-width="3"/>
  <!-- Grid lines -->
  <line x1="20" y1="90" x2="100" y2="90" stroke="#d7ccc8" stroke-width="1.5"/>
  <line x1="20" y1="75" x2="100" y2="75" stroke="#d7ccc8" stroke-width="1"/>
  <line x1="20" y1="60" x2="100" y2="60" stroke="#d7ccc8" stroke-width="1"/>
  <line x1="20" y1="45" x2="100" y2="45" stroke="#d7ccc8" stroke-width="1"/>
  <!-- Trend line -->
  <polyline points="25,85 50,65 75,50 95,25" fill="none" stroke="#5d4037" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Upward arrow -->
  <polygon points="95,25 95,38 105,30" fill="#a1887f"/>
  <!-- Data points -->
  <circle cx="25" cy="85" r="4" fill="#8d6e63"/>
  <circle cx="50" cy="65" r="4" fill="#8d6e63"/>
  <circle cx="75" cy="50" r="4" fill="#8d6e63"/>
  <circle cx="95" cy="25" r="5" fill="#5d4037"/>
</svg>