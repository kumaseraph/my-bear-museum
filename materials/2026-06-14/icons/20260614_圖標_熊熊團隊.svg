    <linearGradient id="bearGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5A2B"/>
      <stop offset="100%" style="stop-color:#D2691E"/>
    </linearGradient>
    <linearGradient id="bearGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
