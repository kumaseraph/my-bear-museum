                checkIn: "20260602-03",
                collectionNo: 9,
                desc: "我是雪地裡的霸氣領袖！大步走在銀白世界裡，寒風只是我的背景音樂，帥氣就是我的代名詞！❄️🐻ʕ •ᴥ•ʔ",
                img: "gallery/comfyui/Flux2-Klein_00005_.png"
            }
        ];

        const openDate = "2026-06-03";
        const featuredBear = {
            name: "開館紀念熊",
            date: openDate,
            checkIn: "20260603-01",
            collectionNo: 1,
            desc: "我是博物館的第一位居民！很高興能在這裡跟大家見面，希望以後每天都能看到很多很多好朋友來拜訪我喔 ʕっ•ᴥ•ʔっ",
            img: "https://img.magnific.com/free-vector/adorable-baby-bear-illustration_1308-181868.jpg?semt=ais_test_b&w=740&q=80"
        };

        // 取得今天日期字串 (台灣時區)
        function getTodayStr() {
            const now = new Date();
            const utc8 = new Date(now.getTime() + 8 * 60 * 60 * 1000);
            return utc8.toISOString().split('T')[0];
        }

        // Render today's new bears
        function renderTodayBears() {
            const grid = document.getElementById('todayBears');
            const today = getTodayStr();
            const todayBearsList = bears.filter(b => b.date === today);
            
            document.getElementById('todayCount').textContent = todayBearsList.length + ' 隻';
            document.getElementById('totalCount').textContent = (bears.length + 1) + ' 隻';
            document.getElementById('openDate').textContent = openDate;

            todayBearsList.forEach((bear) => {
                const thumb = document.createElement('div');
                thumb.className = 'bear-thumb';
                thumb.onclick = () => openBearModalByBear(bear);
                thumb.innerHTML = `
                    <div class="thumb-circle"><img src="${bear.img}" alt="${bear.name}"></div>
                    <div class="thumb-no">No.${String(bear.collectionNo).padStart(4, '0')}</div>
                    <div class="thumb-name">${bear.name}</div>
                `;
                grid.appendChild(thumb);
            });
        }

        // Render yearbook
        function renderYearbook() {
            const grid = document.getElementById('yearbook');
            const monthCounts = {};

            bears.forEach(bear => {
                const month = bear.date.substring(0, 7);
                monthCounts[month] = (monthCounts[month] || 0) + 1;
            });

            // Add opening month
            const openMonth = openDate.substring(0, 7);
            monthCounts[openMonth] = (monthCounts[openMonth] || 0) + 1;

            // Add "全部" item first
            const allItem = document.createElement('div');
            allItem.className = 'yearbook-item';
            allItem.innerHTML = `
                <div class="month">全部</div>
                <div class="count">（${bears.length + 1}）</div>
            `;
            allItem.onclick = () => openAllBearsModal();
            grid.appendChild(allItem);

            Object.keys(monthCounts).sort().reverse().forEach(month => {
                const item = document.createElement('div');
                item.className = 'yearbook-item';
                const [year, m] = month.split('-');
                item.innerHTML = `
                    <div class="month">${year}年${parseInt(m)}月</div>
                    <div class="count">（${monthCounts[month]}）</div>
                `;
                item.onclick = () => openMonthModal(month);
                grid.appendChild(item);
            });
        }

        // Open all bears modal
        function openAllBearsModal() {
            document.getElementById('monthModalTitle').textContent = '全部館藏';

            const grid = document.getElementById('monthModalGrid');
            grid.innerHTML = '';

            // Add opening bear first
            const openingThumb = document.createElement('div');
            openingThumb.className = 'bear-thumb';
            openingThumb.onclick = () => { closeMonthModal(); openBearModal(0); };
            openingThumb.innerHTML = `
                <div class="thumb-circle"><img src="${featuredBear.img}" alt="${featuredBear.name}"></div>
                <div class="thumb-no">No.${String(featuredBear.collectionNo).padStart(4, '0')}</div>
                <div class="thumb-name">${featuredBear.name}</div>
            `;
            grid.appendChild(openingThumb);

            // Sort all bears by collectionNo ascending
            const sortedBears = [...bears].sort((a, b) => a.collectionNo - b.collectionNo);

            sortedBears.forEach((bear) => {
                const thumb = document.createElement('div');
                thumb.className = 'bear-thumb';
                thumb.onclick = () => { closeMonthModal(); openBearModalByBear(bear); };
                thumb.innerHTML = `
                    <div class="thumb-circle"><img src="${bear.img}" alt="${bear.name}"></div>
                    <div class="thumb-no">No.${String(bear.collectionNo).padStart(4, '0')}</div>
                    <div class="thumb-name">${bear.name}</div>
                `;
                grid.appendChild(thumb);
            });

            document.getElementById('monthModal').classList.add('active');
        }

        // Open month browser modal
        function openMonthModal(month) {
            const [year, m] = month.split('-');
            document.getElementById('monthModalTitle').textContent = `${year}年${parseInt(m)}月 館藏`;
            
            const grid = document.getElementById('monthModalGrid');
            grid.innerHTML = '';
            
            // Filter bears by month
            const monthBears = bears.filter(b => b.date.substring(0, 7) === month);
            
            // Sort by collectionNo ascending
            monthBears.sort((a, b) => a.collectionNo - b.collectionNo);
            
            // Add opening bear if it's the opening month
            if (month === openDate.substring(0, 7)) {
                const thumb = document.createElement('div');
                thumb.className = 'bear-thumb';
                thumb.onclick = () => { closeMonthModal(); openBearModal(0); };
                thumb.innerHTML = `
                    <div class="thumb-circle"><img src="${featuredBear.img}" alt="${featuredBear.name}"></div>
                    <div class="thumb-no">No.${String(featuredBear.collectionNo).padStart(4, '0')}</div>
                `;
                grid.appendChild(thumb);
            }
            
            // Add month bears
            monthBears.forEach((bear) => {
                const thumb = document.createElement('div');
                thumb.className = 'bear-thumb';
                thumb.onclick = () => { closeMonthModal(); openBearModalByBear(bear); };
                thumb.innerHTML = `
                    <div class="thumb-circle"><img src="${bear.img}" alt="${bear.name}"></div>
                    <div class="thumb-no">No.${String(bear.collectionNo).padStart(4, '0')}</div>
                    <div class="thumb-name">${bear.name}</div>
                `;
                grid.appendChild(thumb);
            });
            
            document.getElementById('monthModal').classList.add('active');
        }

        // Close month modal
        function closeMonthModal(event) {
            if (!event || event.target.classList.contains('month-modal') || 
                event.target.classList.contains('month-modal-close')) {
                document.getElementById('monthModal').classList.remove('active');
            }
        }

        // Open lightbox
        function openLightbox() {
            const imgSrc = document.getElementById('modalImg').src;
            document.getElementById('lightboxFullImg').src = imgSrc;
            document.getElementById('imageLightbox').classList.add('active');
        }

        // Close lightbox
        function closeLightbox() {
            document.getElementById('imageLightbox').classList.remove('active');
        }

        // Open bear modal by bear object
        function openBearModalByBear(bear) {
            document.getElementById('modalImg').src = bear.img;
            document.getElementById('modalName').textContent = bear.name;
            document.getElementById('modalMeta').innerHTML = `
                館藏編號：No.${String(bear.collectionNo).padStart(4, '0')}<br>
                入住編號：${bear.checkIn}<br>
                入住日期：${bear.date}
            `;
            document.getElementById('modalQuote').textContent = '「' + bear.desc + '」';
            document.getElementById('bearModal').classList.add('active');
        }

        // Open bear modal
        function openBearModal(index) {
            let bear;
            if (index === 0) {
                bear = featuredBear;
            } else {
                const today = getTodayStr();
                const todayBearsList = bears.filter(b => b.date === today);
                bear = todayBearsList[index - 1] || bears[index - 1];
            }
            
            document.getElementById('modalImg').src = bear.img;
            document.getElementById('modalName').textContent = bear.name;
            document.getElementById('modalMeta').innerHTML = `
                館藏編號：No.${String(bear.collectionNo).padStart(4, '0')}<br>
                入住編號：${bear.checkIn}<br>
                入住日期：${bear.date}
            `;
            document.getElementById('modalQuote').textContent = '「' + bear.desc + '」';
            document.getElementById('bearModal').classList.add('active');
        }

        // Close modal
        function closeModal(event) {
            if (event.target.classList.contains('bear-modal') || 
                event.target.classList.contains('bear-modal-close') ||
                event.target.classList.contains('bear-modal-back')) {
                document.getElementById('bearModal').classList.remove('active');
            }
        }

        // ESC to close
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('bearModal').classList.remove('active');
            }
        });

        // Featured bears for carousel (add bears by collectionNo or use featuredBear for opening)
        // Empty array = single mode showing only opening bear
        // Add bear objects to show multiple featured bears
        const featuredBearsConfig = [
            { ref: "10", name: "波波主廚", collectionNo: 10, img: "bears/2026-06-05/橘熊_水彩_20260605_01.png" },
            { ref: "11", name: "星晶跑者", collectionNo: 11, img: "bears/2026-06-05/藍熊_3D_20260605_02.png" },
            { ref: "12", name: "甜甜多拿滋", collectionNo: 12, img: "bears/2026-06-05/粉熊_奇幻_20260605_03.png" },
            { ref: "13", name: "逐浪金魂", collectionNo: 13, img: "bears/2026-06-05/白熊_油畫_20260605_04.png" },
            { ref: "14", name: "翠綠英雄", collectionNo: 14, img: "bears/2026-06-05/綠熊_像素_20260605_05.png" }
        ];

        let carouselIndex = 0;
        let carouselTotal = 0;

        function renderFeaturedCarousel() {
            const track = document.getElementById('carouselTrack');
            const dots = document.getElementById('carouselDots');
            const prev = document.getElementById('carouselPrev');
            const next = document.getElementById('carouselNext');
            
            // If no featured config, show single opening bear
            if (featuredBearsConfig.length === 0) {
                document.getElementById('featuredCarousel').innerHTML = `
                    <div class="featured-thumb" onclick="openBearModal(0)" style="display: inline-flex; flex-direction: column; align-items: center; cursor: pointer; padding: 20px;">
                        <div class="thumb-circle" style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 4px solid #d4a574; box-shadow: 0 6px 15px rgba(93, 64, 55, 0.2);">
                            <img src="${featuredBear.img}" alt="${featuredBear.name}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div class="thumb-no" style="margin-top: 10px; font-size: 1rem; font-weight: bold; color: #5d4037;">No.${String(featuredBear.collectionNo).padStart(4, '0')}</div>
                    </div>
                `;
                return;
            }

            // Multi mode - render carousel
            carouselTotal = featuredBearsConfig.length;
            track.innerHTML = '';
            dots.innerHTML = '';

            featuredBearsConfig.forEach((bear, i) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.innerHTML = `
                    <div class="featured-thumb" onclick="openBearModalByRef('${bear.ref}')" style="display: inline-flex; flex-direction: column; align-items: center; cursor: pointer;">
                        <div class="thumb-circle" style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 4px solid #d4a574; box-shadow: 0 6px 15px rgba(93, 64, 55, 0.2);">
                            <img src="${bear.img}" alt="${bear.name}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div class="thumb-no" style="margin-top: 10px; font-size: 1rem; font-weight: bold; color: #5d4037;">No.${String(bear.collectionNo).padStart(4, '0')}</div>
                    </div>
                `;
                track.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                dots.appendChild(dot);
            });

            // Hide nav if only 1 item
            if (carouselTotal <= 1) {
                prev.style.display = 'none';
                next.style.display = 'none';
            } else {
                prev.style.display = '';
                next.style.display = '';
            }
        }

        function goToSlide(index) {
            carouselIndex = index;
            const track = document.getElementById('carouselTrack');
            track.style.transform = `translateX(-${index * 100}%)`;
            document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function nextSlide() {
            carouselIndex = (carouselIndex + 1) % carouselTotal;
            goToSlide(carouselIndex);
        }

        function prevSlide() {
            carouselIndex = (carouselIndex - 1 + carouselTotal) % carouselTotal;
            goToSlide(carouselIndex);
        }

        // Open bear modal by reference string
        function openBearModalByRef(ref) {
            if (ref === 'opening') {
                openBearModal(0);
            } else {
                const bear = bears.find(b => b.collectionNo === parseInt(ref));
                if (bear) openBearModalByBear(bear);
            }
        }

        // Initialize
        renderFeaturedCarousel();
        renderTodayBears();
        renderYearbook();

        // Carousel navigation
        document.getElementById('carouselPrev').addEventListener('click', (e) => {
            e.stopPropagation();
            prevSlide();
        });
        document.getElementById('carouselNext').addEventListener('click', (e) => {
            e.stopPropagation();
            nextSlide();
        });

        // Touch swipe support
        let touchStartX = 0;
        let touchEndX = 0;
        const carouselEl = document.getElementById('featuredCarousel');
        if (carouselEl) {
            carouselEl.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            carouselEl.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                if (touchStartX - touchEndX > 50) nextSlide();
                if (touchEndX - touchStartX > 50) prevSlide();
            }, { passive: true });
        }
    </script>
</body>
</html>
