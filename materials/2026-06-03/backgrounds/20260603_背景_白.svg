<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Gradient Background - Clean White Theme -->
  <defs>
    <linearGradient id="white-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5F9FC;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#white-bg)"/>
  <line x1="0" y1="0" x2="200" y2="0" stroke="#4A90D9" stroke-width="2" opacity="0.3"/>
  <line x1="600" y1="600" x2="800" y2="600" stroke="#4A90D9" stroke-width="2" opacity="0.3"/>
  <rect x="30" y="30" width="50" height="50" rx="8" fill="#4A90D9" opacity="0.05"/>
  <rect x="720" y="520" width="50" height="50" rx="8" fill="#4A90D9" opacity="0.05"/>
</svg>