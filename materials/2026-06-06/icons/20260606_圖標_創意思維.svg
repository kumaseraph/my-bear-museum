<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- 創意思維 — 燈泡 + 齒輪 -->
  <style>
    .line { fill: none; stroke: #2c3e50; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <!-- 燈泡本體 -->
  <path d="M50 18 C32 18 22 30 22 42 C22 52 30 58 35 64 L35 72 L65 72 L65 64 C70 58 78 52 78 42 C78 30 68 18 50 18Z" class="line"/>
  <!-- 燈泡底部 -->
  <line x1="35" y1="72" x2="65" y2="72" class="line"/>
  <line x1="38" y1="77" x2="62" y2="77" class="line"/>
  <!-- 齒輪在右側 -->
  <circle cx="75" cy="78" r="9" class="line"/>
  <line x1="75" y1="67" x2="75" y2="72" class="line"/>
  <line x1="75" y1="84" x2="75" y2="89" class="line"/>
  <line x1="64" y1="78" x2="69" y2="78" class="line"/>
  <line x1="81" y1="78" x2="86" y2="78" class="line"/>
  <!-- 光線 -->
  <line x1="50" y1="10" x2="50" y2="15" class="line"/>
  <line x1="30" y1="22" x2="26" y2="18" class="line"/>
  <line x1="70" y1="22" x2="74" y2="18" class="line"/>
</svg>