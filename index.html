<!--
    版號記錄 (Version History)
    ========================
    v1.0 - 初始版本：卡片網格排列
    v2.0 - 改為按鈕縮圖 + 彈出視窗顯示熊熊詳情 + 圖片放大預覽
    v3.0 - 銀河星空背景 + 五彩泡泡邊框 + 左右導航按鈕 + 甜甜圈導航置於下方
    v3.1 - 導航按鈕美化 + SVG箭頭 + 放在下方
    v4.0 - 全新博物館體驗：館藏編號制度 + 圓形館藏徽章 + 熊熊年鑑 + 詳細頁面
    v4.1 - 加入燈箱放大功能 + 熊熊年鑑點擊可看當月館藏
    v4.2 - 今日主角支援單一/輪播模式
    v4.3 - 今日新入住顯示當日熊熊 + 年鑑按編號排序 + 熊熊名稱顯示
    v4.4 - 導航列樣式更新：棕背景白文字 + hover/active 效果調整
    v4.5 - 導航列移至頁面最上方，取代 header 成為第一順位
    v4.7 - 重新調整館藏編號：2026-06-04 → No.0002-0006, 2026-06-05 → No.0007-0011
    v4.8 - 星星按鈕+localStorage、手機漢堡選單、lazy loading、5秒自動輪播、資訊卡圓形設計、熊熊標題按鈕、金色質感紀念熊
    v5.2 - 熊熊年鑑雙分類展開功能
    v5.6 - 熊熊年鑑雙分類展開功能
    v5.7 - 修復「今日新入住」顯示問題、年鑑accordion改為可展開/收合、按月份/按類別按鈕改為圓角長條
    v5.8 - 移除熊熊年鑑「全部」分類按鈕（使用者不需要此功能）
-->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 熊熊線上博物館 v5.8</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', Tahoma, Geneva, Verdana, sans-serif;
            background: #fdf8f3;
            color: #5d4037;
            min-height: 100vh;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 20px;
        }
        header h1 {
            font-size: 2rem;
            color: #5d4037;
            margin-bottom: 10px;
        }
        header .subtitle {
            font-size: 1rem;
            color: #8b7355;
        }

        /* Navigation */
        nav {
            background-color: #a1887f;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            flex-wrap: wrap;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 15px;
            transition: background 0.3s;
        }
        nav a:hover { background-color: #8d6e63; }
        nav a.active { background-color: #5d4037; }

        /* Info Cards - Circular Badge Style */
        .info-cards {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .info-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .info-card .circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a574, #c49a6c);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(93, 64, 55, 0.2);
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }
        .info-card .label {
            font-size: 0.8rem;
            color: #8b7355;
            text-align: center;
        }
        .info-footer {
            text-align: center;
            font-size: 0.95rem;
            color: #8b7355;
            margin-bottom: 30px;
            padding: 10px;
        }

        /* Section */
        .section {
            max-width: 800px;
            margin: 0 auto 40px;
            padding: 0 20px;
        }
        .section-title {
            font-size: 1.2rem;
            color: #5d4037;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Bear Thumbnails Grid */
        .bear-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Bear Thumbnail Button */
        .bear-thumb {
            width: 80px;
            height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: transform 0.3s;
            flex-shrink: 0;
            position: relative;
        }
        .bear-thumb::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffb6c1, #add8e6, #e6e6fa, #ffd1a4, #98fb98);
            background-size: 300% 300%;
            z-index: 0;
            animation: bubble-border 4s ease infinite;
        }
        @keyframes bubble-border {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .bear-thumb:hover {
            transform: scale(1.1);
        }
        /* Star button (top-left of bear thumb) */
        .star-btn {
            position: absolute;
            top: 0;
            left: 2px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: rgba(255,255,255,0.85);
            border: 2px solid #d4a574;
            color: #d4a574;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .star-btn:hover {
            background: #d4a574;
            color: #fff;
            transform: scale(1.15);
        }
        .star-btn.starred {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-color: #d4a574;
            color: #fff;
            box-shadow: 0 0 8px rgba(255, 165, 0, 0.5);
        }
        .star-btn.starred:hover {
            background: linear-gradient(135deg, #FFA500, #FF8C00);
        }
        .bear-thumb .thumb-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #e8dcc8;
            box-shadow: 0 4px 10px rgba(93, 64, 55, 0.15);
            background: #fff;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .bear-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .bear-thumb .thumb-no {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #8b7355;
        }
        .bear-thumb .thumb-name {
            font-size: 0.75rem;
            color: #a08060;
            margin-top: 2px;
        }

        /* Featured Section */
        .featured-section {
            background: linear-gradient(135deg, #fdf6e3, #fff);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(93, 64, 55, 0.1);
            margin-bottom: 40px;
        }
        .featured-thumb {
            width: 120px;
            height: 150px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
            flex-shrink: 0;
        }
        .featured-thumb:hover {
            transform: scale(1.05);
        }
        .featured-thumb .thumb-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #d4a574;
            box-shadow: 0 6px 15px rgba(93, 64, 55, 0.2), inset 0 0 20px rgba(255, 215, 0, 0.3);
            flex-shrink: 0;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
            background-size: 200% 200%;
            animation: gold-shimmer 3s ease infinite;
        }
        @keyframes gold-shimmer {
            0%, 100% { background-position: 0% 50%; box-shadow: 0 6px 15px rgba(93, 64, 55, 0.2), inset 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { background-position: 100% 50%; box-shadow: 0 6px 20px rgba(255, 165, 0, 0.4), inset 0 0 30px rgba(255, 215, 0, 0.5); }
        }
        .featured-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .featured-thumb .thumb-no {
            margin-top: 10px;
            font-size: 1rem;
            font-weight: bold;
            color: #5d4037;
        }
        .thumb-name {
            font-size: 0.8rem;
            color: #a08060;
            margin-top: 2px;
        }

        /* Yearbook */
        .yearbook-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .yearbook-item {
            background: #fff;
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(93, 64, 55, 0.1);
            transition: all 0.3s;
        }
        .yearbook-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(93, 64, 55, 0.15);
        }
        .yearbook-item .month {
            font-size: 0.9rem;
            color: #8b7355;
        }
        .yearbook-item .count {
            font-size: 1.3rem;
            font-weight: bold;
            color: #5d4037;
        }

        /* Yearbook Accordion */
        .yearbook-accordion {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .yearbook-section {
            text-align: center;
        }
        .yearbook-section-toggle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #d4a574, #c49a6c);
            border: none;
            border-radius: 25px;
            color: #fff;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(93, 64, 55, 0.2);
            transition: all 0.3s;
            min-width: 200px;
        }
        .yearbook-section-toggle:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(93, 64, 55, 0.3);
            background: linear-gradient(135deg, #e0b085, #d4a574);
        }
        .yearbook-section-toggle .arrow {
            transition: transform 0.3s;
            font-size: 0.8rem;
        }
        .yearbook-section-toggle.expanded .arrow {
            transform: rotate(180deg);
        }
        .yearbook-items {
            display: none;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.5);
            border-radius: 15px;
        }
        .yearbook-items.show {
            display: flex;
        }
        .yearbook-item {
            background: #fff;
            border-radius: 12px;
            padding: 12px 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(93, 64, 55, 0.1);
            transition: all 0.3s;
            min-width: 120px;
        }
        .yearbook-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(93, 64, 55, 0.15);
        }
        .yearbook-item .label {
            font-size: 0.9rem;
            color: #8b7355;
        }
        .yearbook-item .count {
            font-size: 1.3rem;
            font-weight: bold;
            color: #5d4037;
        }

        /* Search Box */
        .search-box {
            max-width: 400px;
            margin: 0 auto 20px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #d7ccc8;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            background: #fff;
            color: #5d4037;
            box-sizing: border-box;
        }
        .search-box input:focus {
            border-color: #d4a574;
        }
        .search-box input::placeholder {
            color: #a08060;
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(93, 64, 55, 0.2);
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .search-results.show {
            display: block;
        }
        .search-result-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0ebe3;
            transition: background 0.2s;
        }
        .search-result-item:hover {
            background: #fdf6e3;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }

        /* Category Filter */
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .category-btn {
            padding: 8px 16px;
            border: 2px solid #d4a574;
            border-radius: 20px;
            background: #fff;
            color: #8b7355;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .category-btn:hover {
            background: #fdf6e3;
            transform: translateY(-2px);
        }
        .category-btn.active {
            background: linear-gradient(135deg, #d4a574, #c49a6c);
            color: #fff;
            border-color: #b8956a;
            box-shadow: 0 3px 10px rgba(93, 64, 55, 0.2);
        }
        .category-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-top: 8px;
        }
        .category-badge.奇幻 { background: #e6e6fa; color: #6b5b95; }
        .category-badge.悠閒 { background: #ffe4e1; color: #d87093; }
        .category-badge.領袖 { background: #b0e0e6; color: #4682b4; }
        .category-badge.水彩 { background: #ffd1dc; color: #db7093; }
        .category-badge[class*="3D"] { background: #98fb98; color: #228b22; }
        .category-badge.油畫 { background: #ffdead; color: #daa520; }
        .category-badge.像素 { background: #afeeee; color: #008b8b; }
        .category-badge.紀念 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #8b6914; }

        /* Carousel for featured bears */
        .carousel-container {
            position: relative;
            max-width: 400px;
            margin: 0 auto;
            overflow: hidden;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.5s ease;
        }
        .carousel-slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }
        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d4c4b0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .carousel-dot.active {
            background: #d4a574;
            transform: scale(1.2);
        }
        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: #d4a574;
            cursor: pointer;
            padding: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            z-index: 10;
            transition: all 0.3s;
        }
        .carousel-nav:hover {
            background: #d4a574;
            color: white;
        }
        .carousel-prev { left: 10px; }
        .carousel-next { right: 10px; }

        /* Bear Detail Modal */
        .bear-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(93, 64, 55, 0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .bear-modal.active {
            display: flex;
        }
        .bear-modal-content {
            background: #fff;
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(93, 64, 55, 0.3);
            position: relative;
        }
        .bear-modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            color: #8b7355;
            cursor: pointer;
        }
        .bear-modal-image {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 5px solid #e8dcc8;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .bear-modal-image:hover {
            transform: scale(1.05);
        }
        .bear-modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Lightbox for full image preview */
        .image-lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .image-lightbox.active {
            display: flex;
        }
        .image-lightbox img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 8px;
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Month Browser Modal */
        .month-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(93, 64, 55, 0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .month-modal.active {
            display: flex;
        }
        .month-modal-content {
            background: #fff;
            border-radius: 24px;
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(93, 64, 55, 0.3);
            position: relative;
        }
        /* Month Modal Navigation Buttons */
        .month-modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a574, #c49a6c);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(93, 64, 55, 0.3);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .month-modal-nav:hover {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            transform: translateY(-50%) scale(1.1);
        }
        .month-modal-nav.prev { left: 10px; }
        .month-modal-nav.next { right: 10px; }
        .month-modal-counter {
            text-align: center;
            font-size: 0.9rem;
            color: #8b7355;
            margin-bottom: 15px;
        }

        .month-modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            color: #8b7355;
            cursor: pointer;
        }
        .month-modal-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #5d4037;
            margin-bottom: 20px;
            text-align: center;
        }
        .month-modal-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .bear-modal-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #5d4037;
            margin-bottom: 10px;
        }
        .bear-modal-meta {
            font-size: 0.9rem;
            color: #8b7355;
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .bear-modal-quote {
            background: #fdf6e3;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .bear-modal-quote .quote-label {
            font-size: 0.85rem;
            color: #8b7355;
            margin-bottom: 8px;
        }
        .bear-modal-quote .quote-text {
            font-size: 1rem;
            color: #5d4037;
            font-style: italic;
        }
        .bear-modal-back {
            background: #d4a574;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .bear-modal-back:hover {
            background: #b8956a;
        }

        /* Mobile Navigation - Hamburger Menu */
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px 15px;
        }
        
        /* Responsive */
        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            .info-card { min-width: 120px; padding: 15px 20px; }
            .info-card .value { font-size: 1.2rem; }
            .bear-thumb { width: 70px; height: 90px; }
            .bear-thumb .thumb-circle { width: 60px; height: 60px; }
            .featured-thumb { width: 100px; height: 130px; }
            .featured-thumb .thumb-circle { width: 80px; height: 80px; }
            
            /* Mobile nav - hamburger */

                slide.innerHTML = `
                    <div class="featured-thumb" onclick="openBearModal(${bear.collectionNo})" style="display: inline-flex; flex-direction: column; align-items: center; cursor: pointer;">
                        <div class="thumb-circle" style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 4px solid #d4a574; box-shadow: 0 6px 15px rgba(93, 64, 55, 0.2);">
                            <img src="${bear.img}" alt="${bear.name}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                        <div class="thumb-no" style="margin-top: 10px; font-size: 1rem; font-weight: bold; color: #5d4037;">No.${String(bear.collectionNo).padStart(4, '0')}</div>
                    </div>
                `;
                track.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                dots.appendChild(dot);
            });

            // Hide nav if only 1 item
            if (carouselTotal <= 1) {
                prev.style.display = 'none';
                next.style.display = 'none';
            } else {
                prev.style.display = '';
                next.style.display = '';
            }
        }

        function goToSlide(index) {
            carouselIndex = index;
            const track = document.getElementById('carouselTrack');
            track.style.transform = `translateX(-${index * 100}%)`;
            document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function nextSlide() {
            carouselIndex = (carouselIndex + 1) % carouselTotal;
            goToSlide(carouselIndex);
        }

        function prevSlide() {
            carouselIndex = (carouselIndex - 1 + carouselTotal) % carouselTotal;
            goToSlide(carouselIndex);
        }

        // Open bear modal by reference string
        function openBearModalByRef(ref) {
            if (ref === 'opening') {
                openBearModal(0);
            } else {
                const bear = bears.find(b => b.collectionNo === parseInt(ref));
                if (bear) openBearModalByBear(bear);
            }
        }

        // Mobile nav toggle
        function toggleNav() {
            document.getElementById('mainNav').classList.toggle('expanded');
        }

        // Initialize
        renderFeaturedCarousel();
        renderTodayBears();
        renderYearbook();
        updateStarButtons();
        renderCategoryFilter();
        // Initialize display with current category filter
        if (currentCategory === '全部') {
            filterByCategory('全部');
        }

        // Search functionality
        function handleSearch(query) {
            const resultsDiv = document.getElementById('searchResults');
            if (!query || query.length < 1) {
                resultsDiv.classList.remove('show');
                return;
            }
            const lowerQuery = query.toLowerCase();
            const results = bears.filter(b =>
                String(b.collectionNo).padStart(4, '0').includes(query) ||
                b.name.toLowerCase().includes(lowerQuery) ||
                b.date.includes(query)
            );
            // Also include opening bear
            if (String(featuredBear.collectionNo).padStart(4, '0').includes(query) ||
                featuredBear.name.toLowerCase().includes(lowerQuery)) {
                results.unshift(featuredBear);
            }
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="search-result-item">找不到符合的熊熊</div>';
            } else {
                resultsDiv.innerHTML = results.map(b => `
                    <div class="search-result-item" onclick="openBearModalByRef('${b.collectionNo === featuredBear.collectionNo ? 'opening' : b.collectionNo}'); document.getElementById('searchResults').classList.remove('show'); document.getElementById('searchInput').value = '';">
                        <strong>No.${String(b.collectionNo).padStart(4, '0')}</strong> ${b.name}
                    </div>
                `).join('');
            }
            resultsDiv.classList.add('show');
        }

        // Month modal navigation
        let currentMonthBears = [];
        let currentMonthIndex = 0;

        function openMonthModal(month) {
            const [year, m] = month.split('-');
            document.getElementById('monthModalTitle').textContent = `${year}年${parseInt(m)}月 館藏`;
            
            const grid = document.getElementById('monthModalGrid');
            grid.innerHTML = '';
            
            // Filter bears by month
            currentMonthBears = bears.filter(b => b.date.substring(0, 7) === month);
            
            // Sort by collectionNo ascending
            currentMonthBears.sort((a, b) => a.collectionNo - b.collectionNo);
            
            // Add opening bear if it's the opening month
            if (month === openDate.substring(0, 7)) {
                currentMonthBears.unshift(featuredBear);
            }
            currentMonthIndex = 0;
            
            renderMonthModalContent();
            document.getElementById('monthModal').classList.add('active');
        }

        function renderMonthModalContent() {
            const grid = document.getElementById('monthModalGrid');
            grid.innerHTML = '';
            const bear = currentMonthBears[currentMonthIndex];
            if (!bear) return;
            
            const thumb = document.createElement('div');
            thumb.className = 'bear-thumb featured-month-bear';
            thumb.style.cssText = 'width: 150px; height: 180px;';
            thumb.onclick = () => { closeMonthModal(); openBearModalByRef(bear.collectionNo === featuredBear.collectionNo ? 'opening' : bear.collectionNo); };
            thumb.innerHTML = `
                <button class="star-btn" data-no="${bear.collectionNo}" onclick="toggleStar(${bear.collectionNo}, event)">${starredBears.includes(bear.collectionNo) ? '★' : '☆'}</button>
                <div class="thumb-circle" style="width: 120px; height: 120px;"><img src="${bear.img}" alt="${bear.name}" loading="lazy"></div>
                <div class="thumb-no">No.${String(bear.collectionNo).padStart(4, '0')}</div>
                <div class="thumb-name">${bear.name}</div>
            `;
            grid.appendChild(thumb);
            
            // Update counter
            const counter = document.getElementById('monthModalCounter');
            if (counter) counter.textContent = `${currentMonthIndex + 1} / ${currentMonthBears.length}`;
            
            // Update nav buttons
            updateMonthNavButtons();
        }

        function updateMonthNavButtons() {
            const prevBtn = document.getElementById('monthModalPrev');
            const nextBtn = document.getElementById('monthModalNext');
            if (prevBtn) prevBtn.style.opacity = currentMonthIndex > 0 ? '1' : '0.3';
            if (nextBtn) nextBtn.style.opacity = currentMonthIndex < currentMonthBears.length - 1 ? '1' : '0.3';
        }

        function prevMonthBear() {
            if (currentMonthIndex > 0) {
                currentMonthIndex--;
                renderMonthModalContent();
            }
        }

        function nextMonthBear() {
            if (currentMonthIndex < currentMonthBears.length - 1) {
                currentMonthIndex++;
                renderMonthModalContent();
            }
        }

        // Keyboard navigation for month modal
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('monthModal');
            if (modal.classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevMonthBear();
                if (e.key === 'ArrowRight') nextMonthBear();
                if (e.key === 'Escape') closeMonthModal({target: document.getElementById('monthModal')});
            }
        });

        // Close search when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-box')) {
                document.getElementById('searchResults').classList.remove('show');
            }
        });

        // Carousel navigation
        document.getElementById('carouselPrev').addEventListener('click', (e) => {
            e.stopPropagation();
            prevSlide();
        });
        document.getElementById('carouselNext').addEventListener('click', (e) => {
            e.stopPropagation();
            nextSlide();
        });

        // Auto slide every 5 seconds
        let autoSlideInterval = setInterval(nextSlide, 5000);

        // Touch swipe support
        let touchStartX = 0;
        let touchEndX = 0;
        const carouselEl = document.getElementById('featuredCarousel');
        if (carouselEl) {
            carouselEl.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            carouselEl.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                if (touchStartX - touchEndX > 50) nextSlide();
                if (touchEndX - touchStartX > 50) prevSlide();
            }, { passive: true });
        }
    </script>
</body>
</html>
