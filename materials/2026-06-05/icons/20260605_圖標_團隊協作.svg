<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 團隊協作 icon - 可愛風格的攜手合作圖標 -->
  <!-- 風格：Monoline 線性風格、統一 2px 線寬 -->
  <g fill="none" stroke="#5d4037" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 三個人物輪廓 -->
    <!-- 中間人物 -->
    <circle cx="32" cy="16" r="6"/>
    <path d="M20,56 C20,42 26,36 32,36 C38,36 44,42 44,56"/>
    <!-- 左邊人物 -->
    <circle cx="14" cy="20" r="5"/>
    <path d="M4,50 C4,38 8,34 14,34 C20,34 24,38 24,50"/>
    <!-- 右邊人物 -->
    <circle cx="50" cy="20" r="5"/>
    <path d="M40,50 C40,38 44,34 50,34 C56,34 60,38 60,50"/>
    <!-- 連接線（代表協作） -->
    <line x1="20" y1="38" x2="28" y2="32"/>
    <line x1="44" y1="38" x2="36" y2="32"/>
  </g>
</svg>