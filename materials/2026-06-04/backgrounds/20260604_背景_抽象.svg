<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Abstract artistic background - Natural Style -->
  <defs>
    <linearGradient id="naturalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f0e6;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#e8dcc8;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#d4c4a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9b896;stop-opacity:1" />
    </linearGradient>
    <pattern id="organicPattern" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="40" fill="none" stroke="#bcaaa4" stroke-width="0.5" opacity="0.4"/>
      <circle cx="50" cy="50" r="30" fill="none" stroke="#a1887f" stroke-width="0.3" opacity="0.3"/>
      <circle cx="50" cy="50" r="20" fill="#8d6e63" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#naturalGrad)"/>
  <rect width="800" height="600" fill="url(#organicPattern)"/>
  <!-- Organic flowing shapes -->
  <ellipse cx="650" cy="150" rx="200" ry="100" fill="#a1887f" opacity="0.15"/>
  <ellipse cx="150" cy="450" rx="180" ry="120" fill="#8d6e63" opacity="0.12"/>
  <ellipse cx="700" cy="500" rx="150" ry="80" fill="#bcaaa4" opacity="0.1"/>
  <!-- Leaf-like decorations -->
  <path d="M100 100 Q150 50 200 100 Q150 150 100 100" fill="#8d6e63" opacity="0.2"/>
  <path d="M600 500 Q650 450 700 500 Q650 550 600 500" fill="#a1887f" opacity="0.15"/>
</svg>