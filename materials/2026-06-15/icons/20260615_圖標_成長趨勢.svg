<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#8B7355"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#1a1a2e" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 背景圓 -->
  <circle cx="60" cy="60" r="55" fill="#FDF8F0" stroke="url(#goldGrad)" stroke-width="3"/>
  
  <!-- 上升箭頭 -->
  <g filter="url(#shadow)">
    <path d="M60,95 L60,35 M40,55 L60,35 L80,55" 
          stroke="url(#goldGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- 基準線 -->
  <line x1="30" y1="85" x2="90" y2="85" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  
  <!-- 數據點 -->
  <circle cx="40" cy="75" r="5" fill="url(#goldGrad)"/>
  <circle cx="60" cy="55" r="5" fill="url(#goldGrad)"/>
  <circle cx="80" cy="45" r="5" fill="url(#goldGrad)"/>
</svg>