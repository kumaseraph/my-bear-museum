<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="決策流程">
  <title>決策流程</title>
  <desc>決策分支流程圖：問題 → 分析 → 評估 →結論</desc>
  <defs>
    <linearGradient id="decGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D7DD2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="800" height="400" fill="#F8FBFF"/>
  <!-- 連接線 -菱形分支 -->
  <path d="M180 100 L180 160" stroke="#B8D4E8" stroke-width="2"/>
  <path d="M180 240 L180 300" stroke="#B8D4E8" stroke-width="2"/>
  <path d="M300 200 L390 200" stroke="#B8D4E8" stroke-width="2"/>
  <path d="M500 200 L590 200" stroke="#B8D4E8" stroke-width="2"/>
  <!-- 起始節點 -->
  <ellipse cx="90" cy="100" rx="60" ry="30" fill="#2D7DD2"/>
  <text x="90" y="105" text-anchor="middle" fill="white" font-size="14" font-weight="bold">問題</text>
  <!-- 判斷菱形 -->
  <polygon points="180,160 240,200 180,240 120,200" fill="url(#decGrad)"/>
  <text x="180" y="195" text-anchor="middle" fill="white" font-size="11" font-weight="bold">分析</text>
  <text x="180" y="210" text-anchor="middle" fill="white" font-size="10">?</text>
  <!-- 左分支：Yes -->
  <rect x="240" y="170" width="60" height="60" rx="8" fill="#27AE60"/>
  <text x="270" y="200" text-anchor="middle" fill="white" font-size="12" font-weight="bold">可行</text>
  <text x="270" y="215" text-anchor="middle" fill="white" font-size="10">Yes</text>
  <!-- 右分支：No -->
  <rect x="120" y="170" width="60" height="60" rx="8" fill="#E74C3C"/>
  <text x="150" y="200" text-anchor="middle" fill="white" font-size="12" font-weight="bold">需調整</text>
  <text x="150" y="215" text-anchor="middle" fill="white" font-size="10">No</text>
  <!-- 評估節點 -->
  <rect x="390" y="170" width="110" height="60" rx="10" fill="#8E44AD"/>
  <text x="445" y="195" text-anchor="middle" fill="white" font-size="13" font-weight="bold">評估</text>
  <text x="445" y="212" text-anchor="middle" fill="white" font-size="11">風險/效益</text>
  <!-- 結論節點 -->
  <ellipse cx="680" cy="200" rx="70" ry="35" fill="#27AE60"/>
  <text x="680" y="195" text-anchor="middle" fill="white" font-size="14" font-weight="bold">結論</text>
  <text x="680" y="212" text-anchor="middle" fill="white" font-size="11">執行方案</text>
  <!-- 標題 -->
  <text x="400" y="50" text-anchor="middle" fill="#2D7DD2" font-size="24" font-weight="bold">決策流程圖</text>
</svg>