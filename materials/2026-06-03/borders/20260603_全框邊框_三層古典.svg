<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="classicGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5d4037;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8d6e63;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 古典外框 -->
  <rect x="8" y="8" width="384" height="284" fill="none" stroke="url(#classicGrad)" stroke-width="4"/>
  <!-- 內框雙線 -->
  <rect x="16" y="16" width="368" height="268" fill="none" stroke="#a1887f" stroke-width="1.5"/>
  <rect x="20" y="20" width="360" height="260" fill="none" stroke="#d7ccc8" stroke-width="1"/>
  <!-- 四角圓角花紋 -->
  <circle cx="8" cy="8" r="8" fill="#6d4c41"/>
  <circle cx="392" cy="8" r="8" fill="#6d4c41"/>
  <circle cx="8" cy="292" r="8" fill="#6d4c41"/>
  <circle cx="392" cy="292" r="8" fill="#6d4c41"/>
  <!-- 頂部裝飾 -->
  <line x1="80" y1="8" x2="80" y2="30" stroke="#bcaaa4" stroke-width="1.5"/>
  <line x1="150" y1="8" x2="150" y2="35" stroke="#bcaaa4" stroke-width="1"/>
  <line x1="250" y1="8" x2="250" y2="35" stroke="#bcaaa4" stroke-width="1"/>
  <line x1="320" y1="8" x2="320" y2="30" stroke="#bcaaa4" stroke-width="1.5"/>
  <!-- 底部裝飾 -->
  <line x1="80" y1="292" x2="80" y2="270" stroke="#bcaaa4" stroke-width="1.5"/>
  <line x1="150" y1="292" x2="150" y2="265" stroke="#bcaaa4" stroke-width="1"/>
  <line x1="250" y1="292" x2="250" y2="265" stroke="#bcaaa4" stroke-width="1"/>
  <line x1="320" y1="292" x2="320" y2="270" stroke="#bcaaa4" stroke-width="1.5"/>
</svg>