<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- 熊熊資訊卡 - 工作報告區塊 -->
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFF8DC"/>
      <stop offset="100%" style="stop-color:#FFE4B5"/>
    </linearGradient>
    <linearGradient id="bearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5A2B"/>
      <stop offset="100%" style="stop-color:#D2691E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#8B5A2B" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 卡片背景 -->
  <rect x="10" y="10" width="380" height="180" rx="15" fill="url(#cardGrad)" filter="url(#shadow)"/>
  <rect x="10" y="10" width="380" height="180" rx="15" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
  
  <!-- 左側熊熊裝飾 -->
  <circle cx="55" cy="100" r="40" fill="url(#bearGrad)"/>
  <circle cx="30" cy="70" r="15" fill="url(#bearGrad)"/>
  <circle cx="80" cy="70" r="15" fill="url(#bearGrad)"/>
  <circle cx="30" cy="70" r="8" fill="#DEB887"/>
  <circle cx="80" cy="70" r="8" fill="#DEB887"/>
  <ellipse cx="55" cy="105" rx="25" ry="20" fill="#DEB887"/>
  <circle cx="45" cy="98" r="5" fill="#2C1810"/>
  <circle cx="65" cy="98" r="5" fill="#2C1810"/>
  <circle cx="46" cy="96" r="2" fill="white"/>
  <circle cx="66" cy="96" r="2" fill="white"/>
  <ellipse cx="55" cy="108" rx="6" ry="4" fill="#2C1810"/>
  <path d="M48 115 Q55 120 62 115" stroke="#2C1810" stroke-width="2" fill="none"/>
  <!-- 腮紅 -->
  <ellipse cx="32" cy="108" rx="7" ry="5" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="78" cy="108" rx="7" ry="5" fill="#FFB6C1" opacity="0.5"/>
  
  <!-- 星星裝飾 -->
  <polygon points="350,30 353,40 363,40 355,47 358,57 350,50 342,57 345,47 337,40 347,40" fill="url(#goldGrad)"/>
  <polygon points="370,80 372,86 378,86 373,90 375,96 370,92 365,96 367,90 362,86 368,86" fill="url(#goldGrad)"/>
  
  <!-- 標題區 -->
  <rect x="110" y="35" width="260" height="45" rx="10" fill="url(#bearGrad)"/>
  <text x="240" y="65" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FFF8DC" text-anchor="middle">工作報告</text>
  
  <!-- 內容區 -->
  <rect x="110" y="90" width="260" height="85" rx="8" fill="white" opacity="0.7"/>
  <line x1="120" y1="110" x2="360" y2="110" stroke="#D2691E" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="120" y1="130" x2="360" y2="130" stroke="#D2691E" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="120" y1="150" x2="280" y2="150" stroke="#D2691E" stroke-width="1" stroke-dasharray="3,2"/>
  
  <!-- 底部熊熊爪印裝飾 -->
  <ellipse cx="320" cy="160" rx="12" ry="8" fill="url(#bearGrad)" opacity="0.4"/>
  <circle cx="312" cy="152" r="4" fill="url(#bearGrad)" opacity="0.4"/>
  <circle cx="320" cy="150" r="4" fill="url(#bearGrad)" opacity="0.4"/>
  <circle cx="328" cy="152" r="4" fill="url(#bearGrad)" opacity="0.4"/>
</svg>