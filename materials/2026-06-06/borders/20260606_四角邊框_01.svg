<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- 四角邊框 — 單一角裝飾 (左上) -->
  <style>
    .line { fill: none; stroke: #2c3e50; stroke-width: 3; stroke-linecap: round; }
  </style>
  <!-- L型轉角裝飾 -->
  <path d="M8 45 L8 8 L45 8" class="line"/>
  <!-- 小圓點裝飾 -->
  <circle cx="8" cy="8" r="5" fill="#2c3e50"/>
  <!-- 延伸短線 -->
  <line x1="15" y1="8" x2="30" y2="8" class="line" style="stroke-width:2"/>
  <line x1="8" y1="15" x2="8" y2="30" class="line" style="stroke-width:2"/>
</svg>