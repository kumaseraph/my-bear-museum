<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <!-- 工作報告資訊卡 — 商務風格 -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- 卡片背景 -->
  <rect x="80" y="80" width="800" height="380" rx="16" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- 左側藍色裝飾條 -->
  <rect x="80" y="80" width="8" height="380" rx="4" fill="#2c3e50"/>

  <!-- 標題區 -->
  <rect x="120" y="105" width="180" height="36" rx="8" fill="#2c3e50"/>
  <text x="135" y="130" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">工作報告</text>

  <!-- 分隔線 -->
  <line x1="120" y1="160" x2="840" y2="160" stroke="#dee2e6" stroke-width="2"/>

  <!-- 三欄資訊區 -->
  <!-- 第一欄：進度 -->
  <circle cx="200" cy="240" r="30" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <text x="200" y="245" font-family="Arial" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">75</text>
  <text x="200" y="290" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle">執行進度</text>
  <text x="200" y="310" font-family="Arial" font-size="12" fill="#adb5bd" text-anchor="middle">已完成 75%</text>

  <!-- 第二欄：產出 -->
  <rect x="380" y="200" width="120" height="80" rx="10" fill="none" stroke="#2c3e50" stroke-width="3"/>
  <text x="440" y="238" font-family="Arial" font-size="24" font-weight="bold" fill="#2c3e50" text-anchor="middle">12</text>
  <text x="440" y="265" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle">項</text>
  <text x="440" y="300" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle">已完成項目</text>

  <!-- 第三欄：待辨 -->
  <circle cx="620" cy="240" r="30" fill="none" stroke="#e0a800" stroke-width="3" stroke-dasharray="5,3"/>
  <text x="620" y="245" font-family="Arial" font-size="20" font-weight="bold" fill="#e0a800" text-anchor="middle">3</text>
  <text x="620" y="290" font-family="Arial" font-size="14" fill="#6c757d" text-anchor="middle">待辦事項</text>
  <text x="620" y="310" font-family="Arial" font-size="12" fill="#adb5bd" text-anchor="middle">需追蹤</text>

  <!-- 底部狀態列 -->
  <rect x="120" y="350" width="720" height="80" rx="10" fill="#f1f3f5"/>
  <!-- 狀態點 -->
  <circle cx="160" cy="390" r="8" fill="#28a745"/>
  <text x="180" y="395" font-family="Arial" font-size="13" fill="#495057">已完成：8 項</text>

  <circle cx="320" cy="390" r="8" fill="#e0a800"/>
  <text x="340" y="395" font-family="Arial" font-size="13" fill="#495057">進行中：4 項</text>

  <circle cx="460" cy="390" r="8" fill="#dc3545"/>
  <text x="480" y="395" font-family="Arial" font-size="13" fill="#495057">待處理：3 項</text>

  <!-- 日期 -->
  <text x="780" y="395" font-family="Arial" font-size="12" fill="#adb5bd" text-anchor="end">更新日期：2026.06.06</text>
</svg>