<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C"/>
      <stop offset="100%" style="stop-color:#8B7355"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-color="#1a1a2e" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 背景圓 -->
  <circle cx="60" cy="60" r="55" fill="#FDF8F0" stroke="url(#goldGrad)" stroke-width="3"/>
  
  <!-- 靶心 -->
  <g filter="url(#shadow)">
    <circle cx="60" cy="60" r="30" stroke="url(#goldGrad)" stroke-width="4" fill="none"/>
    <circle cx="60" cy="60" r="18" stroke="url(#goldGrad)" stroke-width="3" fill="none" opacity="0.7"/>
    <circle cx="60" cy="60" r="6" fill="url(#goldGrad)"/>
  </g>
  
  <!-- 箭頭 -->
  <path d="M95,25 L60,60" stroke="url(#goldGrad)" stroke-width="5" stroke-linecap="round"/>
  <path d="M95,25 L85,25 L95,35" fill="url(#goldGrad)"/>
</svg>