<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="團隊協作">
  <title>團隊協作</title>
  <desc>三個人形圖案攜手合作，代表團隊協作</desc>
  <!-- 背景圓形 -->
  <circle cx="32" cy="32" r="30" fill="#E8F4FD" stroke="#2D7DD2" stroke-width="2"/>
  <!-- 三個人形 - 中間最高 -->
  <g fill="#2D7DD2">
    <!-- 左邊人 -->
    <circle cx="18" cy="24" r="5"/>
    <path d="M13 36 Q18 32 23 36 L23 48 L13 48 Z"/>
    <!-- 中間人 -->
    <circle cx="32" cy="20" r="6"/>
    <path d="M26 34 Q32 28 38 34 L38 48 L26 48 Z"/>
    <!-- 右邊人 -->
    <circle cx="46" cy="24" r="5"/>
    <path d="M41 36 Q46 32 51 36 L51 48 L41 48 Z"/>
  </g>
  <!-- 連接線 -->
  <path d="M23 40 Q32 36 41 40" fill="none" stroke="#27AE60" stroke-width="2" stroke-dasharray="3,2"/>
</svg>