<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="elegantGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5d4037;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8d6e63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4037;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 雙線外框 -->
  <rect x="10" y="10" width="380" height="280" fill="none" stroke="url(#elegantGrad)" stroke-width="2"/>
  <rect x="18" y="18" width="364" height="264" fill="none" stroke="#d7ccc8" stroke-width="1.5"/>
  <!-- 四角葉片裝飾 -->
  <path d="M 10 40 Q 10 10 40 10" fill="none" stroke="#6d4c41" stroke-width="2"/>
  <path d="M 360 10 Q 390 10 390 40" fill="none" stroke="#6d4c41" stroke-width="2"/>
  <path d="M 10 260 Q 10 290 40 290" fill="none" stroke="#6d4c41" stroke-width="2"/>
  <path d="M 360 290 Q 390 290 390 260" fill="none" stroke="#6d4c41" stroke-width="2"/>
  <!-- 中心裝飾菱形 -->
  <polygon points="200,130 220,150 200,170 180,150" fill="none" stroke="#a1887f" stroke-width="1.5"/>
  <polygon points="200,140 210,150 200,160 190,150" fill="#a1887f" opacity="0.3"/>
</svg>