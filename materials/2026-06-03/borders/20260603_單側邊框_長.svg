<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60">
  <defs>
    <linearGradient id="gradTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5d4037;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8d6e63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4037;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 主線 -->
  <line x1="10" y1="30" x2="390" y2="30" stroke="url(#gradTop)" stroke-width="3" stroke-linecap="round"/>
  <!-- 兩端圓點裝飾 -->
  <circle cx="10" cy="30" r="5" fill="#6d4c41"/>
  <circle cx="390" cy="30" r="5" fill="#6d4c41"/>
  <!-- 中間菱形裝飾 -->
  <polygon points="200,15 210,30 200,45 190,30" fill="#a1887f" opacity="0.6"/>
  <!-- 小裝飾線 -->
  <line x1="100" y1="20" x2="100" y2="40" stroke="#d7ccc8" stroke-width="1.5"/>
  <line x1="150" y1="18" x2="150" y2="42" stroke="#d7ccc8" stroke-width="1.5"/>
  <line x1="250" y1="18" x2="250" y2="42" stroke="#d7ccc8" stroke-width="1.5"/>
  <line x1="300" y1="20" x2="300" y2="40" stroke="#d7ccc8" stroke-width="1.5"/>
</svg>