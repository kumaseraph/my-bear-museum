<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- 背景圖片 - 極簡風格的現代幾何背景 -->
  <!-- 比例：16:9 (1920x1080) -->
  <!-- 風格：大量留白、極簡線條、科技感 -->
  
  <!-- 背景填充 - 乾淨的米白 -->
  <rect width="1920" height="1080" fill="#fdf8f2"/>
  
  <!-- 大型幾何線條裝飾 -->
  <g stroke="#5d4037" stroke-width="1.5" fill="none" opacity="0.2">
    <!-- 右上角弧線 -->
    <path d="M1600,0 Q1920,0 1920,320"/>
    
    <!-- 左下角弧線 -->
    <path d="M0,760 Q0,1080 320,1080"/>
    
    <!-- 對角線裝飾 -->
    <line x1="1400" y1="0" x2="1920" y2="520" opacity="0.1"/>
    <line x1="0" y1="560" x2="520" y2="1080" opacity="0.1"/>
  </g>
  
  <!-- 幾何方塊裝飾 -->
  <g stroke="#8d6e63" stroke-width="2" fill="none" opacity="0.15">
    <!-- 頂部方塊群 -->
    <rect x="80" y="60" width="120" height="120"/>
    <rect x="100" y="80" width="80" height="80"/>
    
    <!-- 右側方塊群 -->
    <rect x="1700" y="400" width="140" height="140"/>
    <rect x="1720" y="420" width="100" height="100"/>
  </g>
  
  <!-- 底部線條裝飾 -->
  <line x1="0" y1="1050" x2="600" y2="1050" stroke="#a1887f" stroke-width="2" opacity="0.2"/>
  <line x1="1320" y1="1050" x2="1920" y2="1050" stroke="#a1887f" stroke-width="2" opacity="0.2"/>
  
  <!-- 頂部線條裝飾 -->
  <line x1="600" y1="30" x2="1320" y2="30" stroke="#a1887f" stroke-width="2" opacity="0.2"/>
  
  <!-- 極簡圓點裝飾 -->
  <circle cx="100" cy="1000" r="8" fill="#8d6e63" opacity="0.15"/>
  <circle cx="130" cy="1000" r="5" fill="#a1887f" opacity="0.12"/>
  <circle cx="155" cy="1000" r="3" fill="#8d6e63" opacity="0.1"/>
  
  <circle cx="1820" cy="80" r="8" fill="#8d6e63" opacity="0.15"/>
  <circle cx="1790" cy="80" r="5" fill="#a1887f" opacity="0.12"/>
  <circle cx="1765" cy="80" r="3" fill="#8d6e63" opacity="0.1"/>
</svg>