<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 60" width="400" height="60">
  <!-- 單側邊框 - 長（水平邊框）：工作報告主題裝飾線 -->
  <!-- 比例：400x60 (水平長條) -->
  <!-- 風格：Monoline 線性風格、統一 2px 線寬、溫暖棕色調 -->
  
  <defs>
    <!-- 線條漸層 -->
    <linearGradient id="hLineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5d4037;stop-opacity:0.1"/>
      <stop offset="20%" style="stop-color:#8d6e63;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#5d4037;stop-opacity:0.9"/>
      <stop offset="80%" style="stop-color:#8d6e63;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#5d4037;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  
  <!-- 主線條 -->
  <line x1="20" y1="30" x2="380" y2="30" stroke="url(#hLineGrad)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- 左端裝飾 -->
  <circle cx="20" cy="30" r="6" fill="#5d4037" opacity="0.7"/>
  
  <!-- 右端裝飾 -->
  <circle cx="380" cy="30" r="6" fill="#5d4037" opacity="0.7"/>
  
  <!-- 左側小裝飾 -->
  <rect x="40" y="26" width="8" height="8" fill="#8d6e63" opacity="0.4" rx="1"/>
  
  <!-- 右側小裝飾 -->
  <rect x="352" y="26" width="8" height="8" fill="#8d6e63" opacity="0.4" rx="1"/>
</svg>