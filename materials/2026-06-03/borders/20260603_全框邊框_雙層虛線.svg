<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="modernGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8d6e63;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a1887f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8d6e63;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 外框 -->
  <rect x="15" y="15" width="370" height="270" fill="none" stroke="url(#modernGrad)" stroke-width="3" rx="8"/>
  <!-- 內框裝飾線 -->
  <rect x="25" y="25" width="350" height="250" fill="none" stroke="#d7ccc8" stroke-width="1" stroke-dasharray="5,3" rx="5"/>
  <!-- 四角圓點裝飾 -->
  <circle cx="15" cy="15" r="5" fill="#6d4c41"/>
  <circle cx="385" cy="15" r="5" fill="#6d4c41"/>
  <circle cx="15" cy="285" r="5" fill="#6d4c41"/>
  <circle cx="385" cy="285" r="5" fill="#6d4c41"/>
  <!-- 頂部標記線 -->
  <line x1="100" y1="15" x2="300" y2="15" stroke="#a1887f" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- 底部標記線 -->
  <line x1="100" y1="285" x2="300" y2="285" stroke="#a1887f" stroke-width="2" stroke-dasharray="8,4"/>
  <!-- 左側裝飾 -->
  <line x1="15" y1="100" x2="15" y2="200" stroke="#bcaaa4" stroke-width="2"/>
  <!-- 右側裝飾 -->
  <line x1="385" y1="100" x2="385" y2="200" stroke="#bcaaa4" stroke-width="2"/>
</svg>