<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 540" width="60" height="540">
  <!-- 單側邊框 — 垂直寬線裝飾 -->
  <style>
    .line { fill: none; stroke: #2c3e50; stroke-width: 3; stroke-linecap: round; }
  </style>
  <!-- 主垂直線 -->
  <line x1="30" y1="30" x2="30" y2="510" class="line"/>
  <!-- 兩端小圓點裝飾 -->
  <circle cx="30" cy="30" r="6" fill="#2c3e50"/>
  <circle cx="30" cy="510" r="6" fill="#2c3e50"/>
  <!-- 兩端短延伸線 -->
  <line x1="30" y1="15" x2="30" y2="30" style="stroke:#5d8aa8;stroke-width:2"/>
  <line x1="30" y1="510" x2="30" y2="525" style="stroke:#5d8aa8;stroke-width:2"/>
</svg>