<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- 背景圖片 - 工作報告主題：學院風格的專業正式背景 -->
  <!-- 比例：16:9 (1920x1080) -->
  <!-- 風格：大量留白、專業商務風格、溫暖米色調 -->
  
  <defs>
    <!-- 米色背景漸層 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf6e3"/>
      <stop offset="50%" style="stop-color:#f5ede0"/>
      <stop offset="100%" style="stop-color:#ebe2d5"/>
    </linearGradient>
    
    <!-- 裝飾線條漸層 -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8d6e63;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#a1887f;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#8d6e63;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  
  <!-- 背景填充 -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- 頂部裝飾線 -->
  <line x1="0" y1="60" x2="1920" y2="60" stroke="url(#lineGrad)" stroke-width="2"/>
  
  <!-- 左上角裝飾方塊 -->
  <rect x="40" y="40" width="80" height="80" fill="none" stroke="#8d6e63" stroke-width="2" opacity="0.4"/>
  <rect x="55" y="55" width="50" height="50" fill="none" stroke="#a1887f" stroke-width="1.5" opacity="0.3"/>
  
  <!-- 右上角裝飾圓弧 -->
  <path d="M1800,40 Q1880,40 1880,120" fill="none" stroke="#8d6e63" stroke-width="2" opacity="0.4"/>
  <path d="M1820,40 Q1880,40 1880,100" fill="none" stroke="#a1887f" stroke-width="1.5" opacity="0.3"/>
  
  <!-- 底部裝飾線 -->
  <line x1="0" y1="1020" x2="1920" y2="1020" stroke="url(#lineGrad)" stroke-width="2"/>
  
  <!-- 右下角裝飾方塊 -->
  <rect x="1800" y="960" width="80" height="80" fill="none" stroke="#8d6e63" stroke-width="2" opacity="0.4"/>
  
  <!-- 左下角裝飾圓弧 -->
  <path d="M40,1040 Q40,960 120,960" fill="none" stroke="#8d6e63" stroke-width="2" opacity="0.4"/>
  
  <!-- 中央區域裝飾網格（預留內容區域提示） -->
  <g opacity="0.15">
    <!-- 橫線 -->
    <line x1="200" y1="300" x2="1720" y2="300" stroke="#8d6e63" stroke-width="1" stroke-dasharray="10,5"/>
    <line x1="200" y1="540" x2="1720" y2="540" stroke="#8d6e63" stroke-width="1" stroke-dasharray="10,5"/>
    <line x1="200" y1="780" x2="1720" y2="780" stroke="#8d6e63" stroke-width="1" stroke-dasharray="10,5"/>
    <!-- 豎線 -->
    <line x1="480" y1="200" x2="480" y2="880" stroke="#8d6e63" stroke-width="1" stroke-dasharray="10,5"/>
    <line x1="960" y1="200" x2="960" y2="880" stroke="#8d6e63" stroke-width="1" stroke-dasharray="10,5"/>
    <line x1="1440" y1="200" x2="1440" y2="880" stroke="#8d6e63" stroke-width="1" stroke-dasharray="10,5"/>
  </g>
  
  <!-- 中央焦點裝飾 - 放大鏡圖示（代表檢視、分析） -->
  <g transform="translate(860, 440)" opacity="0.25">
    <circle cx="100" cy="100" r="80" fill="none" stroke="#5d4037" stroke-width="4"/>
    <line x1="160" y1="160" x2="220" y2="220" stroke="#5d4037" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>