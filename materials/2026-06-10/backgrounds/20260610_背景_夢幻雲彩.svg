<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg2a" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2"/>
      <stop offset="100%" style="stop-color:#fcb69f"/>
    </linearGradient>
    <linearGradient id="bg2b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1"/>
      <stop offset="100%" style="stop-color:#fbc2eb"/>
    </linearGradient>
  </defs>
  <!-- 暖色背景 -->
  <rect width="1920" height="1080" fill="url(#bg2a)"/>
  <!-- 裝飾雲朵群 -->
  <ellipse cx="200" cy="200" rx="150" ry="80" fill="white" opacity="0.5"/>
  <ellipse cx="350" cy="180" rx="100" ry="60" fill="white" opacity="0.4"/>
  <ellipse cx="280" cy="220" rx="80" ry="50" fill="white" opacity="0.3"/>
  <ellipse cx="1600" cy="300" rx="180" ry="90" fill="white" opacity="0.5"/>
  <ellipse cx="1750" cy="280" rx="120" ry="70" fill="white" opacity="0.4"/>
  <ellipse cx="1680" cy="330" rx="90" ry="55" fill="white" opacity="0.3"/>
  <!-- 彩色幾何點 -->
  <circle cx="400" cy="500" r="12" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="500" cy="450" r="8" fill="#4ecdc4" opacity="0.6"/>
  <circle cx="600" cy="480" r="10" fill="#ffe66d" opacity="0.6"/>
  <circle cx="1300" cy="700" r="12" fill="#a18cd1" opacity="0.6"/>
  <circle cx="1400" cy="750" r="8" fill="#fbc2eb" opacity="0.6"/>
  <circle cx="1500" cy="680" r="10" fill="#ffecd2" opacity="0.6"/>
  <!-- 曲線裝飾 -->
  <path d="M0,800 Q400,700 800,800 T1600,750 T1920,800" stroke="white" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M0,850 Q400,750 800,850 T1600,800 T1920,850" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
  <!-- 愛心裝飾 -->
  <path d="M100,600 C100,580 120,570 130,590 C140,570 160,580 160,600 C160,620 130,640 130,640 C130,640 100,620 100,600" fill="#ff6b6b" opacity="0.3"/>
  <path d="M1750,400 C1750,385 1765,378 1773,395 C1781,378 1796,385 1796,400 C1796,415 1773,432 1773,432 C1773,432 1750,415 1750,400" fill="#fbc2eb" opacity="0.4"/>
  <!-- 底部色塊 -->
  <rect x="0" y="950" width="600" height="130" fill="url(#bg2b)" opacity="0.3"/>
  <rect x="700" y="950" width="400" height="130" fill="#4ecdc4" opacity="0.2"/>
  <rect x="1200" y="950" width="720" height="130" fill="#a18cd1" opacity="0.3"/>
