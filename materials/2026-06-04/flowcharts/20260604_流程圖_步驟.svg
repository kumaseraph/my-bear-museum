<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <!-- Step flowchart - Academic style -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d4037"/>
    </marker>
  </defs>
  <!-- Step 1 -->
  <rect x="30" y="80" width="140" height="140" rx="12" fill="#fdf6e3" stroke="#5d4037" stroke-width="3"/>
  <rect x="30" y="80" width="140" height="35" rx="12" fill="#5d4037"/>
  <text x="100" y="105" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Step 1</text>
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="14" fill="#5d4037" text-anchor="middle">規劃目標</text>
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="11" fill="#8d6e63" text-anchor="middle">Define Goals</text>
  <text x="100" y="200" font-family="Arial, sans-serif" font-size="10" fill="#a1887f" text-anchor="middle">📋</text>
  <!-- Arrow 1 -->
  <line x1="175" y1="150" x2="230" y2="150" stroke="#5d4037" stroke-width="3" marker-end="url(#arrowhead)"/>
  <!-- Step 2 -->
  <rect x="240" y="80" width="140" height="140" rx="12" fill="#fdf6e3" stroke="#8d6e63" stroke-width="3"/>
  <rect x="240" y="80" width="140" height="35" rx="12" fill="#8d6e63"/>
  <text x="310" y="105" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Step 2</text>
  <text x="310" y="145" font-family="Arial, sans-serif" font-size="14" fill="#5d4037" text-anchor="middle">執行進度</text>
  <text x="310" y="170" font-family="Arial, sans-serif" font-size="11" fill="#8d6e63" text-anchor="middle">Track Progress</text>
  <text x="310" y="200" font-family="Arial, sans-serif" font-size="10" fill="#a1887f" text-anchor="middle">📊</text>
  <!-- Arrow 2 -->
  <line x1="385" y1="150" x2="440" y2="150" stroke="#5d4037" stroke-width="3" marker-end="url(#arrowhead)"/>
  <!-- Step 3 -->
  <rect x="450" y="80" width="140" height="140" rx="12" fill="#fdf6e3" stroke="#a1887f" stroke-width="3"/>
  <rect x="450" y="80" width="140" height="35" rx="12" fill="#a1887f"/>
  <text x="520" y="105" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Step 3</text>
  <text x="520" y="145" font-family="Arial, sans-serif" font-size="14" fill="#5d4037" text-anchor="middle">整理成果</text>
  <text x="520" y="170" font-family="Arial, sans-serif" font-size="11" fill="#8d6e63" text-anchor="middle">Compile Results</text>
  <text x="520" y="200" font-family="Arial, sans-serif" font-size="10" fill="#a1887f" text-anchor="middle">📁</text>
  <!-- Arrow 3 -->
  <line x1="595" y1="150" x2="650" y2="150" stroke="#5d4037" stroke-width="3" marker-end="url(#arrowhead)"/>
  <!-- Step 4 -->
  <rect x="660" y="80" width="110" height="140" rx="12" fill="#fdf6e3" stroke="#bcaaa4" stroke-width="3"/>
  <rect x="660" y="80" width="110" height="35" rx="12" fill="#bcaaa4"/>
  <text x="715" y="105" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Step 4</text>
  <text x="715" y="145" font-family="Arial, sans-serif" font-size="14" fill="#5d4037" text-anchor="middle">產出報告</text>
  <text x="715" y="170" font-family="Arial, sans-serif" font-size="11" fill="#8d6e63" text-anchor="middle">Final Report</text>
  <text x="715" y="200" font-family="Arial, sans-serif" font-size="10" fill="#a1887f" text-anchor="middle">✅</text>
</svg>