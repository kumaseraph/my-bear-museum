<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="成長趨勢">
 <title>成長趨勢</title>
  <desc>向上成長的趨勢圖標，代表業績成長、進步</desc>
  <!--背景圓形 -->
  <circle cx="32" cy="32" r="30" fill="#E8F4FD" stroke="#2D7DD2" stroke-width="2"/>
  <!-- 上升箭頭 -->
  <path d="M20 44 L32 20 L44 44" fill="none" stroke="#2D7DD2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M26 32 L32 20 L38 32" fill="none" stroke="#2D7DD2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 底線 -->
  <line x1="16" y1="48" x2="48" y2="48" stroke="#2D7DD2" stroke-width="2" stroke-linecap="round"/>
  <!-- 箭頭尖端 -->
  <circle cx="32" cy="20" r="3" fill="#2D7DD2"/>
</svg>