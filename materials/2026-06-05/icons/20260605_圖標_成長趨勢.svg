<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 成長趨勢 icon - 學院風格的上升圖表圖標 -->
  <!-- 風格：Monoline 線性風格、統一 2px 線寬 -->
  <g fill="none" stroke="#5d4037" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 圖表框架 -->
    <polyline points="8,52 8,12 56,12"/>
    <!-- 箭頭方向 -->
    <polyline points="50,16 56,12 52,18"/>
    <!-- 成長曲線 -->
    <polyline points="12,44 22,36 32,40 42,28 50,20"/>
    <!-- 資料點 -->
    <circle cx="12" cy="44" r="3" fill="#5d4037"/>
    <circle cx="22" cy="36" r="3" fill="#5d4037"/>
    <circle cx="32" cy="40" r="3" fill="#5d4037"/>
    <circle cx="42" cy="28" r="3" fill="#5d4037"/>
    <circle cx="50" cy="20" r="3" fill="#5d4037"/>
  </g>
</svg>