<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="cornerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="50%" stop-color="#2C5282"/>
      <stop offset="100%" stop-color="#4299E1"/>
    </linearGradient>
    <linearGradient id="lineGradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#4299E1"/>
    </linearGradient>
    <linearGradient id="lineGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A365D"/>
      <stop offset="100%" stop-color="#4299E1"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect fill="#F7FAFC" width="1920" height="1080"/>
  
  <!-- 四角裝飾 - 左上角 -->
  <g transform="translate(0, 0)">
    <path d="M 0 120 L 0 0 L 120 0" fill="none" stroke="url(#cornerGrad)" stroke-width="8"/>
    <rect x="0" y="0" width="40" height="40" fill="url(#cornerGrad)" opacity="0.3"/>
    <circle cx="20" cy="20" r="8" fill="#4299E1"/>
  </g>
  
  <!-- 四角裝飾 - 右上角 -->
  <g transform="translate(1920, 0)">
    <path d="M 0 0 L -120 0 L 0 120" fill="none" stroke="url(#cornerGrad)" stroke-width="8"/>
    <rect x="-40" y="0" width="40" height="40" fill="url(#cornerGrad)" opacity="0.3"/>
    <circle cx="-20" cy="20" r="8" fill="#4299E1"/>
  </g>
  
  <!-- 四角裝飾 - 左下角 -->
  <g transform="translate(0, 1080)">
    <path d="M 0 -120 L 0 0 L 120 0" fill="none" stroke="url(#cornerGrad)" stroke-width="8"/>
    <rect x="0" y="-40" width="40" height="40" fill="url(#cornerGrad)" opacity="0.3"/>
    <circle cx="20" cy="-20" r="8" fill="#4299E1"/>
  </g>
  
  <!-- 四角裝飾 - 右下角 -->
  <g transform="translate(1920, 1080)">
    <path d="M 0 0 L -120 0 L 0 -120" fill="none" stroke="url(#cornerGrad)" stroke-width="8"/>
    <rect x="-40" y="-40" width="40" height="40" fill="url(#cornerGrad)" opacity="0.3"/>
    <circle cx="-20" cy="-20" r="8" fill="#4299E1"/>
  </g>
  
  <!-- 頂部水平線裝飾 -->
  <line x1="140" y1="0" x2="1780" y2="0" stroke="url(#lineGradH)" stroke-width="3"/>
  <line x1="140" y1="8" x2="600" y2="8" stroke="#4299E1" stroke-width="2" opacity="0.5"/>
  <line x1="1320" y1="8" x2="1780" y2="8" stroke="#4299E1" stroke-width="2" opacity="0.5"/>
  
  <!-- 左側垂直線裝飾 -->
  <line x1="0" y1="140" x2="0" y2="940" stroke="url(#lineGradV)" stroke-width="3"/>
  <line x1="8" y1="140" x2="8" y2="480" stroke="#4299E1" stroke-width="2" opacity="0.5"/>
  <line x1="8" y1="600" x2="8" y2="940" stroke="#4299E1" stroke-width="2" opacity="0.5"/>
  
  <!-- 底部水平線裝飾 -->
  <line x1="140" y1="1080" x2="1780" y2="1080" stroke="url(#lineGradH)" stroke-width="3"/>
  <line x1="140" y1="1072" x2="600" y2="1072" stroke="#4299E1" stroke-width="2" opacity="0.5"/>
  <line x1="1320" y1="1072" x2="1780" y2="1072" stroke="#4299E1" stroke-width="2" opacity="0.5"/>
  
  <!-- 右側垂直線裝飾 -->
  <line x1="1920" y1="140" x2="1920" y2="940" stroke="url(#lineGradV)" stroke-width="3"/>
  <line x1="1912" y1="140" x2="1912" y2="480" stroke="#4299E1" stroke-width="2" opacity="0.5"/>
  <line x1="1912" y1="600" x2="1912" y2="940" stroke="#4299E1" stroke-width="2" opacity="0.5"/>
  
  <!-- 內圈裝飾虛線 -->
  <rect x="50" y="50" width="1820" height="980" fill="none" stroke="#4299E1" stroke-width="1" stroke-dasharray="10,5" rx="8" opacity="0.4"/>
  
  <!-- 四角小裝飾點 -->
  <circle cx="50" cy="50" r="5" fill="#2C5282"/>
  <circle cx="1870" cy="50" r="5" fill="#2C5282"/>
  <circle cx="50" cy="1030" r="5" fill="#2C5282"/>
  <circle cx="1870" cy="1030" r="5" fill="#2C5282"/>
  
  <!-- 中央啞鈴裝飾 -->
  <rect x="850" y="520" width="220" height="40" rx="20" fill="url(#cornerGrad)" opacity="0.15"/>
  <rect x="880" y="530" width="40" height="20" rx="10" fill="#4299E1" opacity="0.3"/>
  <rect x="1000" y="530" width="40" height="20" rx="10" fill="#4299E1" opacity="0.3"/>
</svg>