<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Blue minimalist background -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bbdefb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90caf9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#blueGrad)"/>
  <!-- Subtle wave pattern -->
  <path d="M0 500 Q200 450 400 500 T800 500 L800 600 L0 600 Z" fill="#82b1ff" opacity="0.2"/>
  <path d="M0 520 Q200 470 400 520 T800 520 L800 600 L0 600 Z" fill="#64b5f6" opacity="0.15"/>
  <!-- Corner decorations -->
  <circle cx="50" cy="50" r="30" fill="#ffffff" opacity="0.3"/>
  <circle cx="750" cy="550" r="40" fill="#ffffff" opacity="0.2"/>
</svg>