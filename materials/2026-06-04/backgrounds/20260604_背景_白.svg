<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Simple minimalist background - clean cream with subtle pattern -->
  <rect width="800" height="600" fill="#fdf6e3"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e7d8c9" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#grid)"/>
  <!-- Light decorative corner accents -->
  <path d="M 0 0 L 60 0 L 0 60 Z" fill="#d7ccc8" opacity="0.3"/>
  <path d="M 800 0 L 740 0 L 800 60 Z" fill="#d7ccc8" opacity="0.3"/>
  <path d="M 0 600 L 60 600 L 0 540 Z" fill="#d7ccc8" opacity="0.3"/>
  <path d="M 800 600 L 740 600 L 800 540 Z" fill="#d7ccc8" opacity="0.3"/>
</svg>