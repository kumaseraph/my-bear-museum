<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- 專業藍色漸層 -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#2C5282"/>
    </linearGradient>
    <linearGradient id="lightBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#63B3ED"/>
      <stop offset="100%" stop-color="#4299E1"/>
    </linearGradient>
    <!-- 連接線漸層 -->
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2C5282"/>
      <stop offset="100%" stop-color="#63B3ED"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect fill="#F7FAFC" width="1920" height="1080"/>
  
  <!-- 標題區 -->
  <text x="960" y="70" font-family="Microsoft JhengHei, PingFang TC, sans-serif" font-size="36" font-weight="bold" fill="#1A365D" text-anchor="middle">專案管理流程</text>
  <text x="960" y="105" font-family="Microsoft JhengHei, PingFang TC, sans-serif" font-size="18" fill="#4A5568" text-anchor="middle">Project Management Workflow</text>
  
  <!-- 步驟連接線 -->
  <path d="M 290 540 L 490 540" stroke="url(#lineGrad)" stroke-width="4" fill="none"/>
  <path d="M 690 540 L 890 540" stroke="url(#lineGrad)" stroke-width="4" fill="none"/>
  <path d="M 1090 540 L 1290 540" stroke="url(#lineGrad)" stroke-width="4" fill="none"/>
  <path d="M 1490 540 L 1690 540" stroke="url(#lineGrad)" stroke-width="4" fill="none"/>
  
  <!-- 箭頭標記 -->
  <polygon points="485,530 505,540 485,550" fill="#4299E1"/>
  <polygon points="885,530 905,540 885,550" fill="#4299E1"/>
  <polygon points="1285,530 1305,540 1285,550" fill="#4299E1"/>
  <polygon points="1685,530 1705,540 1685,550" fill="#4299E1"/>
  
  <!-- 步驟1: 啟動專案 -->
  <g transform="translate(140, 420)">
    <rect x="0" y="0" width="150" height="180" rx="12" fill="url(#blueGrad)"/>
    <rect x="0" y="0" width="150" height="50" rx="12" fill="#2B6CB0"/>
    <text x="75" y="33" font-family="Microsoft JhengHei" font-size="16" font-weight="bold" fill="white" text-anchor="middle">STEP 1</text>
    <circle cx="75" cy="100" r="35" fill="white" opacity="0.9"/>
    <!-- 燈塔圖標 -->
    <path d="M 75 75 L 75 115 M 65 85 L 75 75 L 85 85" stroke="#2C5282" stroke-width="3" fill="none"/>
    <circle cx="75" cy="70" r="8" fill="none" stroke="#2C5282" stroke-width="2"/>
    <path d="M 60 95 L 90 95" stroke="#2C5282" stroke-width="2"/>
    <text x="75" y="155" font-family="Microsoft JhengHei" font-size="18" font-weight="bold" fill="white" text-anchor="middle">啟動專案</text>
    <text x="75" y="175" font-family="Microsoft JhengHei" font-size="12" fill="#A0AEC0" text-anchor="middle">Initiation</text>
  </g>
  
  <!-- 步驟2: 規劃設計 -->
  <g transform="translate(540, 420)">
    <rect x="0" y="0" width="150" height="180" rx="12" fill="url(#blueGrad)"/>
    <rect x="0" y="0" width="150" height="50" rx="12" fill="#2B6CB0"/>
    <text x="75" y="33" font-family="Microsoft JhengHei" font-size="16" font-weight="bold" fill="white" text-anchor="middle">STEP 2</text>
    <circle cx="75" cy="100" r="35" fill="white" opacity="0.9"/>
    <!-- 規劃圖標 (日曆/地圖) -->
    <rect x="58" y="80" width="34" height="28" rx="3" fill="none" stroke="#2C5282" stroke-width="2"/>
    <line x1="58" y1="92" x2="92" y2="92" stroke="#2C5282" stroke-width="2"/>
    <line x1="67" y1="80" x2="67" y2="72" stroke="#2C5282" stroke-width="2"/>
    <line x1="83" y1="80" x2="83" y2="72" stroke="#2C5282" stroke-width="2"/>
    <text x="75" y="155" font-family="Microsoft JhengHei" font-size="18" font-weight="bold" fill="white" text-anchor="middle">規劃設計</text>
    <text x="75" y="175" font-family="Microsoft JhengHei" font-size="12" fill="#A0AEC0" text-anchor="middle">Planning</text>
  </g>
  
  <!-- 步驟3: 執行監控 -->
  <g transform="translate(940, 420)">
    <rect x="0" y="0" width="150" height="180" rx="12" fill="url(#blueGrad)"/>
    <rect x="0" y="0" width="150" height="50" rx="12" fill="#2B6CB0"/>
    <text x="75" y="33" font-family="Microsoft JhengHei" font-size="16" font-weight="bold" fill="white" text-anchor="middle">STEP 3</text>
    <circle cx="75" cy="100" r="35" fill="white" opacity="0.9"/>
    <!--齒輪圖標-->
    <circle cx="75" cy="100" r="18" fill="none" stroke="#2C5282" stroke-width="2"/>
    <circle cx="75" cy="100" r="8" fill="#2C5282"/>
    <path d="M 75 82 L 78 75 L 72 75 Z" fill="#2C5282"/>
    <path d="M 93 100 L 100 103 L 100 97 Z" fill="#2C5282"/>
    <path d="M 75 118 L 72 125 L 78 125 Z" fill="#2C5282"/>
    <path d="M 57 100 L 50 97 L 50 103 Z" fill="#2C5282"/>
    <text x="75" y="155" font-family="Microsoft JhengHei" font-size="18" font-weight="bold" fill="white" text-anchor="middle">執行監控</text>
    <text x="75" y="175" font-family="Microsoft JhengHei" font-size="12" fill="#A0AEC0" text-anchor="middle">Execution</text>
  </g>
  
  <!-- 步驟4: 品質驗收 -->
  <g transform="translate(1340, 420)">
    <rect x="0" y="0" width="150" height="180" rx="12" fill="url(#blueGrad)"/>
    <rect x="0" y="0" width="150" height="50" rx="12" fill="#2B6CB0"/>
    <text x="75" y="33" font-family="Microsoft JhengHei" font-size="16" font-weight="bold" fill="white" text-anchor="middle">STEP 4</text>
    <circle cx="75" cy="100" r="35" fill="white" opacity="0.9"/>
    <!-- 品質檢驗圖標 (放大鏡+勾選) -->
    <circle cx="68" cy="95" r="15" fill="none" stroke="#2C5282" stroke-width="2"/>
    <line x1="80" y1="107" x2="92" y2="119" stroke="#2C5282" stroke-width="3"/>
    <path d="M 62 93 L 66 97 L 74 89" stroke="#48BB78" stroke-width="2" fill="none"/>
    <text x="75" y="155" font-family="Microsoft JhengHei" font-size="18" font-weight="bold" fill="white" text-anchor="middle">品質驗收</text>
    <text x="75" y="175" font-family="Microsoft JhengHei" font-size="12" fill="#A0AEC0" text-anchor="middle">Quality</text>
  </g>
  
  <!-- 步驟5: 結案交付 -->
  <g transform="translate(1740, 420)">
    <rect x="0" y="0" width="150" height="180" rx="12" fill="url(#blueGrad)"/>
    <rect x="0" y="0" width="150" height="50" rx="12" fill="#2B6CB0"/>
    <text x="75" y="33" font-family="Microsoft JhengHei" font-size="16" font-weight="bold" fill="white" text-anchor="middle">STEP 5</text>
    <circle cx="75" cy="100" r="35" fill="white" opacity="0.9"/>
    <!-- 獎盃圖標 -->
    <path d="M 60 115 L 60 105 L 75 90 L 90 105 L 90 115 Z" fill="none" stroke="#2C5282" stroke-width="2"/>
    <line x1="60" y1="115" x2="90" y2="115" stroke="#2C5282" stroke-width="2"/>
    <line x1="75" y1="115" x2="75" y2="125" stroke="#2C5282" stroke-width="2"/>
    <line x1="65" y1="125" x2="85" y2="125" stroke="#2C5282" stroke-width="2"/>
    <path d="M 60 105 Q 55 100 55 95 Q 55 90 60 90" fill="none" stroke="#2C5282" stroke-width="2"/>
    <path d="M 90 105 Q 95 100 95 95 Q 95 90 90 90" fill="none" stroke="#2C5282" stroke-width="2"/>
    <text x="75" y="155" font-family="Microsoft JhengHei" font-size="18" font-weight="bold" fill="white" text-anchor="middle">結案交付</text>
    <text x="75" y="175" font-family="Microsoft JhengHei" font-size="12" fill="#A0AEC0" text-anchor="middle">Closing</text>
  </g>
  
  <!-- 底部裝飾線 -->
  <line x1="100" y1="750" x2="1820" y2="750" stroke="url(#lineGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- 底部說明 -->
  <text x="960" y="800" font-family="Microsoft JhengHei" font-size="16" fill="#4A5568" text-anchor="middle">掌握專案脈絡，提升執行效率</text>
  
  <!-- 四角裝飾 -->
  <path d="M 50 50 L 100 50 M 50 50 L 50 100" stroke="#4299E1" stroke-width="3" fill="none"/>
  <path d="M 1870 50 L 1820 50 M 1870 50 L 1870 100" stroke="#4299E1" stroke-width="3" fill="none"/>
  <path d="M 50 1030 L 100 1030 M 50 1030 L 50 980" stroke="#4299E1" stroke-width="3" fill="none"/>
  <path d="M 1870 1030 L 1820 1030 M 1870 1030 L 1870 980" stroke="#4299E1" stroke-width="3" fill="none"/>
</svg>