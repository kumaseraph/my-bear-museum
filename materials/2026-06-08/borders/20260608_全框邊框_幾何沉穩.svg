<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A252F"/>
      <stop offset="100%" style="stop-color:#2C3E50"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E74C3C"/>
      <stop offset="50%" style="stop-color:#F39C12"/>
      <stop offset="100%" style="stop-color:#E74C3C"/>
    </linearGradient>
  </defs>
  
  <!-- 全框外層 -->
  <rect x="0" y="0" width="1920" height="1080" fill="none" stroke="url(#frameGrad)" stroke-width="16"/>
  
  <!-- 全框內層細線 -->
  <rect x="20" y="20" width="1880" height="1040" fill="none" stroke="#5D6D7E" stroke-width="2"/>
  
  <!-- 頂部強調線 -->
  <rect x="100" y="30" width="1720" height="5" fill="url(#accentGrad)" rx="2.5"/>
  
  <!-- 左上角裝飾 -->
  <circle cx="60" cy="60" r="15" fill="#34495E"/>
  <circle cx="60" cy="60" r="8" fill="#E74C3C"/>
  
  <!-- 右上角裝飾 -->
  <circle cx="1860" cy="60" r="15" fill="#34495E"/>
  <circle cx="1860" cy="60" r="8" fill="#F39C12"/>
  
  <!-- 左下角裝飾 -->
  <circle cx="60" cy="1020" r="15" fill="#34495E"/>
  <circle cx="60" cy="1020" r="8" fill="#F39C12"/>
  
  <!-- 右下角裝飾 -->
  <circle cx="1860" cy="1020" r="15" fill="#34495E"/>
  <circle cx="1860" cy="1020" r="8" fill="#E74C3C"/>
  
  <!-- 底部強調線 -->
  <rect x="100" y="1045" width="1720" height="5" fill="url(#accentGrad)" rx="2.5"/>
</svg>