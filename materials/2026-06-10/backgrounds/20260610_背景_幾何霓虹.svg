<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="neonBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c1e"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f2a"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff00ff"/>
      <stop offset="100%" style="stop-color:#00ffff"/>
    </linearGradient>
    <linearGradient id="neon2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#ff00ff"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#neonBg)"/>
  <line x1="100" y1="0" x2="500" y2="400" stroke="url(#neon1)" stroke-width="4" filter="url(#neonGlow)" opacity="0.7"/>
  <line x1="500" y1="400" x2="900" y2="300" stroke="url(#neon2)" stroke-width="3" filter="url(#neonGlow)" opacity="0.6"/>
  <line x1="1920" y1="200" x2="1400" y2="500" stroke="url(#neon1)" stroke-width="4" filter="url(#neonGlow)" opacity="0.7"/>
  <line x1="1400" y1="500" x2="1000" y2="450" stroke="url(#neon2)" stroke-width="3" filter="url(#neonGlow)" opacity="0.6"/>
  <rect x="150" y="650" width="200" height="200" stroke="url(#neon1)" stroke-width="3" fill="none" filter="url(#neonGlow)" opacity="0.5" rx="20"/>
  <rect x="160" y="660" width="180" height="180" stroke="url(#neon2)" stroke-width="2" fill="none" filter="url(#neonGlow)" opacity="0.4" rx="15"/>
  <rect x="1550" y="150" width="250" height="250" stroke="url(#neon2)" stroke-width="3" fill="none" filter="url(#neonGlow)" opacity="0.5" rx="25"/>
  <rect x="1565" y="165" width="220" height="220" stroke="url(#neon1)" stroke-width="2" fill="none" filter="url(#neonGlow)" opacity="0.4" rx="20"/>
  <circle cx="300" cy="400" r="15" fill="#ff00ff" filter="url(#neonGlow)" opacity="0.8"/>
  <circle cx="1700" cy="800" r="20" fill="#00ffff" filter="url(#neonGlow)" opacity="0.8"/>
  <circle cx="800" cy="200" r="10" fill="#00ffff" filter="url(#neonGlow)" opacity="0.6"/>
  <circle cx="1200" cy="900" r="12" fill="#ff00ff" filter="url(#neonGlow)" opacity="0.6"/>
  <line x1="0" y1="1020" x2="1920" y2="1020" stroke="url(#neon1)" stroke-width="5" filter="url(#neonGlow)" opacity="0.8"/>
  <line x1="0" y1="1050" x2="1920" y2="1050" stroke="url(#neon2)" stroke-width="3" filter="url(#neonGlow)" opacity="0.6"/>
</svg>