<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 60" width="960" height="60">
  <!-- 單側邊框 — 水平長線裝飾 -->
  <style>
    .line { fill: none; stroke: #2c3e50; stroke-width: 3; stroke-linecap: round; }
  </style>
  <!-- 主水平線 -->
  <line x1="30" y1="30" x2="930" y2="30" class="line"/>
  <!-- 兩端小圓點裝飾 -->
  <circle cx="30" cy="30" r="6" fill="#2c3e50"/>
  <circle cx="930" cy="30" r="6" fill="#2c3e50"/>
  <!-- 兩端短延伸線 -->
  <line x1="15" y1="30" x2="30" y2="30" style="stroke:#5d8aa8;stroke-width:2"/>
  <line x1="930" y1="30" x2="945" y2="30" style="stroke:#5d8aa8;stroke-width:2"/>
</svg>