<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <!-- 背景圖片 - 可愛風格的熊熊工作報告背景 -->
  <!-- 比例：16:9 (1920x1080) -->
  <!-- 風格：可愛溫馨、柔和色彩、熊熊主題裝飾 -->
  
  <defs>
    <!-- 柔和米色背景漸層 -->
    <linearGradient id="cuteBgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf6e3"/>
      <stop offset="100%" style="stop-color:#f5ede0"/>
    </linearGradient>
    
    <!-- 溫暖粉色調 -->
    <linearGradient id="warmPinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8e8e0"/>
      <stop offset="100%" style="stop-color:#f0d8c8"/>
    </linearGradient>
  </defs>
  
  <!-- 背景填充 -->
  <rect width="1920" height="1080" fill="url(#cuteBgGrad)"/>
  
  <!-- 可愛的熊熊耳朵裝飾（右上角） -->
  <g transform="translate(1750, 50)" opacity="0.2">
    <!-- 左耳 -->
    <circle cx="0" cy="60" r="40" fill="none" stroke="#8d6e63" stroke-width="3"/>
    <circle cx="0" cy="60" r="25" fill="none" stroke="#a1887f" stroke-width="2"/>
    <!-- 右耳 -->
    <circle cx="100" cy="60" r="40" fill="none" stroke="#8d6e63" stroke-width="3"/>
    <circle cx="100" cy="60" r="25" fill="none" stroke="#a1887f" stroke-width="2"/>
    <!-- 頭部輪廓 -->
    <ellipse cx="50" cy="100" rx="80" ry="70" fill="none" stroke="#8d6e63" stroke-width="3"/>
  </g>
  
  <!-- 可愛的熊熊耳朵裝飾（左下角） -->
  <g transform="translate(70, 870)" opacity="0.2">
    <!-- 左耳 -->
    <circle cx="0" cy="60" r="35" fill="none" stroke="#8d6e63" stroke-width="3"/>
    <circle cx="0" cy="60" r="22" fill="none" stroke="#a1887f" stroke-width="2"/>
    <!-- 右耳 -->
    <circle cx="90" cy="60" r="35" fill="none" stroke="#8d6e63" stroke-width="3"/>
    <circle cx="90" cy="60" r="22" fill="none" stroke="#a1887f" stroke-width="2"/>
    <!-- 頭部輪廓 -->
    <ellipse cx="45" cy="95" rx="70" ry="60" fill="none" stroke="#8d6e63" stroke-width="3"/>
  </g>
  
  <!-- 可愛的愛心裝飾 -->
  <g fill="none" stroke="#d7b8a8" stroke-width="2" opacity="0.3">
    <!-- 左上角愛心 -->
    <path d="M150,150 C150,135 165,130 175,145 C185,130 200,135 200,150 C200,170 175,190 175,190 C175,190 150,170 150,150"/>
    <!-- 右下角愛心 -->
    <path d="M1700,900 C1700,885 1715,880 1725,895 C1735,880 1750,885 1750,900 C1750,920 1725,940 1725,940 C1725,940 1700,920 1700,900"/>
  </g>
  
  <!-- 可愛的星星裝飾 -->
  <g fill="#e7d8c9" opacity="0.3">
    <polygon points="100,300 110,330 140,330 115,350 125,380 100,360 75,380 85,350 60,330 90,330" transform="scale(0.5) translate(80, 400)"/>
    <polygon points="3500,200 3510,230 3540,230 3515,250 3525,280 3500,260 3475,280 3485,250 3460,230 3490,230" transform="scale(0.4) translate(-350, 300)"/>
  </g>
  
  <!-- 波浪線裝飾（底部） -->
  <path d="M0,1050 Q100,1020 200,1050 T400,1050 T600,1050 T800,1050 T1000,1050 T1200,1050 T1400,1050 T1600,1050 T1800,1050 T1920,1050" fill="none" stroke="#d7ccc8" stroke-width="2" opacity="0.4"/>
  
  <!-- 波浪線裝飾（頂部） -->
  <path d="M0,30 Q100,60 200,30 T400,30 T600,30 T800,30 T1000,30 T1200,30 T1400,30 T1600,30 T1800,30 T1920,30" fill="none" stroke="#d7ccc8" stroke-width="2" opacity="0.4"/>
  
  <!-- 柔和的圓形裝飾 -->
  <circle cx="1800" cy="500" r="100" fill="none" stroke="#e7d8c9" stroke-width="2" opacity="0.2"/>
  <circle cx="120" cy="600" r="80" fill="none" stroke="#e7d8c9" stroke-width="2" opacity="0.15"/>
</svg>