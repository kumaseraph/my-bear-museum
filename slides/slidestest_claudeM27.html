<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐻 小熊的一生 - A Bear's Life</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      overflow: hidden;
      background: #fffbf5;
    }

    /* Floating Bears */
    .floating-bear {
      position: fixed;
      font-size: 2rem;
      opacity: 0.25;
      z-index: 1;
      animation: floatAround 8s ease-in-out infinite;
      pointer-events: none;
    }

    .floating-bear:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
    .floating-bear:nth-child(2) { top: 70%; left: 8%; animation-delay: -2s; }
    .floating-bear:nth-child(3) { top: 20%; right: 8%; animation-delay: -4s; }
    .floating-bear:nth-child(4) { top: 75%; right: 5%; animation-delay: -6s; }
    .floating-bear:nth-child(5) { top: 45%; left: 3%; animation-delay: -1s; }
    .floating-bear:nth-child(6) { top: 50%; right: 3%; animation-delay: -3s; }

    @keyframes floatAround {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      25% { transform: translateY(-15px) rotate(5deg); }
      50% { transform: translateY(-8px) rotate(-3deg); }
      75% { transform: translateY(-20px) rotate(3deg); }
    }

    @keyframes floatUpDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes pawWave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(15deg); }
      75% { transform: rotate(-15deg); }
    }

    /* Slides Container */
    .slides-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .slide {
      min-width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .slide-content {
      text-align: center;
      z-index: 10;
      position: relative;
    }

    .slide-emoji {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: floatUpDown 3s ease-in-out infinite;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }

    .slide-title {
      font-size: 3rem;
      font-weight: 700;
      color: #5d4037;
      margin-bottom: 1rem;
      text-shadow: 2px 2px 4px rgba(139, 90, 43, 0.15);
    }

    .slide-subtitle {
      font-size: 1.4rem;
      color: #795548;
      line-height: 1.8;
      max-width: 600px;
    }

    /* Bear Paw Decorations */
    .paw-decoration {
      position: absolute;
      font-size: new 2.5rem;
      opacity: 0.12;
      color: #8b5a2b;
    }

    .paw-top-left { top: 8%; left: 10%; transform: rotate(-20deg); }
    .paw-top-right { top: 12%; right: 12%; transform: rotate(25deg); }
    .paw-bottom-left { bottom: 10%; left: 8%; transform: rotate(15deg); }
    .paw-bottom-right { bottom: 8%; right: 10%; transform: rotate(-10deg); }

    /* Cozy Background Elements */
    .cozy-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.08;
    }

    .cc-1 { width: 300px; height: 300px; background: #8b5a2b; top: -100px; right: -80px; }
    .cc-2 { width: 200px; height: 200px; background: #5d4037; bottom: -60px; left: -60px; }
    .cc-3 { width: 150px; height: 150px; background: #8b5a2b; top: 50%; left: 15%; }

    /* Heart Decorations */
    .heart {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.15;
      animation: floatUpDown 4s ease-in-out infinite;
    }

    /* Navigation */
    .nav-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(139, 90, 43, 0.85);
      color: #fffbf5;
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.5rem;
      z-index: 100;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(93, 64, 55, 0.3);
    }

    .nav-btn:hover {
      background: #5d4037;
      transform: translateY(-50%) scale(1.1);
      box-shadow: 0 6px 20px rgba(93, 64, 55, 0.4);
    }

    .nav-btn.prev { left: 20px; }
    .nav-btn.next { right: 20px; }

    /* Page Indicator */
    .page-indicator {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.1rem;
      color: #5d4037;
      background: rgba(255, 251, 245, 0.9);
      padding: 8px 20px;
      border-radius: 20px;
      box-shadow: 0 2px 10px rgba(93, 64, 55, 0.15);
      z-index: 100;
      font-weight: 600;
    }

    /* Progress Dots */
    .progress-dots {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: rgba(139, 90, 43, 0.3);
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .dot:hover {
      background: rgba(139, 90, 43, 0.5);
      transform: scale(1.2);
    }

    .dot.active {
      background: #8b5a2b;
      border-color: #5d4037;
      transform: scale(1.15);
      box-shadow: 0 2px 8px rgba(139, 90, 43, 0.4);
    }

    /* Leaf Decorations */
    .leaf {
      position: absolute;
      font-size: 1.2rem;
      opacity: 0.15;
    }

    /* Slide-specific backgrounds */
    .slide-1 { background: #fffbf5; }
    .slide-2 { background: #fff9e6; }
    .slide-3 { background: #e8f5e9; }
    .slide-4 { background: #e3f2fd; }
    .slide-5 { background: #fce4ec; }

    /* Bear Character on Slide */
    .slide-bear {
      font-size: 3rem;
      margin-bottom: 0.5rem;
      animation: floatUpDown 2.5s ease-in-out infinite;
    }

    /* Cozy Frame */
    .cozy-frame {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border: 3px solid rgba(139, 90, 43, 0.1);
      border-radius: 20px;
      pointer-events: none;
    }

    /* Cute Bear Face Animation */
    @keyframes bearWink {
      0%, 90%, 100% { transform: scaleY(1); }
      95% { transform: scaleY(0.1); }
    }
  </style>
</head>
<body>

  <!-- Floating Bears -->
  <div class="floating-bear">🐾</div>
  <div class="floating-bear">🐻</div>
  <div class="floating-bear">🐾</div>
  <div class="floating-bear">🐻</div>
  <div class="floating-bear">🐾</div>
  <div class="floating-bear">🐻</div>

  <!-- Slides Wrapper -->
  <div class="slides-container" id="slidesContainer">

    <!-- Slide 1: Title -->
    <div class="slide slide-1">
      <div class="cozy-frame"></div>
      <div class="cozy-circle cc-1"></div>
      <div class="cozy-circle cc-2"></div>
      <div class="paw-decoration paw-top-left">🐾</div>
      <div class="paw-decoration paw-top-right">🐾</div>
      <div class="paw-decoration paw-bottom-left">🐾</div>
      <div class="paw-decoration paw-bottom-right">🐾</div>
      <div class="heart" style="top: 20%; right: 20%; animation-delay: -1s;">💕</div>
      <div class="heart" style="bottom: 25%; left: 18%; animation-delay: -2.5s;">💗</div>
      <div class="slide-content">
        <div class="slide-emoji">🐻</div>
        <h1 class="slide-title">小熊的一生</h1>
        <p class="slide-subtitle">一個溫暖的生命故事</p>
      </div>
    </div>

    <!-- Slide 2: Growth -->
    <div class="slide slide-2">
      <div class="cozy-frame"></div>
      <div class="cozy-circle cc-1"></div>
      <div class="cozy-circle cc-2"></div>
      <div class="paw-decoration paw-top-left">🐾</div>
      <div class="paw-decoration paw-top-right">🐾</div>
      <div class="paw-decoration paw-bottom-left">🐾</div>
      <div class="paw-decoration paw-bottom-right">🐾</div>
      <div class="leaf" style="top: 15%; right: 15%;">🍃</div>
      <div class="leaf" style="bottom: 20%; left: 12%;">🍂</div>
      <div class="slide-content">
        <div class="slide-emoji">🌱</div>
        <h1 class="slide-title">成長的點點滴滴</h1>
        <p class="slide-subtitle">學習走路、尋找食物、盡情玩耍</p>
      </div>
    </div>

    <!-- Slide 3: Adventure -->
    <div class="slide slide-3">
      <div class="cozy-frame"></div>
      <div class="cozy-circle cc-1"></div>
      <div class="cozy-circle cc-2"></div>
      <div class="paw-decoration paw-top-left">🐾</div>
      <div class="paw-decoration paw-top-right">🐾</div>
      <div class="paw-decoration paw-bottom-left">🐾</div>
      <div class="paw-decoration paw-bottom-right">🐾</div>
      <div class="leaf" style="top: 18%; right: 18%;">🌲</div>
      <div class="leaf" style="bottom: 15%; left: 10%;">🌿</div>
      <div class="heart" style="top: 25%; left: 20%; animation-delay: -1.5s;">💚</div>
      <div class="slide-content">
        <div class="slide-emoji">🌲</div>
        <h1 class="slide-title">森林大冒險</h1>
        <p class="slide-subtitle">穿越密林、結交朋友、勇敢挑戰</p>
      </div>
    </div>

    <!-- Slide 4: Hibernation -->
    <div class="slide slide-4">
      <div class="cozy-frame"></div>
      <div class="cozy-circle cc-1"></div>
      <div class="cozy-circle cc-2"></div>
      <div class="paw-decoration paw-top-left">🐾</div>
      <div class="paw-decoration paw-top-right">🐾</div>
      <div class="paw-decoration paw-bottom-left">🐾</div>
      <div class="paw-decoration paw-bottom-right">🐾</div>
      <div class="leaf" style="top: 15%; right: 12%;">❄️</div>
      <div class="leaf" style="bottom: 22%; left: 15%;">🌨️</div>
      <div class="heart" style="top: 22%; right: 22%; animation-delay: -2s;">❄️</div>
      <div class="slide-content">
        <div class="slide-emoji">❄️</div>
        <h1 class="slide-title">漫長的冬眠</h1>
        <p class="slide-subtitle">天氣變冷、找到溫暖的洞穴、等待春天</p>
      </div>
    </div>

    <!-- Slide 5: Home -->
    <div class="slide slide-5">
      <div class="cozy-frame"></div>
      <div class="cozy-circle cc-1"></div>
      <div class="cozy-circle cc-2"></div>
      <div class="paw-decoration paw-top-left">🐾</div>
      <div class="paw-decoration paw-top-right">🐾</div>
      <div class="paw-decoration paw-bottom-left">🐾</div>
      <div class="paw-decoration paw-bottom-right">🐾</div>
      <div class="heart" style="top: 18%; right: 18%; animation-delay: -0.5s;">🏠</div>
      <div class="heart" style="bottom: 20%; left: 15%; animation-delay: -1.8s;">💕</div>
      <div class="heart" style="top: 30%; left: 25%; animation-delay: -3s;">💗</div>
      <div class="slide-content">
        <div class="slide-emoji">🏠</div>
        <h1 class="slide-title">溫暖的歸宿</h1>
        <p class="slide-subtitle">春天醒來、生命的延續、建立自己的家庭</p>
      </div>
    </div>

  </div>

  <!-- Navigation Buttons -->
  <button class="nav-btn prev" id="prevBtn" onclick="changeSlide(-1)">◀</button>
  <button class="nav-btn next" id="nextBtn" onclick="changeSlide(1)">▶</button>

  <!-- Page Indicator -->
  <div class="page-indicator" id="pageIndicator">1 / 5</div>

  <!-- Progress Dots -->
  <div class="progress-dots" id="progressDots">
    <div class="dot active" onclick="goToSlide(0)"></div>
    <div class="dot" onclick="goToSlide(1)"></div>
    <div class="dot" onclick="goToSlide(2)"></div>
    <div class="dot" onclick="goToSlide(3)"></div>
    <div class="dot" onclick="goToSlide(4)"></div>
  </div>

  <script>
    let currentSlide = 0;
    const totalSlides = 5;
    const slidesContainer = document.getElementById('slidesContainer');
    const pageIndicator = document.getElementById('pageIndicator');
    const progressDots = document.getElementById('progressDots');
    const dots = progressDots.querySelectorAll('.dot');

    function updateSlide() {
      // Move slides container
      slidesContainer.style.transform = `translateX(-${currentSlide * 100}vw)`;

      // Update page indicator
      pageIndicator.textContent = `${currentSlide + 1} / ${totalSlides}`;

      // Update progress dots
      dots.forEach((dot, index) => {
        dot.classList.toggle('active', index === currentSlide);
      });

      // Update nav button visibility
      document.getElementById('prevBtn').style.opacity = currentSlide === 0 ? '0.3' : '1';
      document.getElementById('nextBtn').style.opacity = currentSlide === totalSlides - 1 ? '0.3' : '1';
    }

    function changeSlide(direction) {
      const newSlide = currentSlide + direction;
      if (newSlide >= 0 && newSlide < totalSlides) {
        currentSlide = newSlide;
        updateSlide();
      }
    }

    function goToSlide(index) {
      currentSlide = index;
      updateSlide();
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') {
        changeSlide(-1);
      } else if (e.key === 'ArrowRight') {
        changeSlide(1);
      }
    });

    // Touch/swipe support
    let touchStartX = 0;
    let touchEndX = 0;

    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    });

    document.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      handleSwipe();
    });

    function handleSwipe() {
      const swipeThreshold = 50;
      const diff = touchStartX - touchEndX;

      if (Math.abs(diff) > swipeThreshold) {
        if (diff > 0) {
          changeSlide(1); // Swipe left -> next
        } else {
          changeSlide(-1); // Swipe right -> prev
        }
      }
    }

    // Initialize
    updateSlide();
  </script>

</body>
</html>
