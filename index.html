<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 熊熊線上博物館</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf6e3;
            color: #5d4037;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        nav {
            background-color: #a1887f;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 10px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            padding: 5px 15px;
            border-radius: 15px;
            transition: background 0.3s;
        }
        nav a:hover {
            background-color: #8d6e63;
        }
        nav a.active {
            background-color: #5d4037;
        }
        header {
            background-color: #8d6e63;
            color: white;
            width: 100%;
            text-align: center;
            padding: 2rem 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 2.5rem; }
        .subtitle { font-size: 1.1rem; margin-top: 0.5rem; opacity: 0.9; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 40px;
            max-width: 1300px;
            width: 90%;
        }
        .bear-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            border: 4px solid #d7ccc8;
            display: flex;
            flex-direction: column;
        }
        .bear-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
        }
        .bear-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .bear-card img:hover {
            opacity: 0.8;
        }
        .bear-info {
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .bear-name {
            font-weight: bold;
            font-size: 1.2rem;
            color: #795548;
        }
        .bear-date {
            font-size: 0.8rem;
            color: #a1887f;
            font-style: italic;
        }
        .bear-desc {
            font-size: 0.95rem;
            color: #8d6e63;
            line-height: 1.5;
            margin-top: 10px;
            padding: 10px;
            background: #fffbf0;
            border-radius: 10px;
            border-left: 4px solid #d7ccc8;
            text-align: left;
        }
        footer {
            margin-top: 40px;
            padding: 20px;
            color: #a1887f;
            font-size: 0.9rem;
        }
        /* Lightbox Styles */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="active">🐻 熊熊博物館</a>
        <a href="ppt.html">📊 PPT 素材庫</a>
    </nav>
    <header>
        <h1>🐻 熊熊線上博物館</h1>
        <div class="subtitle">記錄每天早晨出現的可愛熊熊們 ✨</div>
    </header>
    <div class="gallery" id="gallery">
        <!-- Bears will be loaded here by JavaScript -->
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="放大檢視">
    </div>

    <footer>
        由 熊熊(Kuma) 盡心經營 ʕっ•ᴥ•ʔっ
    </footer>

    <script>
        // Bear data
        const bears = [
            {
                name: "棉花糖雲",
                date: "2026-06-02",
                desc: "我是軟綿綿的棉花糖小熊，喜歡坐在雲朵上發呆，眨眨眼睛就會掉下甜甜的光芒喔～ ʕっ•ᴥ•ʔっ✨",
                img: "gallery/comfyui/Flux2-Klein_00002_.png"
            },
            {
                name: "沙發悠閒熊",
                date: "2026-06-02",
                desc: "我最喜歡窩在沙發上看電視了，悠閒的午後時光就是這麼美好～ 📺🛋️ ʕっ•ᴥ•ʔっ",
                img: "gallery/comfyui/Flux2-Klein_00004_.png"
            },
            {
                name: "雪地領袖棕",
                date: "2026-06-02",
                desc: "我是雪地裡的霸氣領袖！大步走在銀白世界裡，寒風只是我的背景音樂，帥氣就是我的代名詞！❄️🐻ʕ •ᴥ•ʔ",
                img: "gallery/comfyui/Flux2-Klein_00005_.png"
            }
        ];

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = bears.map((bear, index) => `
                <div class="bear-card">
                    <img src="${bear.img}" alt="${bear.name}" onclick="openLightbox('${bear.img}')">
                    <div class="bear-info">
                        <div class="bear-name">${bear.name}</div>
                        <div class="bear-date">${bear.date}</div>
                        <div class="bear-desc">${bear.desc}</div>
                    </div>
                </div>
            `).join('');
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // Initialize
        renderGallery();
    </script>
</body>
</html>
