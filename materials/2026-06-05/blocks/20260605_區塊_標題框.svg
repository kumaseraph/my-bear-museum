<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <!-- 區塊設計 - 標題框：專業商務風格的標題區塊 -->
  <!-- 比例：16:9 (800x450) -->
  <!-- 風格：現代商務風格、溫暖棕色調 -->
  
  <defs>
    <!-- 背景漸層 -->
    <linearGradient id="blockBgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf6e3"/>
      <stop offset="100%" style="stop-color:#f5ede0"/>
    </linearGradient>
    
    <!-- 邊框漸層 -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5d4037"/>
      <stop offset="50%" style="stop-color:#8d6e63"/>
      <stop offset="100%" style="stop-color:#5d4037"/>
    </linearGradient>
  </defs>
  
  <!-- 主背景 -->
  <rect width="800" height="450" fill="url(#blockBgGrad)" rx="12"/>
  
  <!-- 頂部裝飾線 -->
  <rect x="30" y="30" width="740" height="6" fill="url(#borderGrad)" rx="3"/>
  
  <!-- 左側垂直裝飾線 -->
  <rect x="30" y="60" width="6" height="360" fill="url(#borderGrad)" rx="3"/>
  
  <!-- 底部裝飾線 -->
  <rect x="30" y="414" width="740" height="6" fill="url(#borderGrad)" rx="3"/>
  
  <!-- 右側垂直裝飾線 -->
  <rect x="764" y="60" width="6" height="360" fill="url(#borderGrad)" rx="3"/>
  
  <!-- 四角裝飾方塊 -->
  <rect x="20" y="20" width="26" height="26" fill="#5d4037" opacity="0.8"/>
  <rect x="754" y="20" width="26" height="26" fill="#5d4037" opacity="0.8"/>
  <rect x="20" y="404" width="26" height="26" fill="#5d4037" opacity="0.8"/>
  <rect x="754" y="404" width="26" height="26" fill="#5d4037" opacity="0.8"/>
  
  <!-- 標題預留區（留白） -->
  <rect x="80" y="80" width="640" height="80" fill="#e7d8c9" rx="8" opacity="0.5"/>
  
  <!-- 內容預留區（留白） -->
  <rect x="80" y="200" width="640" height="180" fill="#e7d8c9" rx="8" opacity="0.3"/>
  
  <!-- 底部按鈕預留區 -->
  <rect x="600" y="330" width="120" height="40" fill="#8d6e63" rx="6" opacity="0.6"/>
</svg>