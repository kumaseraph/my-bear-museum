<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 400">
  <defs>
    <linearGradient id="gradVert" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5d4037;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8d6e63;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4037;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 主線 - 垂直 -->
  <line x1="30" y1="10" x2="30" y2="390" stroke="url(#gradVert)" stroke-width="3" stroke-linecap="round"/>
  <!-- 兩端圓點裝飾 -->
  <circle cx="30" cy="10" r="5" fill="#6d4c41"/>
  <circle cx="30" cy="390" r="5" fill="#6d4c41"/>
  <!-- 中間菱形裝飾 -->
  <polygon points="15,200 30,190 45,200 30,210" fill="#a1887f" opacity="0.6"/>
  <!-- 小裝飾線 -->
  <line x1="20" y1="100" x2="40" y2="100" stroke="#d7ccc8" stroke-width="1.5"/>
  <line x1="18" y1="150" x2="42" y2="150" stroke="#d7ccc8" stroke-width="1.5"/>
  <line x1="18" y1="250" x2="42" y2="250" stroke="#d7ccc8" stroke-width="1.5"/>
  <line x1="20" y1="300" x2="40" y2="300" stroke="#d7ccc8" stroke-width="1.5"/>
</svg>