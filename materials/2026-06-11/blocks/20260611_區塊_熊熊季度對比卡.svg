<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180">
  <!-- 熊熊風格對比卡片 - Q1 vs Q2 成果展示 -->
  <defs>
    <linearGradient id="bearGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="50%" style="stop-color:#F5DEB3"/>
      <stop offset="100%" style="stop-color:#E8C9A0"/>
    </linearGradient>
    <linearGradient id="bearBrown" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5A2B"/>
      <stop offset="100%" style="stop-color:#5D3A1A"/>
    </linearGradient>
  </defs>
  
  <!-- 背景 -->
  <rect x="5" y="5" width="390" height="170" rx="15" fill="#FFF8F0"/>
  
  <!-- 左側熊熊頭像 -->
  <circle cx="60" cy="50" r="28" fill="#D4A574"/>
  <circle cx="45" cy="40" r="10" fill="#C49A6C"/>
  <circle cx="75" cy="40" r="10" fill="#C49A6C"/>
  <ellipse cx="60" cy="58" rx="12" ry="8" fill="#5D3A1A"/>
  
  <!-- 左卡片 -->
  <rect x="20" y="90" width="100" height="60" rx="10" fill="#F5E6D3"/>
  <text x="70" y="115" font-family="Arial" font-size="20" font-weight="bold" fill="#8B5A2B" text-anchor="middle">Q1</text>
  <text x="70" y="135" font-family="Arial" font-size="11" fill="#A08060" text-anchor="middle">第一季度</text>
  
  <!-- 中間VS -->
  <circle cx="200" cy="130" r="22" fill="url(#bearBrown)"/>
  <text x="200" y="136" font-family="Arial" font-size="14" font-weight="bold" fill="#F5DEB3" text-anchor="middle">VS</text>
  
  <!-- 右卡片 -->
  <rect x="280" y="90" width="100" height="60" rx="10" fill="#F5E6D3"/>
  <text x="330" y="115" font-family="Arial" font-size="20" font-weight="bold" fill="#8B5A2B" text-anchor="middle">Q2</text>
  <text x="330" y="135" font-family="Arial" font-size="11" fill="#A08060" text-anchor="middle">第二季度</text>
  
  <!-- 右側熊熊頭像 -->
  <circle cx="340" cy="50" r="28" fill="#D4A574"/>
  <circle cx="325" cy="40" r="10" fill="#C49A6C"/>
  <circle cx="355" cy="40" r="10" fill="#C49A6C"/>
  <ellipse cx="340" cy="58" rx="12" ry="8" fill="#5D3A1A"/>
  
  <!-- 上升箭頭裝飾 -->
  <path d="M180 75 L200 55 L220 75 L210 75 L210 95 L190 95 L190 75 Z" fill="#4CAF50" opacity="0.8"/>
  
  <!-- 連接線裝飾 -->
  <path d="M120 120 Q160 100 180 130" stroke="#D4A574" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  <path d="M220 130 Q240 100 280 120" stroke="#D4A574" stroke-width="2" fill="none" stroke-dasharray="4,3"/>
  
  <!-- 頂部標題 -->
  <rect x="130" y="20" width="140" height="30" rx="15" fill="url(#bearGold)"/>
  <text x="200" y="40" font-family="Arial" font-size="14" font-weight="bold" fill="#5D3A1A" text-anchor="middle">📊 季度成長對比</text>
</svg>