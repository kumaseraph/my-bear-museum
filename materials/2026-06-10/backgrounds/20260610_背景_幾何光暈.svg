<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="60%" r="40%">
      <stop offset="0%" style="stop-color:#4ecdc4;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- 背景漸層 -->
  <rect width="1920" height="1080" fill="url(#bg1)"/>
  <!-- 光暈效果 -->
  <ellipse cx="600" cy="400" rx="800" ry="600" fill="url(#glow1)"/>
  <ellipse cx="1400" cy="600" rx="600" ry="500" fill="url(#glow2)"/>
  <!-- 幾何裝飾線 -->
  <line x1="0" y1="200" x2="400" y2="0" stroke="#e94560" stroke-width="2" opacity="0.3"/>
  <line x1="1920" y1="300" x2="1500" y2="0" stroke="#4ecdc4" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="880" x2="500" y2="1080" stroke="#4ecdc4" stroke-width="2" opacity="0.3"/>
  <line x1="1920" y1="780" x2="1400" y2="1080" stroke="#e94560" stroke-width="2" opacity="0.3"/>
  <!-- 三角形裝飾 -->
  <polygon points="100,100 200,50 200,150" fill="#e94560" opacity="0.2"/>
  <polygon points="1800,950 1700,1000 1700,900" fill="#4ecdc4" opacity="0.2"/>
  <!-- 圓點裝飾 -->
  <circle cx="300" cy="200" r="5" fill="#ffe66d" opacity="0.6"/>
  <circle cx="500" cy="150" r="3" fill="#ffe66d" opacity="0.4"/>
  <circle cx="1600" cy="900" r="5" fill="#ffe66d" opacity="0.6"/>
  <circle cx="1700" cy="950" r="3" fill="#ffe66d" opacity="0.4"/>
  <!-- 底部裝飾帶 -->
  <rect x="0" y="1000" width="1920" height="80" fill="#e94560" opacity="0.1"/>
</svg>