<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <!-- 商務報告全框邊框 — 簡潔專業風格 -->
  <style>
    .frame-main { fill: none; stroke: #2c3e50; stroke-width: 4; }
    .frame-accent { fill: none; stroke: #5d8aa8; stroke-width: 2; }
    .corner { fill: none; stroke: #2c3e50; stroke-width: 4; stroke-linecap: round; }
  </style>

  <!-- 外框主要線條 -->
  <rect x="20" y="20" width="920" height="500" rx="8" class="frame-main"/>

  <!-- 內框裝飾線 -->
  <rect x="32" y="32" width="896" height="476" rx="4" class="frame-accent"/>

  <!-- 左上角裝飾 -->
  <path d="M20 70 L20 20 L70 20" class="corner"/>
  <circle cx="20" cy="20" r="6" fill="#2c3e50"/>

  <!-- 右上角裝飾 -->
  <path d="M890 20 L940 20 L940 70" class="corner"/>
  <circle cx="940" cy="20" r="6" fill="#2c3e50"/>

  <!-- 左下角裝飾 -->
  <path d="M20 470 L20 520 L70 520" class="corner"/>
  <circle cx="20" cy="520" r="6" fill="#2c3e50"/>

  <!-- 右下角裝飾 -->
  <path d="M890 520 L940 520 L940 470" class="corner"/>
  <circle cx="940" cy="520" r="6" fill="#2c3e50"/>

  <!-- 四邊小裝飾線 -->
  <line x1="50" y1="20" x2="80" y2="20" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="880" y1="20" x2="910" y2="20" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="50" y1="520" x2="80" y2="520" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="880" y1="520" x2="910" y2="520" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="20" y1="50" x2="20" y2="80" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="20" y1="460" x2="20" y2="490" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="940" y1="50" x2="940" y2="80" stroke="#5d8aa8" stroke-width="2"/>
  <line x1="940" y1="460" x2="940" y2="490" stroke="#5d8aa8" stroke-width="2"/>
</svg>