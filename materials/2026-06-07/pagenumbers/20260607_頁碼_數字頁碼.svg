<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 60">
  <defs>
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9"/>
      <stop offset="100%" style="stop-color:#2E5A8B"/>
    </linearGradient>
    <filter id="pageShadow" x="-15%" y="-30%" width="130%" height="160%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 頁碼框背景 -->
  <rect x="5" y="5" width="50" height="50" rx="8" ry="8" fill="url(#pageGrad)" filter="url(#pageShadow)"/>
  
  <!-- 頁碼數字 -->
  <text x="30" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">01</text>
  
  <!-- 總頁數裝飾 -->
  <text x="90" y="35" font-family="Arial, sans-serif" font-size="12" fill="#666666" text-anchor="middle">/</text>
  <text x="105" y="38" font-family="Arial, sans-serif" font-size="14" fill="#888888" text-anchor="middle">10</text>
  
  <!-- 分隔線裝飾 -->
  <line x1="65" y1="25" x2="65" y2="35" stroke="#CCCCCC" stroke-width="1.5" stroke-linecap="round"/>
</svg>