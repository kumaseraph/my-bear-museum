            // Render dots
            dotsContainer.innerHTML = '';
            const dotsFragment = document.createDocumentFragment();
            featuredList.forEach((_, i) => {
                const dot = document.createElement('span');
                dot.className = 'big-carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToBigCarouselSlide(i);
                dotsFragment.appendChild(dot);
            });
            dotsContainer.appendChild(dotsFragment);

            updateBigCarouselCards();
            updateFeaturedQuote();

            // Nav button events
            prevBtn.onclick = () => { prevBigCarousel(); stopBigCarouselAutoplay(); };
            nextBtn.onclick = () => { nextBigCarousel(); stopBigCarouselAutoplay(); };

            // Touch events (bind once — renderFeaturedCarousel may run again after stars load)
            if (!bigCarouselTouchSetup) {
                setupBigCarouselTouch();
                bigCarouselTouchSetup = true;
            }

            startBigCarouselAutoplay();
        }

        // 循環偏移：以 bigCarouselIndex 為中心，左負右正（-2～+2）
        function getBigCarouselOffset(listIndex, centerIndex, total) {
            if (total <= 1) return listIndex === centerIndex ? 0 : null;
            let offset = listIndex - centerIndex;
            offset = ((offset % total) + total) % total;
            if (offset > Math.floor(total / 2)) offset -= total;
            return offset;
        }

        function offsetToCarouselClass(offset) {
            if (offset === 0) return 'center';
            if (offset === -1) return 'side-left';
            if (offset === 1) return 'side-right';
            if (offset === -2) return 'far-left';
            if (offset === 2) return 'far-right';
            return 'hidden';
        }

        function updateBigCarouselCards() {
            const track = document.getElementById('bigCarouselTrack');
            if (!track) return;
            const cards = track.querySelectorAll('.featured-card');
            const total = featuredList.length;

            cards.forEach((card, i) => {
                const offset = getBigCarouselOffset(i, bigCarouselIndex, total);
                card.className = 'featured-card ' + (offset === null ? 'hidden' : offsetToCarouselClass(offset));
            });

            // Update dots
            document.querySelectorAll('.big-carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === bigCarouselIndex);
            });
        }

        function updateFeaturedQuote() {
            const quoteSection = document.getElementById('featuredQuoteSection');
            if (featuredList.length === 0) {
                quoteSection.innerHTML = '';
                return;
            }
            const bear = featuredList[bigCarouselIndex];
            quoteSection.innerHTML = `
                <div class="featured-quote-text">「${bear.quote}」</div>
                <div class="featured-quote-author">── ${bear.name} No.${bear.collectionNo}</div>
            `;
        }

        function goToBigCarouselSlide(index) {
            bigCarouselIndex = index;
            updateBigCarouselCards();
            updateFeaturedQuote();
        }

        function nextBigCarousel() {
            bigCarouselIndex = (bigCarouselIndex + 1) % featuredList.length;
            updateBigCarouselCards();
            updateFeaturedQuote();
        }

        function prevBigCarousel() {
            bigCarouselIndex = (bigCarouselIndex - 1 + featuredList.length) % featuredList.length;
            updateBigCarouselCards();
            updateFeaturedQuote();
        }

        function startBigCarouselAutoplay() {
            stopBigCarouselAutoplay();
            bigCarouselAutoplayInterval = setInterval(nextBigCarousel, 5000);
        }

        function stopBigCarouselAutoplay() {
            if (bigCarouselAutoplayInterval) {
                clearInterval(bigCarouselAutoplayInterval);
                bigCarouselAutoplayInterval = null;
            }
        }

        function setupBigCarouselTouch() {
            const track = document.getElementById('bigCarouselTrack');
            let touchStartX = 0;
            let touchEndX = 0;

            track.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
                stopBigCarouselAutoplay();
            }, { passive: true });

            track.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                const diff = touchStartX - touchEndX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) nextBigCarousel();
                    else prevBigCarousel();
                }
                startBigCarouselAutoplay();
            }, { passive: true });

            track.addEventListener('mouseenter', stopBigCarouselAutoplay);
            track.addEventListener('mouseleave', startBigCarouselAutoplay);

            document.addEventListener('visibilitychange', () => {
                if (document.hidden) stopBigCarouselAutoplay();
                else startBigCarouselAutoplay();
            });
        }

        function goToSlide(index) {
            carouselIndex = index;
            document.querySelectorAll('.carousel-slide').forEach((slide, i) => {
                slide.classList.toggle('active', i === index);
            });
            document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function nextSlide() {
            carouselIndex = (carouselIndex + 1) % carouselTotal;
            goToSlide(carouselIndex);
        }

        function prevSlide() {
            carouselIndex = (carouselIndex - 1 + carouselTotal) % carouselTotal;
            goToSlide(carouselIndex);
        }

        // Open bear modal by reference string (掛到 window 上供 inline onclick調用)
        window.openBearModalByRef = function(ref, group = null) {
            if (ref === 'opening') {
                openBearModal(0);
            } else {
                const refNum = parseInt(ref);
                // Find the bear by collectionNo, ensuring type compatibility
                const bear = (group && group.find(b => parseInt(b.collectionNo) === refNum)) || 
                             bears.find(b => parseInt(b.collectionNo) === refNum);
                
                if (bear) {
                    // Use the provided group for carousel navigation, otherwise just the bear
                    openBearModalByBear(bear, group || null);
                }
            }
        };

        // Mobile nav toggle
        function toggleNav() {
            document.getElementById('mainNav').classList.toggle('expanded');
        }



        // Search functionality
        function handleSearch(query) {
            const resultsDiv = document.getElementById('searchResults');
            if (!query || query.length < 1) {
                resultsDiv.classList.remove('show');
                return;
            }
            const lowerQuery = query.toLowerCase();
            const results = bears.filter(b =>
                String(b.collectionNo).padStart(4, '0').includes(query) ||
                b.name.toLowerCase().includes(lowerQuery) ||
                b.date.includes(query)
            );
            // Also include opening bear
            if (String(featuredBear.collectionNo).padStart(4, '0').includes(query) ||
                featuredBear.name.toLowerCase().includes(lowerQuery)) {
                results.unshift(featuredBear);
            }
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="search-result-item">找不到符合的熊熊</div>';
            } else {
                resultsDiv.innerHTML = results.map(b => `
                    <div class="search-result-item" onclick="openBearModalByRef('${b.collectionNo === featuredBear.collectionNo ? 'opening' : b.collectionNo}'); document.getElementById('searchResults').classList.remove('show'); document.getElementById('searchInput').value = '';">
                        <strong>No.${String(b.collectionNo).padStart(4, '0')}</strong> ${b.name}
                    </div>
                `).join('');
            }
            resultsDiv.classList.add('show');
        }

        // Month modal navigation
        let currentMonthBears = [];
        let currentMonthIndex = 0;

        function openMonthModal(month) {
            const [year, m] = month.split('-');
            document.getElementById('monthModalTitle').textContent = `${year}年${parseInt(m)}月 館藏`;
            
            const grid = document.getElementById('monthModalGrid');
            grid.innerHTML = '';
            
            // Filter bears by month
            currentMonthBears = bears.filter(b => b.date.substring(0, 7) === month);
            
            // Sort by date ascending (oldest first)
            currentMonthBears.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            // Add opening bear if it's the opening month
            if (month === openDate.substring(0, 7)) {
                currentMonthBears.unshift(featuredBear);
            }
            currentMonthIndex = 0;
            
            renderMonthModalContent();
            document.getElementById('monthModal').classList.add('active');
        }

        function renderMonthModalContent() {
            const grid = document.getElementById('monthModalGrid');
            grid.innerHTML = '';
            const bear = currentMonthBears[currentMonthIndex];
            if (!bear) return;
            
            const thumb = document.createElement('div');
            thumb.className = 'bear-thumb featured-month-bear';
            thumb.style.cssText = 'width: 150px; height: 180px;';
            thumb.onclick = () => { closeMonthModal(); openBearModalByRef(bear.collectionNo === featuredBear.collectionNo ? 'opening' : bear.collectionNo); };
            thumb.innerHTML = `
                <button class="star-btn${starredBears.includes(bear.collectionNo) ? ' starred' : ''}" data-no="${bear.collectionNo}" onclick="toggleStar(${bear.collectionNo}, event)">${starredBears.includes(bear.collectionNo) ? '★' : '☆'}</button>
                <div class="thumb-circle" style="width: 120px; height: 120px;"><img src="${bear.img}" alt="${bear.name}" loading="lazy"></div>
                <div class="thumb-name">${bear.name}</div>
            `;
            grid.appendChild(thumb);
            
            // Update counter
            const counter = document.getElementById('monthModalCounter');
            if (counter) counter.textContent = `${currentMonthIndex + 1} / ${currentMonthBears.length}`;
            
            // Update nav buttons
            updateMonthNavButtons();
        }

        function updateMonthNavButtons() {
            const prevBtn = document.getElementById('monthModalPrev');
            const nextBtn = document.getElementById('monthModalNext');
            if (prevBtn) prevBtn.style.opacity = currentMonthIndex > 0 ? '1' : '0.3';
            if (nextBtn) nextBtn.style.opacity = currentMonthIndex < currentMonthBears.length - 1 ? '1' : '0.3';
        }

        function prevMonthBear() {
            if (currentMonthIndex > 0) {
                currentMonthIndex--;
                renderMonthModalContent();
            }
        }

        function nextMonthBear() {
            if (currentMonthIndex < currentMonthBears.length - 1) {
                currentMonthIndex++;
                renderMonthModalContent();
            }
        }

        // Keyboard navigation for month modal
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('monthModal');
            if (modal.classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevMonthBear();
                if (e.key === 'ArrowRight') nextMonthBear();
                if (e.key === 'Escape') closeMonthModal({target: document.getElementById('monthModal')});
            }
        });

        // Close search when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-box')) {
                document.getElementById('searchResults').classList.remove('show');
            }
        });

        // Touch swipe support for carousel
        function setupCarouselSwipe() {
            const carouselEl = document.getElementById('featuredCarousel');
            if (!carouselEl) return;
            let touchStartX = 0;
            let touchEndX = 0;
            carouselEl.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            carouselEl.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                if (touchStartX - touchEndX > 50) nextSlide();
                if (touchEndX - touchStartX > 50) prevSlide();
            }, { passive: true });
        }

        // Initialize swipe on page load
        setupCarouselSwipe();

        // 初始化：從 API 載入星星
        (async function initStars() {
            await loadStarsFromAPI();
            updateStarButtons();
            updateFeaturedBears();
            // 修復靜態 HTML 中的 ${featuredBear.collectionNo} 未解析問題
            const featuredStarBtn = document.getElementById('featuredStarBtn');
            if (featuredStarBtn && typeof featuredBear !== 'undefined') {
                featuredStarBtn.dataset.no = featuredBear.collectionNo;
                featuredStarBtn.setAttribute('onclick', `toggleStar(${featuredBear.collectionNo}, event)`);
            }
        })();

        // Register PWA service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>

    <!-- Random Modal -->
    <div class="random-modal" id="randomModal">
        <div class="random-modal-content">
            <img class="random-modal-img" id="randomImg" src="" alt="隨機熊熊">
            <div class="random-modal-name" id="randomName"></div>
            <div class="random-modal-title" id="randomTitle"></div>
            <div class="random-modal-quote" id="randomQuote"></div>
            <div class="random-modal-actions">
                <button class="random-btn random-btn-secondary" id="randomCloseBtn">關閉</button>
                <button class="random-btn random-btn-primary" id="randomAgainBtn">再看一隻 🎲</button>
            </div>
        </div>
    </div>
</body>
</html>
