<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <!-- Gradient Background - Professional Blue Theme -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F4FD;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D0E8FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8DCF8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#4A90D9;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-gradient)"/>
  <rect width="800" height="600" fill="url(#accent-gradient)"/>
  <circle cx="700" cy="100" r="150" fill="#4A90D9" opacity="0.05"/>
  <circle cx="100" cy="500" r="200" fill="#5BA0E8" opacity="0.05"/>
  <circle cx="400" cy="300" r="300" fill="#6BB0F7" opacity="0.03"/>
</svg>