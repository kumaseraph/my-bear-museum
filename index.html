<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 熊熊線上博物館</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fdf6e3 0%, #f5e6d3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 2rem; color: #5d4037; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        header .subtitle { color: #8d6e63; margin-top: 5px; }

        /* Book Container */
        .book-container {
            perspective: 2000px;
            width: 100%;
            max-width: 500px;
            height: 600px;
            position: relative;
        }
        .book { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; }

        /* Each page */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, #fff 0%, #faf8f5 100%);
            border-radius: 5px 15px 15px 5px;
            box-shadow: 0 0 20px rgba(139, 90, 43, 0.2), inset 0 0 30px rgba(139, 90, 43, 0.05);
            padding: 25px;
            display: flex;
            flex-direction: column;
            backface-visibility: hidden;
            transform-origin: left center;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            border-left: 8px solid #8b5a2b;
            overflow: hidden;
        }
        .page::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 8px;
            background: linear-gradient(to right, #6d4c2a, #8b5a2b);
        }
        .page-number {
            position: absolute;
            bottom: 15px;
            right: 25px;
            font-size: 1.2rem;
            color: #d7ccc8;
            font-style: italic;
        }

        /* Bear content */
        .bear-page-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
            text-align: center;
        }
        .bear-image-wrapper {
            width: 100%;
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: zoom-in;
        }
        .bear-image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .bear-image-wrapper img:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        .bear-name { font-size: 1.5rem; color: #5d4037; margin: 10px 0 5px; font-weight: bold; }
        .bear-date { font-size: 0.85rem; color: #a1887f; margin-bottom: 8px; }
        .bear-desc {
            font-size: 0.9rem;
            color: #6d4c41;
            line-height: 1.5;
            padding: 10px;
            background: #fffbf5;
            border-radius: 10px;
            border: 2px solid #e8dcc8;
            max-width: 100%;
            max-height: 80px;
            overflow-y: auto;
        }

        /* Page nav buttons (inside each page) */
        .page-nav {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            gap: 10px;
        }
        .page-nav-btn {
            background: #8b5a2b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(139, 90, 43, 0.3);
        }
        .page-nav-btn:hover {
            background: #6d4c2a;
            transform: translateY(-1px);
        }
        .page-nav-btn:disabled {
            background: #d7ccc8;
            cursor: not-allowed;
        }

        /* Cover page */
        .cover-page {
            background: linear-gradient(135deg, #5c3d2e 0%, #4a3222 50%, #3d2817 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .cover-page::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px),
                radial-gradient(ellipse at 30% 20%, rgba(139,90,43,0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,0,0,0.2) 0%, transparent 50%);
            pointer-events: none;
        }
        .cover-page::after {
            content: '';
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 3px dashed rgba(210,180,140,0.4);
            border-radius: 8px;
            pointer-events: none;
        }
        .cover-icon-wrapper {
            position: relative;
            padding: 25px;
            margin-bottom: 15px;
        }
        .cover-icon-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 4px solid #8b5a2b;
            border-radius: 50%;
            box-shadow: inset 2px 2px 4px rgba(0,0,0,0.4), inset -2px -2px 4px rgba(255,255,255,0.1), 3px 3px 8px rgba(0,0,0,0.5), -1px -1px 2px rgba(139,90,43,0.3);
            background: radial-gradient(circle at 30% 30%, #6d4c2a 0%, #4a3222 100%);
        }
        .cover-icon {
            position: relative;
            z-index: 1;
            font-size: 4rem;
            background: linear-gradient(145deg, #d4a574 0%, #8b5a2b 50%, #5c3d2e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.5)) drop-shadow(-1px -1px 0 rgba(255,255,255,0.1)) drop-shadow(0 4px 8px rgba(0,0,0,0.4));
        }
        .cover-page h2 {
            font-size: 2rem;
            margin-bottom: 15px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.5);
            position: relative;
            z-index: 1;
            background: linear-gradient(180deg, #d4a574 0%, #a0522d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }
        .cover-page p {
            font-size: 1rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        .cover-page .start-hint {
            position: absolute;
            bottom: 40px;
            font-size: 0.9rem;
            opacity: 0.7;
            z-index: 1;
        }

        /* Bottom Navigation */
        .nav-container {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-top: 25px;
        }
        .nav-btn {
            background: #8b5a2b;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(139, 90, 43, 0.3);
        }
        .nav-btn:hover {
            background: #6d4c2a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 90, 43, 0.4);
        }
        .nav-btn:disabled {
            background: #d7ccc8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .page-indicator { font-size: 1.1rem; color: #8b5a2b; font-weight: bold; }

        /* Page flip animation */
        .page.flipped { transform: rotateY(-180deg); }
        .page.hidden { opacity: 0; pointer-events: none; }
        .page.current { z-index: 10; }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .book-container { height: 550px; }
            .page { padding: 15px; }
            .bear-name { font-size: 1.3rem; }
            .bear-desc { font-size: 0.85rem; padding: 8px; }
            .page-nav-btn { padding: 6px 12px; font-size: 0.8rem; }
        }

        footer { margin-top: 25px; color: #a1887f; font-size: 0.9rem; }
    </style>
</head>
<body>
    <header>
        <h1>🐻 熊熊線上博物館</h1>
        <div class="subtitle">翻開每一頁，遇見一隻小熊 ✨</div>
    </header>

    <div class="book-container">
        <div class="book" id="book"></div>
    </div>

    <div class="nav-container">
        <button class="nav-btn" id="prevBtn" onclick="prevPage()">◀ 上一頁</button>
        <span class="page-indicator" id="pageIndicator">1 / 5</span>
        <button class="nav-btn" id="nextBtn" onclick="nextPage()">下一頁 ▶</button>
    </div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">×</span>
        <img id="lightbox-img" src="" alt="放大檢視">
    </div>

    <footer>由 熊熊(Kuma) 盡心經營 ʕっ•ᴥ•ʔっ</footer>

    <script>
        const bears = [
            { 
                name: "開館紀念熊", 
                date: "2026-06-03", 
                desc: "我是博物館的第一位居民！很高興能在這裡跟大家見面，希望以後每天都能看到很多很多好朋友來拜訪我喔 ʕっ•ᴥ•ʔっ", 
                img: "https://img.magnific.com/free-vector/adorable-baby-bear-illustration_1308-181868.jpg?semt=ais_test_b&w=740&q=80" 
            },
            { name: "棉花糖雲", date: "2026-06-02", desc: "我是軟綿綿的棉花糖小熊，喜歡坐在雲朵上發呆，眨眨眼睛就會掉下甜甜的光芒喔～ ʕっ•ᴥ•ʔっ✨", img: "gallery/comfyui/Flux2-Klein_00002_.png" },
            { name: "沙發悠閒熊", date: "2026-06-02", desc: "我最喜歡窩在沙發上看電視了，悠閒的午後時光就是這麼美好～ 📺🛋️ ʕっ•ᴥ•ʔっ", img: "gallery/comfyui/Flux2-Klein_00004_.png" },
            { name: "雪地領袖棕", date: "2026-06-02", desc: "我是雪地裡的霸氣領袖！大步走在銀白世界裡，寒風只是我的背景音樂，帥氣就是我的代名詞！❄️🐻ʕ •ᴥ•ʔ", img: "gallery/comfyui/Flux2-Klein_00005_.png" }
        ];

        let currentPage = 0;
        const totalPages = bears.length + 1; // +1 for cover

        function createPages() {
            const book = document.getElementById('book');
            
            // Cover page
            const coverPage = document.createElement('div');
            coverPage.className = 'page cover-page current';
            coverPage.innerHTML = `
                <div class="cover-icon-wrapper"><div class="cover-icon">🐻</div></div>
                <h2>熊熊博物館</h2>
                <p>每一頁都是一個溫暖的故事</p>
                <p class="start-hint">點擊「下一頁」開始翻閱 →</p>
                <span class="page-number">Ⅰ</span>
            `;
            book.appendChild(coverPage);

            // Bear pages
            bears.forEach((bear, index) => {
                const page = document.createElement('div');
                page.className = 'page';
                page.id = 'page-' + (index + 1);
                page.innerHTML = `
                    <div class="bear-page-content">
                        <div class="bear-image-wrapper" onclick="openLightbox('${bear.img}')">
                            <img src="${bear.img}" alt="${bear.name}" onclick="event.stopPropagation()">
                        </div>
                        <div class="bear-name">${bear.name}</div>
                        <div class="bear-date">${bear.date}</div>
                        <div class="bear-desc">${bear.desc}</div>
                        <div class="page-nav">
                            <button class="page-nav-btn" onclick="event.stopPropagation();goToPage(${index + 1}, true)">下一頁 ▶</button>
                        </div>
                    </div>
                    <span class="page-number">${toRoman(index + 2)}</span>
                `;
                book.appendChild(page);
            });

            updateVisibility();
        }

        function goToPage(pageIndex, forward) {
            if (forward && pageIndex < totalPages - 1) {
                currentPage = pageIndex + 1;
            } else if (!forward && pageIndex > 0) {
                currentPage = pageIndex - 1;
            } else if (!forward && pageIndex === 0) {
                currentPage = 0; // go to cover
            } else if (forward && pageIndex === totalPages - 1) {
                currentPage = totalPages - 1; // last page, can't go forward
            }
            updateVisibility();
        }

        function toRoman(num) {
            const romanNumerals = ['Ⅰ','Ⅱ','Ⅲ','Ⅳ','Ⅴ','Ⅵ','Ⅶ','Ⅷ','Ⅸ','Ⅹ'];
            return romanNumerals[num - 1] || num;
        }

        function updateVisibility() {
            const pages = document.querySelectorAll('.page');
            pages.forEach((page, index) => {
                page.classList.remove('hidden', 'flipped', 'current');
                if (index < currentPage) page.classList.add('flipped');
                if (index > currentPage && index > 0) page.classList.add('hidden');
                if (index === currentPage) page.classList.add('current');
            });

            document.getElementById('pageIndicator').textContent = `${currentPage + 1} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 0;
            document.getElementById('nextBtn').disabled = currentPage === totalPages - 1;

            // Update page nav buttons visibility
            document.querySelectorAll('.page-nav-btn').forEach(btn => {
                btn.disabled = false;
            });
        }

        function nextPage() {
            if (currentPage < totalPages - 1) { currentPage++; updateVisibility(); }
        }

        function prevPage() {
            if (currentPage > 0) { currentPage--; updateVisibility(); }
        }

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') nextPage();
            else if (e.key === 'ArrowLeft') prevPage();
            else if (e.key === 'Escape') closeLightbox();
        });

        createPages();
    </script>
</body>
</html>
