<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 四角邊框 - 頂部左角裝飾：工作報告主題角落裝飾 -->
  <!-- 比例：100x100 (方塊形) -->
  <!-- 風格：Monoline 線性風格、統一 2px 線寬、溫暖棕色調 -->
  
  <!-- 外層方框 -->
  <rect x="5" y="5" width="90" height="90" fill="none" stroke="#5d4037" stroke-width="2" opacity="0.3"/>
  
  <!-- 內層方框 -->
  <rect x="15" y="15" width="70" height="70" fill="none" stroke="#8d6e63" stroke-width="1.5" opacity="0.4"/>
  
  <!-- 左上角 L 形轉角 -->
  <polyline points="20,5 20,20 5,20" fill="none" stroke="#5d4037" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 內部小方塊裝飾 -->
  <rect x="20" y="20" width="12" height="12" fill="#8d6e63" opacity="0.3"/>
  
  <!-- 圓形裝飾 -->
  <circle cx="20" cy="20" r="4" fill="#5d4037" opacity="0.5"/>
  
  <!-- 底部短線裝飾 -->
  <line x1="5" y1="80" x2="30" y2="80" stroke="#d7ccc8" stroke-width="1.5" opacity="0.4"/>
  
  <!-- 右側短線裝飾 -->
  <line x1="80" y1="5" x2="80" y2="30" stroke="#d7ccc8" stroke-width="1.5" opacity="0.4"/>
</svg>