<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 熊熊線上博物館</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Microsoft JhengHei', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fdf6e3 0%, #f5e6d3 100%);
            min-height: 100vh;
            padding: 20px;
        }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-size: 2rem; color: #5d4037; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        header .subtitle { color: #8d6e63; margin-top: 5px; }

        /* Grid Layout */
        .bears-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Bear Card */
        .bear-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(139, 90, 43, 0.15);
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        .bear-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(139, 90, 43, 0.25);
        }

        /* Opening commemorative bear - special styling */
        .bear-card.featured {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: row;
            align-items: center;
            background: linear-gradient(135deg, #5c3d2e 0%, #4a3222 100%);
            color: white;
        }
        .bear-card.featured .bear-image-wrapper {
            width: 300px;
            height: 250px;
            border-radius: 16px 0 0 16px;
            flex-shrink: 0;
        }
        .bear-card.featured .bear-info {
            padding: 30px;
            flex: 1;
        }
        .bear-card.featured .bear-name {
            color: #d4a574;
            font-size: 1.8rem;
        }
        .bear-card.featured .bear-date {
            color: #a1887f;
        }
        .bear-card.featured .bear-desc {
            background: rgba(0,0,0,0.2);
            color: #f5e6d3;
            border: none;
        }

        .bear-image-wrapper {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background: #f5f0e8;
        }
        .bear-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        .bear-card:hover .bear-image-wrapper img {
            transform: scale(1.05);
        }

        .bear-info { padding: 15px; }
        .bear-name { font-size: 1.2rem; color: #5d4037; margin-bottom: 5px; font-weight: bold; }
        .bear-date { font-size: 0.85rem; color: #a1887f; margin-bottom: 10px; }
        .bear-desc {
            font-size: 0.9rem;
            color: #6d4c41;
            line-height: 1.5;
            padding: 10px;
            background: #faf8f5;
            border-radius: 10px;
            border: 2px solid #e8dcc8;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }
        .lightbox.active { display: flex; }
        .lightbox img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        /* Featured badge */
        .featured-badge {
            display: inline-block;
            background: linear-gradient(135deg, #d4a574, #8b5a2b);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 8px;
        }

        footer { text-align: center; margin-top: 40px; color: #a1887f; font-size: 0.9rem; }

        /* Mobile responsive */
        @media (max-width: 600px) {
            .bear-card.featured {
                flex-direction: column;
            }
            .bear-card.featured .bear-image-wrapper {
                width: 100%;
                height: 200px;
                border-radius: 16px 16px 0 0;
            }
            .bear-card.featured .bear-info {
                padding: 20px;
            }
            .bear-card.featured .bear-name {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🐻 熊熊線上博物館</h1>
        <div class="subtitle">每一個卡片都是一個溫暖的故事 ✨</div>
    </header>

    <div class="bears-grid" id="bearsGrid"></div>

    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">×</span>
        <img id="lightbox-img" src="" alt="放大檢視">
    </div>

    <footer>由 熊熊(Kuma) 盡心經營 ʕっ•ᴥ•ʔっ</footer>

    <script>
        const bears = [
            { 
                name: "雲朵綿綿", 
                date: "2026-06-04", 
                desc: "今天發現了一朵好香的花，想分享給你！", 
                img: "bears/2026-06-04/白熊_水彩_20260604_01.png" 
            },
            { 
                name: "蜜糖爪爪", 
                date: "2026-06-04", 
                desc: "這罐蜂蜜是特別留給好朋友的喔！", 
                img: "bears/2026-06-04/棕熊_3D_20260604_02.png" 
            },
            { 
                name: "玫瑰糖糖", 
                date: "2026-06-04", 
                desc: "今天的夕陽好美，想和你一起看～", 
                img: "bears/2026-06-04/粉熊_油畫_20260604_03.png" 
            },
            { 
                name: "星海泡泡", 
                date: "2026-06-04", 
                desc: "我在星星堆裡找到了一顆最亮的寶石！", 
                img: "bears/2026-06-04/藍熊_奇幻_20260604_04.png" 
            },
            { 
                name: "方塊糖糖", 
                date: "2026-06-04", 
                desc: "雖然我只是方方的，但我們的友誼是滿滿的！", 
                img: "bears/2026-06-04/灰熊_像素_20260604_05.png" 
            },
            { 
                name: "棉花糖雲", 
                date: "2026-06-02", 
                desc: "我是軟綿綿的棉花糖小熊，喜歡坐在雲朵上發呆，眨眨眼睛就會掉下甜甜的光芒喔～ ʕっ•ᴥ•ʔっ✨", 
                img: "gallery/comfyui/Flux2-Klein_00002_.png" 
            },
            { 
                name: "沙發悠閒熊", 
                date: "2026-06-02", 
                desc: "我最喜歡窩在沙發上看電視了，悠閒的午後時光就是這麼美好～ 📺🛋️ ʕっ•ᴥ•ʔっ", 
                img: "gallery/comfyui/Flux2-Klein_00004_.png" 
            },
            { 
                name: "雪地領袖棕", 
                date: "2026-06-02", 
                desc: "我是雪地裡的霸氣領袖！大步走在銀白世界裡，寒風只是我的背景音樂，帥氣就是我的代名詞！❄️🐻ʕ •ᴥ•ʔ", 
                img: "gallery/comfyui/Flux2-Klein_00005_.png" 
            }
        ];

        // 分離開館紀念熊和其他熊熊
        const commemorativeBear = { 
            name: "開館紀念熊", 
            date: "2026-06-03", 
            desc: "我是博物館的第一位居民！很高興能在這裡跟大家見面，希望以後每天都能看到很多很多好朋友來拜訪我喔 ʕっ•ᴥ•ʔっ", 
            img: "https://img.magnific.com/free-vector/adorable-baby-bear-illustration_1308-181868.jpg?semt=ais_test_b&w=740&q=80",
            featured: true 
        };

        // 其他熊熊按照日期排序（舊的在前）
        const sortedBears = [...bears].sort((a, b) => new Date(a.date) - new Date(b.date));

        function renderCards() {
            const grid = document.getElementById('bearsGrid');
            
            // 第一張：開館紀念熊
            grid.appendChild(createCard(commemorativeBear));
            
            // 其他熊熊
            sortedBears.forEach(bear => {
                grid.appendChild(createCard(bear));
            });
        }

        function createCard(bear) {
            const card = document.createElement('div');
            card.className = 'bear-card' + (bear.featured ? ' featured' : '');
            
            card.innerHTML = `
                <div class="bear-image-wrapper" onclick="openLightbox('${bear.img}')">
                    <img src="${bear.img}" alt="${bear.name}">
                </div>
                <div class="bear-info">
                    ${bear.featured ? '<span class="featured-badge">⭐ 開館紀念</span>' : ''}
                    <div class="bear-name">${bear.name}</div>
                    <div class="bear-date">${bear.date}</div>
                    <div class="bear-desc">${bear.desc}</div>
                </div>
            `;
            return card;
        }

        function openLightbox(src) {
            const lb = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = src;
            lb.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });

        renderCards();
    </script>
</body>
</html>
