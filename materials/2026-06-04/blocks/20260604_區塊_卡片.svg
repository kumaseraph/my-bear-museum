<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <!-- Card block - Academic/business style -->
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#faf8f5;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect x="20" y="20" width="360" height="260" rx="12" fill="url(#cardGrad)" stroke="#5d4037" stroke-width="3"/>
  <!-- Top accent bar -->
  <rect x="20" y="20" width="360" height="8" rx="4" fill="#8d6e63"/>
  <!-- Title area -->
  <rect x="40" y="50" width="120" height="20" rx="4" fill="#a1887f" opacity="0.3"/>
  <rect x="40" y="50" width="80" height="20" rx="4" fill="#5d4037"/>
  <!-- Content lines -->
  <rect x="40" y="90" width="300" height="8" rx="4" fill="#d7ccc8"/>
  <rect x="40" y="110" width="280" height="8" rx="4" fill="#e7d8c9"/>
  <rect x="40" y="130" width="260" height="8" rx="4" fill="#e7d8c9"/>
  <rect x="40" y="150" width="240" height="8" rx="4" fill="#e7d8c9"/>
  <!-- Bottom section -->
  <rect x="40" y="190" width="140" height="50" rx="8" fill="#fdf6e3" stroke="#a1887f" stroke-width="2"/>
  <text x="110" y="220" font-family="Arial, sans-serif" font-size="14" fill="#5d4037" text-anchor="middle">查看更多</text>
  <!-- Decorative corner -->
  <path d="M350 50 L360 40 L360 50 Z" fill="#8d6e63" opacity="0.5"/>
</svg>