<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐻 熊熊線上博物館</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf6e3;
            color: #5d4037;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            background-color: #8d6e63;
            color: white;
            width: 100%;
            text-align: center;
            padding: 2rem 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 2.5rem; }
        .subtitle { font-size: 1.1rem; margin-top: 0.5rem; opacity: 0.9; }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1200px;
            width: 90%;
        }
        .bear-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            border: 4px solid #d7ccc8;
        }
        .bear-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .bear-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .bear-info {
            padding: 15px;
            text-align: center;
        }
        .bear-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
            color: #795548;
        }
        .bear-date {
            font-size: 0.85rem;
            color: #a1887f;
        }
        footer {
            margin-top: 40px;
            padding: 20px;
            color: #a1887f;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🐻 熊熊線上博物館</h1>
        <div class="subtitle">記錄每天早晨出現的可愛熊熊們 ✨</div>
    </header>
    <div class="gallery" id="gallery">
        <!-- 熊熊圖片會在這裡自動增加 -->
        <div class="bear-card">
            <img src="https://img.magnific.com/free-vector/adorable-baby-bear-illustration_1308-181868.jpg?semt=ais_test_b&w=740&q=80" alt="第一隻小熊">
            <div class="bear-info">
                <div class="bear-name">開館紀念熊</div>
                <div class="bear-date">2026-06-03</div>
            </div>
        </div>
    </div>
    <footer>
        由 熊熊(Kuma) 盡心經營 ʕっ•ᴥ•ʔっ
    </footer>
</body>
</html>
