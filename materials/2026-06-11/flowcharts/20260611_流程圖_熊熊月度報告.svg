<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <!-- 熊熊風格流程圖 - 月度報告流程 -->
  <defs>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B5A2B"/>
      <stop offset="50%" style="stop-color:#D4A574"/>
      <stop offset="100%" style="stop-color:#F5DEB3"/>
    </linearGradient>
    <filter id="flowShadow">
      <feDropShadow dx="3" dy="3" stdDeviation="4" flood-color="#5D3A1A" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 步驟1: 資料收集 -->
  <rect x="40" y="160" width="140" height="80" rx="12" fill="#FFF8F0" filter="url(#flowShadow)"/>
  <rect x="40" y="160" width="140" height="30" rx="12" fill="#8B5A2B"/>
  <text x="110" y="180" font-family="Arial" font-size="12" font-weight="bold" fill="#FFF8F0" text-anchor="middle">📊 資料收集</text>
  <circle cx="70" cy="220" r="15" fill="#D4A574"/>
  <text x="70" y="225" font-family="Arial" font-size="14" fill="#FFF8F0" text-anchor="middle">1</text>
  <text x="110" y="225" font-family="Arial" font-size="11" fill="#5D3A1A" text-anchor="middle">整理數據</text>
  <!-- 熊熊頭像 -->
  <circle cx="150" cy="175" r="12" fill="#D4A574"/>
  <circle cx="145" cy="170" r="5" fill="#C49A6C"/>
  <circle cx="155" cy="170" r="5" fill="#C49A6C"/>
  
  <!-- 箭頭1 -->
  <path d="M185 200 L230 200" stroke="#D4A574" stroke-width="3" fill="none"/>
  <polygon points="235,200 225,195 225,205" fill="#D4A574"/>
  
  <!-- 步驟2: 分析報告 -->
  <rect x="240" y="160" width="140" height="80" rx="12" fill="#FFF8F0" filter="url(#flowShadow)"/>
  <rect x="240" y="160" width="140" height="30" rx="12" fill="#A07850"/>
  <text x="310" y="180" font-family="Arial" font-size="12" font-weight="bold" fill="#FFF8F0" text-anchor="middle">🔍 分析報告</text>
  <circle cx="270" cy="220" r="15" fill="#D4A574"/>
  <text x="270" y="225" font-family="Arial" font-size="14" fill="#FFF8F0" text-anchor="middle">2</text>
  <text x="310" y="225" font-family="Arial" font-size="11" fill="#5D3A1A" text-anchor="middle">深度分析</text>
  
  <!-- 箭頭2 -->
  <path d="M385 200 L430 200" stroke="#D4A574" stroke-width="3" fill="none"/>
  <polygon points="435,200 425,195 425,205" fill="#D4A574"/>
  
  <!-- 步驟3: 熊熊審核 -->
  <rect x="440" y="160" width="140" height="80" rx="12" fill="#FFF8F0" filter="url(#flowShadow)"/>
  <rect x="440" y="160" width="140" height="30" rx="12" fill="#C49A6C"/>
  <text x="510" y="180" font-family="Arial" font-size="12" font-weight="bold" fill="#5D3A1A" text-anchor="middle">🐻 熊熊審核</text>
  <circle cx="470" cy="220" r="15" fill="#D4A574"/>
  <text x="470" y="225" font-family="Arial" font-size="14" fill="#FFF8F0" text-anchor="middle">3</text>
  <text x="510" y="225" font-family="Arial" font-size="11" fill="#5D3A1A" text-anchor="middle">品質把關</text>
  <!-- 熊熊頭像 -->
  <circle cx="550" cy="175" r="12" fill="#D4A574"/>
  <circle cx="545" cy="170" r="5" fill="#C49A6C"/>
  <circle cx="555" cy="170" r="5" fill="#C49A6C"/>
  <ellipse cx="550" cy="178" rx="5" ry="3" fill="#5D3A1A"/>
  
  <!-- 箭頭3 -->
  <path d="M585 200 L630 200" stroke="#D4A574" stroke-width="3" fill="none"/>
  <polygon points="635,200 625,195 625,205" fill="#D4A574"/>
  
  <!-- 步驟4: 完成交付 -->
  <rect x="640" y="160" width="140" height="80" rx="12" fill="#FFF8F0" filter="url(#flowShadow)"/>
  <rect x="640" y="160" width="140" height="30" rx="12" fill="#D4A574"/>
  <text x="710" y="180" font-family="Arial" font-size="12" font-weight="bold" fill="#FFF8F0" text-anchor="middle">✅ 完成交付</text>
  <circle cx="670" cy="220" r="15" fill="#FFD700"/>
  <text x="670" y="225" font-family="Arial" font-size="14" fill="#5D3A1A" text-anchor="middle">4</text>
  <text x="710" y="225" font-family="Arial" font-size="11" fill="#5D3A1A" text-anchor="middle">順利完成</text>
  
  <!-- 頂部標題 -->
  <rect x="250" y="40" width="400" height="50" rx="25" fill="url(#flowGrad)"/>
  <text x="450" y="72" font-family="Arial" font-size="20" font-weight="bold" fill="#FFF8F0" text-anchor="middle">🐻 月度工作報告流程</text>
  
  <!-- 底部裝飾 -->
  <ellipse cx="450" cy="300" rx="200" ry="30" fill="#E8D4BC" opacity="0.5"/>
  <text x="450" y="350" font-family="Arial" font-size="14" fill="#8B5A2B" text-anchor="middle">每一步都離成功更近！</text>
  
  <!-- 連接線裝飾 -->
  <path d="M110 280 Q200 320 310 280 Q400 250 470 300 Q550 340 710 280" 
        stroke="#D4A574" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.4"/>
</svg>