<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 熊熊簡報 v1.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

            font-family: 'Segoe UI', 'Microsoft JhengHei', Tahoma, Geneva, Verdana, sans-serif;

                radial-gradient(circle at 45% 55%, rgba(255,255,255,0.9) 1.5px, transparent 1.5px),

        nav {

            color: #5d4037;

        }

        /* === 編輯器整體 === */
        .editor-container {
            display: flex;

        }

        /* === 左側投影片列表 === */
        .slides-panel {
            width: 200px;

            border-radius: 16px;

        }

            font-weight: bold;

        }
        .slide-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            background: white;
            border: 2px solid #d7ccc8;
            border-radius: 8px;
            margin-bottom: 8px;

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #a1887f;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .slide-thumb:hover { border-color: #8d6e63; transform: scale(1.03); }
        .slide-thumb.active { border-color: #8b5a2b; background: #fdf6e3; box-shadow: 0 0 8px rgba(139,90,43,0.3); }
        .slide-thumb .slide-num {
            position: absolute;
            top: 3px; left: 5px;
            font-size: 0.65rem;
            color: #a1887f;
            background: rgba(255,255,255,0.8);

        }
        .slide-thumb canvas { width: 100%; height: 100%; object-fit: contain; }
        .add-slide-btn {
            width: 100%;
            padding: 10px;
            background: #e7d8c9;
            color: #5d4037;

            font-size: 0.9rem;
            font-weight: bold;

            margin-top: 5px;
        }
        .add-slide-btn:hover { background: #d7ccc8; }

        /* === 中間投影片編輯區 === */
        .canvas-area {
            flex: 1;
            display: flex;
            flex-direction: column;

            gap: 15px;

        .slide-canvas-wrapper {
            width: 100%;

        /* === 右側屬性面板 === */

        .prop-row {

            padding: 5px;

        .material-thumb-sm:hover { border-color: #8b5a2b; transform: scale(1.08); }

        #presentation-mode {
            display: none;
            position: fixed;
            top: 0; left: 0;

            background: #1a1a1a;
            z-index: 99999;
            flex-direction: column;
        }

        .pres-slide {
            flex: 1;
            display: flex;

            justify-content: center;

        }

            max-width: 100%;

            bottom: 20px;

        #presentation-mode:hover .pres-controls { opacity: 1; }

            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;

        .pres-counter {
            color: rgba(255,255,255,0.8);

<script>
// ============================================================
// 熊熊簡報工具 v1.0
// ============================================================

const materialCategories = [
    {
        name: '🎨 邊框素材',
        folder: 'borders',
        groups: [
            { title: '四角邊框', files: ['20260603_四角邊框_01.svg'] },
            { title: '單側邊框', files: ['20260603_單側邊框_長.svg', '20260603_單側邊框_寬.svg'] },
            { title: '全框邊框', files: ['20260603_全框邊框_01.svg', '20260603_全框邊框_雙層虛線.svg', '20260603_全框邊框_三層古典.svg', '20260603_全框邊框_弧角.svg', '20260603_全框邊框_對角線.svg', '20260603_全框邊框_現代商務風.svg'] }
        ]
    },
    {
        name: '💡 實用圖標',
        folder: 'icons',
        groups: [
            { title: '圖標', files: ['20260603_圖標_人員.svg', '20260603_圖標_報告.svg', '20260603_圖標_想法.svg', '20260603_圖標_成就.svg'] }
        ]
    },
    {
        name: '🖼️ 背景圖片',
        folder: 'backgrounds',
        groups: [
            { title: '背景', files: ['20260603_背景_白.svg', '20260603_背景_藍.svg', '20260603_背景_抽象.jpg'] }
        ]
    }
];

const textColors = ['#5d4037','#8b5a2b','#c62828','#1565c0','#2e7d32','#6a1b9a','#37474f','#000000','#ffffff','#ff6f00'];
const bgColors = ['#ffffff','#fdf6e3','#e8f5e9','#e3f2fd','#fff3e0','#fce4ec','#f3e5f5','#e0f7fa','#fff8e1','#efebe9'];

// 狀態
let slides = [];        // 每頁投影片的物件
let currentSlide = 0;
let currentTool = 'select';
let selectedElement = null;  // 目前選取的元素
let presIndex = 0;

// DOM
const canvas = document.getElementById('slide-canvas');
const ctx = canvas.getContext('2d');
const presCanvas = document.getElementById('pres-canvas');
const presCtx = presCanvas.getContext('2d');

// 元素類型：{ type:'text'|'img'|'shape', x,y,w,h, content, color, fontSize, src, bgColor }
// 每張投影片：{ elements:[], bgColor:'#ffffff' }

// ── 初始化 ──────────────────────────────────────────────────
function init() {
    buildColorSwatches();
    buildDrawerTabs();
    loadDrawerMaterials();
    addSlide(); // 第一張空白投影片
    renderSlidesList();
    setupCanvasEvents();
}

// ── 色彩選擇器 ─────────────────────────────────────────────
function buildColorSwatches() {
    const textContainer = document.getElementById('text-colors');
    textColors.forEach(c => {
        const sw = document.createElement('div');
        sw.className = 'color-swatch';
        sw.style.background = c;
        sw.onclick = () => {
            if (selectedElement && selectedElement.type === 'text') {
                selectedElement.color = c;
                render();
            }
        };
        textContainer.appendChild(sw);
    });

    const bgContainer = document.getElementById('bg-colors');
    bgColors.forEach(c => {
        const sw = document.createElement('div');
        sw.className = 'color-swatch';
        sw.style.background = c;
        sw.onclick = () => {
            getCurrentSlide().bgColor = c;
            render();
        };
        bgContainer.appendChild(sw);
    });
}

// ── 素材抽屜 ───────────────────────────────────────────────
function buildDrawerTabs() {
    const tabs = document.getElementById('drawer-tabs');
    materialCategories.forEach((cat, i) => {
        const btn = document.createElement('button');
        btn.className = 'drawer-tab' + (i === 0 ? ' active' : '');
        btn.textContent = cat.name;
        btn.onclick = () => switchDrawerTab(i);
        tabs.appendChild(btn);
    });
}

function loadDrawerMaterials() {
    const content = document.getElementById('drawer-content');
    materialCategories.forEach((cat, ci) => {
        const div = document.createElement('div');
        div.className = 'drawer-content' + (ci === 0 ? ' active' : '');
        cat.groups.forEach(group => {
            group.files.forEach(file => {
                const path = `materials/2026-06-03/${cat.folder}/${file}`;
                const img = document.createElement('img');
                img.className = 'material-thumb-sm';
                img.src = path;
                img.title = file;
                img.onclick = () => insertMaterial(path);
                div.appendChild(img);
            });
        });
        content.appendChild(div);
    });
}

function switchDrawerTab(idx) {
    document.querySelectorAll('.drawer-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
    document.querySelectorAll('.drawer-content').forEach((c, i) => c.classList.toggle('active', i === idx));
}

function toggleDrawer() {
    document.getElementById('materials-drawer').classList.toggle('open');
}

function insertMaterial(src) {
    // 自動切換到素材工具
    setTool('img');
    const slide = getCurrentSlide();
    // 把素材加入投影片中間
    slide.elements.push({
        type: 'img',
        x: canvas.width/2 - 100,
        y: canvas.height/2 - 75,
        w: 200, h: 150,
        src: src
    });
    selectedElement = slide.elements[slide.elements.length - 1];
    render();
}

// ── 投影片管理 ─────────────────────────────────────────────
function getCurrentSlide() { return slides[currentSlide]; }

function addSlide() {
    const slide = { elements: [], bgColor: '#ffffff' };
    slides.push(slide);
    currentSlide = slides.length - 1;
    renderSlidesList();
    render();
}

function duplicateSlide() {
    const src = getCurrentSlide();
    const copy = JSON.parse(JSON.stringify(src));
    slides.splice(currentSlide + 1, 0, copy);
    currentSlide++;
    renderSlidesList();
    render();
}

function deleteSlide() {
    if (slides.length <= 1) { alert('至少要有一張投影片唷！'); return; }
    slides.splice(currentSlide, 1);
    if (currentSlide >= slides.length) currentSlide = slides.length - 1;
    renderSlidesList();
    render();
}

function renderSlidesList() {
    const list = document.getElementById('slides-list');
    list.innerHTML = '';
    slides.forEach((slide, i) => {
        const div = document.createElement('div');
        div.className = 'slide-thumb' + (i === currentSlide ? ' active' : '');
        const num = document.createElement('span');
        num.className = 'slide-num';
        num.textContent = i + 1;
        div.appendChild(num);
        // 預覽小圖
        const thumbCanvas = document.createElement('canvas');
        thumbCanvas.width = 160; thumbCanvas.height = 90;
        div.appendChild(thumbCanvas);
        div.onclick = () => { currentSlide = i; renderSlidesList(); render(); };
        list.appendChild(div);
        // 繪製縮圖
        setTimeout(() => drawSlideToContext(thumbCanvas.getContext('2d'), slide, 160, 90), 50);
    });
}

// ── 工具切換 ───────────────────────────────────────────────
function setTool(tool) {
    currentTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => {
        const id = b.id;
        if (id === `${tool}-tool`) b.classList.add('active');
        else if (id.endsWith('-tool')) b.classList.remove('active');
    });
    document.getElementById('text-props').style.display = tool === 'text' ? 'block' : 'none';
}

// ── Canvas 事件 ────────────────────────────────────────────
let isDragging = false, dragStartX, dragStartY, dragEl;

function setupCanvasEvents() {
    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;

        const slide = getCurrentSlide();
        // 點選：從上層（最後加入的）往前找
        let found = null;
        for (let i = slide.elements.length - 1; i >= 0; i--) {
            const el = slide.elements[i];
            if (mx >= el.x && mx <= el.x + el.w && my >= el.y && my <= el.y + el.h) {
                found = el;
                break;
            }
        }

        if (found) {
            selectedElement = found;
            if (currentTool === 'select') {
                isDragging = true;
                dragStartX = mx - found.x;
                dragStartY = my - found.y;
                dragEl = found;
            }
            if (found.type === 'text') {
                document.getElementById('text-props').style.display = 'block';
                document.getElementById('prop-text').value = found.content || '';
                document.getElementById('prop-fontsize').value = found.fontSize || 48;
            }
        } else {
            selectedElement = null;
            if (currentTool === 'text') {
                // 新增文字
                const newText = {
                    type: 'text',
                    x: mx - 100, y: my - 30,
                    w: 300, h: 60,
                    content: '點擊編輯文字',
                    color: '#5d4037',
                    fontSize: 48
                };
                slide.elements.push(newText);
                selectedElement = newText;
                document.getElementById('text-props').style.display = 'block';
                document.getElementById('prop-text').value = newText.content;
                document.getElementById('prop-fontsize').value = newText.fontSize;
            } else if (currentTool === 'shape') {
                // 新增方框
                const newShape = {
                    type: 'shape',
                    x: mx - 60, y: my - 40,
                    w: 120, h: 80,
                    bgColor: '#e7d8c9'
                };
                slide.elements.push(newShape);
                selectedElement = newShape;
            } else if (currentTool === 'img') {
                // 提醒開素材抽屜
                if (!document.getElementById('materials-drawer').classList.contains('open')) {
                    toggleDrawer();
                }
            }
        }
        render();
    });

    canvas.addEventListener('mousemove', e => {
        if (!isDragging || !dragEl) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;
        dragEl.x = mx - dragStartX;
        dragEl.y = my - dragStartY;
        render();
    });

    canvas.addEventListener('mouseup', () => { isDragging = false; dragEl = null; });
    canvas.addEventListener('mouseleave', () => { isDragging = false; dragEl = null; });

    canvas.addEventListener('dblclick', e => {
        if (!selectedElement || selectedElement.type !== 'text') return;
        const text = prompt('編輯文字內容：', selectedElement.content);
        if (text !== null) {
            selectedElement.content = text;
            document.getElementById('prop-text').value = text;
            render();
        }
    });
}

// ── 渲染 ──────────────────────────────────────────────────
function render() {
    const slide = getCurrentSlide();
    drawSlideToContext(ctx, slide, canvas.width, canvas.height);
    updatePropsPanel();
    renderSlidesList();
}

function drawSlideToContext(ctx2d, slide, w, h) {
    ctx2d.clearRect(0, 0, w, h);
    // 背景
    ctx2d.fillStyle = slide.bgColor || '#ffffff';
    ctx2d.fillRect(0, 0, w, h);
    // 元素
    if (!slide.elements) return;
    slide.elements.forEach(el => {
        if (el.type === 'text') {
            ctx2d.fillStyle = el.color || '#5d4037';
            ctx2d.font = `bold ${el.fontSize || 48}px 'Segoe UI', 'Microsoft JhengHei', sans-serif`;
            ctx2d.fillText(el.content || '', el.x, el.y + (el.fontSize || 48));
            // 選取框
            if (selectedElement === el) {
                ctx2d.strokeStyle = '#8b5a2b';
                ctx2d.lineWidth = 2;
                ctx2d.setLineDash([6, 4]);
                ctx2d.strokeRect(el.x - 4, el.y - 8, ctx2d.measureText(el.content || '').width + 8, (el.fontSize || 48) + 12);
                ctx2d.setLineDash([]);
            }
        } else if (el.type === 'img') {
            const img = imgCache[el.src];
            if (img && img.complete) {
                ctx2d.drawImage(img, el.x, el.y, el.w, el.h);
            } else {
                ctx2d.fillStyle = '#e7d8c9';
                ctx2d.fillRect(el.x, el.y, el.w, el.h);
                ctx2d.fillStyle = '#a1887f';
                ctx2d.font = '14px sans-serif';
                ctx2d.fillText('載入中...', el.x + 5, el.y + 20);
            }
            if (selectedElement === el) {
                ctx2d.strokeStyle = '#8b5a2b';
                ctx2d.lineWidth = 2;
                ctx2d.setLineDash([6, 4]);
                ctx2d.strokeRect(el.x, el.y, el.w, el.h);
                ctx2d.setLineDash([]);
            }
        } else if (el.type === 'shape') {
            ctx2d.fillStyle = el.bgColor || '#e7d8c9';
            ctx2d.fillRect(el.x, el.y, el.w, el.h);
            if (selectedElement === el) {
                ctx2d.strokeStyle = '#8b5a2b';
                ctx2d.lineWidth = 2;
                ctx2d.setLineDash([6, 4]);
                ctx2d.strokeRect(el.x, el.y, el.w, el.h);
                ctx2d.setLineDash([]);
            }
        }
    });
}

// 圖片快取
const imgCache = {};
function preloadImages() {
    materialCategories.forEach(cat => {
        cat.groups.forEach(group => {
            group.files.forEach(file => {
                const path = `materials/2026-06-03/${cat.folder}/${file}`;
                if (!imgCache[path]) {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.src = path;
                    imgCache[path] = img;
                }
            });
        });
    });
}

// ── 屬性面板更新 ────────────────────────────────────────────
function updatePropsPanel() {
    const textProps = document.getElementById('text-props');
    if (selectedElement && selectedElement.type === 'text') {
        textProps.style.display = 'block';
    } else {
        textProps.style.display = 'none';
    }
}

function updateSelectedText() {
    if (!selectedElement || selectedElement.type !== 'text') return;
    selectedElement.content = document.getElementById('prop-text').value;
    selectedElement.fontSize = parseInt(document.getElementById('prop-fontsize').value);
    render();
}

// ── 背景設定 ────────────────────────────────────────────────
function setBgColor() {
    const color = prompt('輸入背景顏色（如：#ffffff、#fdf6e3）', getCurrentSlide().bgColor);
    if (color) {
        getCurrentSlide().bgColor = color;
        render();
    }
}

// ── 投影片尺寸 ────────────────────────────────────────────
function resizeCanvas() {
    const ratio = document.getElementById('slide-size').value;
    if (ratio === '4:3') {
        canvas.width = 1200; canvas.height = 900;
        presCanvas.width = 1200; presCanvas.height = 900;
    } else {
        canvas.width = 1600; canvas.height = 900;
        presCanvas.width = 1600; presCanvas.height = 900;
    }
    render();
}

// ── 全螢幕放映 ─────────────────────────────────────────────
let presInterval;

function togglePresentation() {
    const pres = document.getElementById('presentation-mode');
    if (pres.classList.contains('active')) {
        pres.classList.remove('active');
        clearInterval(presInterval);
    } else {
        presIndex = 0;
        pres.classList.add('active');
        drawPresSlide();
    }
}

function drawPresSlide() {
    const slide = slides[presIndex];
    if (!slide) return;
    presCtx.clearRect(0, 0, presCanvas.width, presCanvas.height);
    presCtx.fillStyle = slide.bgColor || '#ffffff';
    presCtx.fillRect(0, 0, presCanvas.width, presCanvas.height);
    if (!slide.elements) return;
    slide.elements.forEach(el => {
        if (el.type === 'text') {
            presCtx.fillStyle = el.color || '#5d4037';
            presCtx.font = `bold ${el.fontSize || 48}px 'Segoe UI', 'Microsoft JhengHei', sans-serif`;
            presCtx.fillText(el.content || '', el.x, el.y + (el.fontSize || 48));
        } else if (el.type === 'img') {
            const img = imgCache[el.src];
            if (img && img.complete) {
                presCtx.drawImage(img, el.x, el.y, el.w, el.h);
            }
        } else if (el.type === 'shape') {
            presCtx.fillStyle = el.bgColor || '#e7d8c9';
            presCtx.fillRect(el.x, el.y, el.w, el.h);
        }
    });
    document.getElementById('pres-counter').textContent = `${presIndex + 1} / ${slides.length}`;
}

function presNext() {
    if (presIndex < slides.length - 1) { presIndex++; drawPresSlide(); }
}
function presPrev() {
    if (presIndex > 0) { presIndex--; drawPresSlide(); }
}

// 鍵盤快捷鍵（放映模式）
document.addEventListener('keydown', e => {
    const pres = document.getElementById('presentation-mode');
    if (!pres.classList.contains('active')) return;
    if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); presNext(); }
    if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); presPrev(); }
    if (e.key === 'Escape') togglePresentation();
});

// ── 啟動 ───────────────────────────────────────────────────
preloadImages();
init();
</script>
