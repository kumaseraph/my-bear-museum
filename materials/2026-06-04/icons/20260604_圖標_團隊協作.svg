<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Center connection circle -->
  <circle cx="60" cy="60" r="18" fill="#a1887f" stroke="#5d4037" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="6" fill="#5d4037"/>
  <!-- Three people around center -->
  <!-- Person 1 - top -->
  <circle cx="60" cy="22" r="14" fill="#fdf6e3" stroke="#5d4037" stroke-width="2.5"/>
  <path d="M45 40 Q60 55 75 40" fill="none" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Person 2 - bottom left -->
  <circle cx="28" cy="85" r="14" fill="#fdf6e3" stroke="#5d4037" stroke-width="2.5"/>
  <path d="M18 72 Q30 82 40 70" fill="none" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Person 3 - bottom right -->
  <circle cx="92" cy="85" r="14" fill="#fdf6e3" stroke="#5d4037" stroke-width="2.5"/>
  <path d="M80 70 Q92 82 102 72" fill="none" stroke="#5d4037" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Connecting lines -->
  <line x1="60" y1="36" x2="60" y2="42" stroke="#8d6e63" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="36" y1="78" x2="43" y2="74" stroke="#8d6e63" stroke-width="2" stroke-dasharray="4,2"/>
  <line x1="84" y1="78" x2="77" y2="74" stroke="#8d6e63" stroke-width="2" stroke-dasharray="4,2"/>
</svg>