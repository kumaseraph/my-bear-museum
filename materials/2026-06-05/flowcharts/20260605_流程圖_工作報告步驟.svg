<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <!-- 流程圖 - 步驟流程：工作報告流程圖（4步驟） -->
  <!-- 比例：16:9 寬幅 (800x300) -->
  <!-- 風格：Monoline 線性風格、統一 2px 線寬 -->
  
  <defs>
    <!-- 箭頭標記 -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#5d4037"/>
    </marker>
  </defs>
  
  <!-- 步驟 1：計畫 -->
  <g transform="translate(50, 100)">
    <!-- 步驟方框 -->
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#fdf6e3" stroke="#5d4037" stroke-width="2"/>
    <!-- 步驟數字圓圈 -->
    <circle cx="25" cy="25" r="18" fill="#5d4037"/>
    <text x="25" y="32" text-anchor="middle" fill="white" font-size="16" font-weight="bold">1</text>
    <!-- 步驟標題 -->
    <text x="70" y="28" text-anchor="middle" fill="#5d4037" font-size="14" font-weight="bold">計畫</text>
    <!-- 步驟說明 -->
    <text x="70" y="55" text-anchor="middle" fill="#8d6e63" font-size="11">目標設定</text>
    <text x="70" y="72" text-anchor="middle" fill="#a1887f" font-size="10">任務分配</text>
  </g>
  
  <!-- 連接箭頭 1→2 -->
  <line x1="195" y1="150" x2="235" y2="150" stroke="#5d4037" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 步驟 2：執行 -->
  <g transform="translate(240, 100)">
    <!-- 步驟方框 -->
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#fdf6e3" stroke="#5d4037" stroke-width="2"/>
    <!-- 步驟數字圓圈 -->
    <circle cx="25" cy="25" r="18" fill="#5d4037"/>
    <text x="25" y="32" text-anchor="middle" fill="white" font-size="16" font-weight="bold">2</text>
    <!-- 步驟標題 -->
    <text x="70" y="28" text-anchor="middle" fill="#5d4037" font-size="14" font-weight="bold">執行</text>
    <!-- 步驟說明 -->
    <text x="70" y="55" text-anchor="middle" fill="#8d6e63" font-size="11">按步推進</text>
    <text x="70" y="72" text-anchor="middle" fill="#a1887f" font-size="10">即時監控</text>
  </g>
  
  <!-- 連接箭頭 2→3 -->
  <line x1="385" y1="150" x2="425" y2="150" stroke="#5d4037" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 步驟 3：檢視 -->
  <g transform="translate(430, 100)">
    <!-- 步驟方框 -->
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#fdf6e3" stroke="#5d4037" stroke-width="2"/>
    <!-- 步驟數字圓圈 -->
    <circle cx="25" cy="25" r="18" fill="#5d4037"/>
    <text x="25" y="32" text-anchor="middle" fill="white" font-size="16" font-weight="bold">3</text>
    <!-- 步驟標題 -->
    <text x="70" y="28" text-anchor="middle" fill="#5d4037" font-size="14" font-weight="bold">檢視</text>
    <!-- 步驟說明 -->
    <text x="70" y="55" text-anchor="middle" fill="#8d6e63" font-size="11">成果檢核</text>
    <text x="70" y="72" text-anchor="middle" fill="#a1887f" font-size="10">進度追蹤</text>
  </g>
  
  <!-- 連接箭頭 3→4 -->
  <line x1="575" y1="150" x2="615" y2="150" stroke="#5d4037" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- 步驟 4：完成 -->
  <g transform="translate(620, 100)">
    <!-- 步驟方框 -->
    <rect x="0" y="0" width="140" height="100" rx="10" fill="#5d4037" stroke="#5d4037" stroke-width="2"/>
    <!-- 步驟數字圓圈 -->
    <circle cx="25" cy="25" r="18" fill="#fdf6e3"/>
    <text x="25" y="32" text-anchor="middle" fill="#5d4037" font-size="16" font-weight="bold">4</text>
    <!-- 步驟標題 -->
    <text x="70" y="28" text-anchor="middle" fill="#fdf6e3" font-size="14" font-weight="bold">完成</text>
    <!-- 步驟說明 -->
    <text x="70" y="55" text-anchor="middle" fill="#e7d8c9" font-size="11">總結報告</text>
    <text x="70" y="72" text-anchor="middle" fill="#d7ccc8" font-size="10">優化建議</text>
  </g>
</svg>