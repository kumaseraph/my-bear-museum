<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 工作報告 icon - 商務風格的會議簡報圖標 -->
  <!-- 風格：Monoline 線性風格、統一 2px 線寬 -->
  <g fill="none" stroke="#5d4037" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 簡報螢幕/投影片框架 -->
    <rect x="8" y="10" width="48" height="32" rx="3"/>
    <!-- 螢幕支架 -->
    <line x1="32" y1="42" x2="32" y2="50"/>
    <line x1="24" y1="50" x2="40" y2="50"/>
    <!-- 投影片內容線條（代表報告內容） -->
    <line x1="14" y1="18" x2="30" y2="18"/>
    <line x1="14" y1="24" x2="38" y2="24"/>
    <line x1="14" y1="30" x2="26" y2="30"/>
    <!-- 餅圖元素（代表數據分析） -->
    <circle cx="44" cy="26" r="8"/>
    <path d="M44,26 L44,18 A8,8 0 0,1 51.7,30 Z"/>
  </g>
</svg>