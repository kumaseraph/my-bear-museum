<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="minimalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d4c41;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a1887f;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 極簡外框 -->
  <rect x="10" y="10" width="380" height="280" fill="none" stroke="url(#minimalGrad)" stroke-width="3" rx="3"/>
  <!-- 四角標記 -->
  <circle cx="10" cy="10" r="4" fill="#5d4037"/>
  <circle cx="390" cy="10" r="4" fill="#5d4037"/>
  <circle cx="10" cy="290" r="4" fill="#5d4037"/>
  <circle cx="390" cy="290" r="4" fill="#5d4037"/>
  <!-- 對角線裝飾 -->
  <line x1="10" y1="10" x2="50" y2="50" stroke="#d7ccc8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="350" y1="50" x2="390" y2="10" stroke="#d7ccc8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="10" y1="290" x2="50" y2="250" stroke="#d7ccc8" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="350" y1="250" x2="390" y2="290" stroke="#d7ccc8" stroke-width="1" stroke-dasharray="3,2"/>
</svg>