<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 300" width="960" height="300">
  <!-- 工作報告流程四步驟 -->
  <style>
    .box { fill: #f8f9fa; stroke: #2c3e50; stroke-width: 3; rx: 12; }
    .box-active { fill: #2c3e50; }
    .text { font-family: Arial, sans-serif; font-size: 16px; fill: #2c3e50; font-weight: bold; }
    .text-white { fill: white; }
    .sub { font-family: Arial, sans-serif; font-size: 12px; fill: #6c757d; }
    .arrow { fill: none; stroke: #2c3e50; stroke-width: 3; stroke-linecap: round; }
  </style>

  <!-- Step 1 -->
  <rect x="40" y="80" width="160" height="100" rx="12" class="box"/>
  <rect x="40" y="80" width="160" height="30" rx="12" fill="#2c3e50"/>
  <rect x="40" y="95" width="160" height="15" fill="#2c3e50"/>
  <text x="120" y="103" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">STEP 1</text>
  <text x="120" y="140" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50" text-anchor="middle">資料收集</text>
  <text x="120" y="160" font-family="Arial" font-size="12" fill="#6c757d" text-anchor="middle">數據整理與分析</text>

  <!-- Arrow 1 -->
  <path d="M215 130 L250 130" class="arrow"/>
  <polygon points="255,130 245,123 245,137" fill="#2c3e50"/>

  <!-- Step 2 -->
  <rect x="270" y="80" width="160" height="100" rx="12" class="box"/>
  <rect x="270" y="80" width="160" height="30" rx="12" fill="#2c3e50"/>
  <rect x="270" y="95" width="160" height="15" fill="#2c3e50"/>
  <text x="350" y="103" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">STEP 2</text>
  <text x="350" y="140" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50" text-anchor="middle">大綱規劃</text>
  <text x="350" y="160" font-family="Arial" font-size="12" fill="#6c757d" text-anchor="middle">結構與重點確認</text>

  <!-- Arrow 2 -->
  <path d="M445 130 L480 130" class="arrow"/>
  <polygon points="485,130 475,123 475,137" fill="#2c3e50"/>

  <!-- Step 3 -->
  <rect x="500" y="80" width="160" height="100" rx="12" class="box"/>
  <rect x="500" y="80" width="160" height="30" rx="12" fill="#2c3e50"/>
  <rect x="500" y="95" width="160" height="15" fill="#2c3e50"/>
  <text x="580" y="103" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">STEP 3</text>
  <text x="580" y="140" font-family="Arial" font-size="15" font-weight="bold" fill="#2c3e50" text-anchor="middle">內容撰寫</text>
  <text x="580" y="160" font-family="Arial" font-size="12" fill="#6c757d" text-anchor="middle">依大綱逐步完成</text>

  <!-- Arrow 3 -->
  <path d="M675 130 L710 130" class="arrow"/>
  <polygon points="715,130 705,123 705,137" fill="#2c3e50"/>

  <!-- Step 4 -->
  <rect x="730" y="80" width="160" height="100" rx="12" class="box"/>
  <rect x="730" y="80" width="160" height="30" rx="12" fill="#28a745"/>
  <rect x="730" y="95" width="160" height="15" fill="#28a745"/>
  <text x="810" y="103" font-family="Arial" font-size="14" font-weight="bold" fill="white" text-anchor="middle">STEP 4</text>
  <text x="810" y="140" font-family="Arial" font-size="15" font-weight="bold" fill="#28a745" text-anchor="middle">完成提交</text>
  <text x="810" y="160" font-family="Arial" font-size="12" fill="#6c757d" text-anchor="middle">檢核後呈報</text>

  <!-- 底部說明 -->
  <text x="480" y="230" font-family="Arial" font-size="14" fill="#495057" text-anchor="middle">工作報告產出流程</text>
  <text x="480" y="250" font-family="Arial" font-size="11" fill="#adb5bd" text-anchor="middle">資料收集 → 大綱規劃 → 內容撰寫 → 完成提交</text>
</svg>