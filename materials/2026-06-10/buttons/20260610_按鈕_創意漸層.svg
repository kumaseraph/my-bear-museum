<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100">
  <defs>
    <linearGradient id="creativeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B"/>
      <stop offset="50%" style="stop-color:#4ECDC4"/>
      <stop offset="100%" style="stop-color:#45B7D1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#00000033"/>
    </filter>
  </defs>
  <!-- 背景漸層 -->
  <rect x="10" y="10" width="280" height="80" rx="40" fill="url(#creativeGrad)" filter="url(#shadow)"/>
  <!-- 裝飾圓點 -->
  <circle cx="40" cy="50" r="8" fill="rgba(255,255,255,0.4)"/>
  <circle cx="260" cy="50" r="8" fill="rgba(255,255,255,0.4)"/>
  <!-- 箭頭符號 -->
  <path d="M130 35 L150 50 L130 65" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="180" y="58" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">探索更多</text>
  <text x="180" y="58" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" opacity="0.3">探索更多</text>
</svg>