<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 喵喵公主的歷史相簿 - 喵時光</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <meta name="description" content="📚 喵喵公主的歷史相簿 - 收藏所有橘貓妹妹的療癒時刻">
    <meta name="theme-color" content="#FF8C42">
    
    <!-- Nav Component -->
    <script src="/components/nav-component.js"></script>
    
    <style>
        /* ===== CSS Variables - Light Theme (Default) ===== */
        :root {
            --color-bg: #FFF8F0;
            --color-card: #FFFAF5;
            --color-primary: #FF8C42;
            --color-secondary: #C4A77D;
            --color-accent: #A8D8C8;
            --color-text: #3D2B1F;
            --color-text-muted: #8B7355;
            --color-border: #E07028;
            
            --shadow-soft: 0 4px 18px rgba(61, 43, 31, 0.08);
            --shadow-medium: 0 6px 20px rgba(61, 43, 31, 0.12);
            --shadow-card: 0 4px 12px rgba(61, 43, 31, 0.06);
            
            --transition-fast: 0.2s ease;
            --transition-normal: 0.3s ease;
        }

        [data-theme="dark"] {
            --color-bg: #2D2A26;
            --color-card: #3D3832;
            --color-primary: #FF8C42;
            --color-secondary: #A89078;
            --color-accent: #8CBAA8;
            --color-text: #F5EDE6;
            --color-text-muted: #B8A898;
            --color-border: #D06020;
            
            --shadow-soft: 0 4px 18px rgba(0, 0, 0, 0.2);
            --shadow-medium: 0 6px 20px rgba(0, 0, 0, 0.25);
            --shadow-card: 0 4px 12px rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', 'Inter', 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .page-container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        .header-section {
            text-align: center;
            padding: 60px 20px 30px;
        }

        .header-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 10px;
        }

        .header-subtitle {
            font-size: 1rem;
            color: var(--color-text-muted);
        }

        /* Theme Toggle */
        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--color-border);
            background: var(--color-card);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-soft);
        }

        .theme-toggle-btn:hover {
            transform: scale(1.1) rotate(10deg);
        }

        /* Filters */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .filter-select {
            padding: 10px 15px;
            border: 2px solid var(--color-secondary);
            border-radius: 20px;
            background: var(--color-card);
            color: var(--color-text);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            min-width: 120px;
        }

        .filter-select:hover, .filter-select:focus {
            border-color: var(--color-primary);
            outline: none;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            padding: 0 20px;
        }

        .gallery-item {
            aspect-ratio: 1;
            background: var(--color-card);
            border: 2px solid var(--color-border);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition-normal);
            box-shadow: var(--shadow-card);
        }

        .gallery-item:hover {
            transform: translateY(-4px) rotate(1deg);
            box-shadow: var(--shadow-medium);
        }

        .gallery-item-image {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            background: var(--color-bg);
        }

        .gallery-item-meta {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px;
            background: rgba(255, 248, 240, 0.9);
            font-size: 0.65rem;
            color: var(--color-text-muted);
            text-align: center;
        }

        /* Load More Button */
        .load-more-container {
            text-align: center;
            margin-top: 40px;
        }

        .load-more-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 30px;
            border: 2px solid var(--color-border);
            border-radius: 25px;
            background: var(--color-card);
            color: var(--color-primary);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .load-more-btn:hover {
            background: var(--color-primary);
            color: white;
            transform: translateY(-2px);
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 20px 20px;
            color: var(--color-primary);
            text-decoration: none;
            font-size: 0.95rem;
            transition: all var(--transition-fast);
        }

        .back-link:hover {
            transform: translateX(-5px);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }

        .footer-decoration {
            margin-bottom: 10px;
            letter-spacing: 5px;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .gallery-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 768px) {
            .header-title {
                font-size: 1.6rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 15px;
            }

            .filters {
                gap: 8px;
            }

            .filter-select {
                padding: 8px 12px;
                font-size: 0.85rem;
                min-width: 100px;
            }
        }

        @media (max-width: 480px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .theme-toggle-btn {
                width: 42px;
                height: 42px;
                font-size: 1.1rem;
            }
        }

        :root, [data-theme="dark"] {
            transition: background-color var(--transition-normal), 
                        color var(--transition-normal);
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav-bar></nav-bar>

    <!-- Theme Toggle -->
    <button class="theme-toggle-btn" id="themeToggle" aria-label="切換深色模式">🌙</button>

    <!-- Main Content -->
    <main class="page-container">
        <a href="cats.html" class="back-link">← 返回喵時光</a>

        <header class="header-section">
            <h1 class="header-title">📚 喵喵公主的歷史相簿</h1>
            <p class="header-subtitle">收藏每一個療癒時刻</p>
        </header>

        <!-- Filters -->
        <div class="filters">
            <select class="filter-select" id="filterMonth">
                <option value="">月份</option>
                <option value="2026-06">2026年6月</option>
                <option value="2026-05">2026年5月</option>
                <option value="2026-04">2026年4月</option>
            </select>
            <select class="filter-select" id="filterTheme">
                <option value="">主題</option>
                <option value="美食">美食</option>
                <option value="冒險">冒險</option>
                <option value="戀愛">戀愛</option>
                <option value="節日">節日</option>
                <option value="派對">派對</option>
                <option value="午後時光">午後時光</option>
            </select>
            <select class="filter-select" id="filterStyle">
                <option value="">風格</option>
                <option value="童趣蠟筆風">童趣蠟筆風</option>
                <option value="薄霧水彩">薄霧水彩</option>
                <option value="紙雕">紙雕</option>
                <option value="昭和貓咪風">昭和貓咪風</option>
                <option value="浮世貓風">浮世貓風</option>
            </select>
            <select class="filter-select" id="filterBreed">
                <option value="">品種</option>
                <option value="橘貓">橘貓</option>
                <option value="英短">英國短毛貓</option>
                <option value="布偶">布偶貓</option>
                <option value="三花">三花貓</option>
                <option value="黑貓">黑貓</option>
            </select>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="galleryGrid">
            <!-- Gallery items will be dynamically generated -->
        </div>

        <!-- Load More -->
        <div class="load-more-container">
            <button class="load-more-btn" id="loadMoreBtn">
                載入更多
            </button>
        </div>

        <footer class="footer">
            <div class="footer-decoration">~~~~~~~~</div>
            <p>© 2026 熊熊博物館 · 每日更新</p>
        </footer>
    </main>

    <script>
        // ===== Theme Management =====
        const ThemeManager = {
            STORAGE_KEY: 'cats-theme',
            
            init() {
                const saved = localStorage.getItem(this.STORAGE_KEY);
                if (saved === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.getElementById('themeToggle').textContent = '☀️';
                } else {
                    document.getElementById('themeToggle').textContent = '🌙';
                }
                
                document.getElementById('themeToggle').addEventListener('click', () => this.toggle());
            },
            
            toggle() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                if (isDark) {
                    document.documentElement.removeAttribute('data-theme');
                    localStorage.setItem(this.STORAGE_KEY, 'light');
                    document.getElementById('themeToggle').textContent = '🌙';
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem(this.STORAGE_KEY, 'dark');
                    document.getElementById('themeToggle').textContent = '☀️';
                }
            }
        };

        // ===== Sample Gallery Data =====
        const galleryData = [
            { title: '喵喵公主的早餐', breed: '橘貓', theme: '美食', style: '童趣蠟筆風', date: '2026-06-10' },
            { title: '午後的陽光 Yoga', breed: '橘貓', theme: '午後時光', style: '薄霧水彩', date: '2026-06-10' },
            { title: '英短小幫手', breed: '英短', theme: '美食', style: '紙雕', date: '2026-06-09' },
            { title: '布偶貓的午後', breed: '布偶', theme: '午後時光', style: '昭和貓咪風', date: '2026-06-09' },
            { title: '神秘黑貓', breed: '黑貓', theme: '神秘禮物', style: '浮世貓風', date: '2026-06-08' },
            { title: '三花貓的派對', breed: '三花', theme: '派對', style: '漫畫網點', date: '2026-06-08' },
            { title: '曼赤肯的冒險', breed: '曼赤肯', theme: '冒險', style: '黏土陶藝風', date: '2026-06-07' },
            { title: '波斯貴族', breed: '波斯', theme: '森林', style: '油畫', date: '2026-06-07' },
            { title: '暹羅優雅', breed: '暹羅', theme: '戀愛', style: '水墨風', date: '2026-06-06' },
            { title: '白貓的雨天的', breed: '白貓', theme: '雨天', style: '復古童話', date: '2026-06-06' },
            { title: '米克斯的禮物', breed: '米克斯', theme: '節日', style: '織品', date: '2026-06-05' },
            { title: '俄羅斯藍的星空', breed: '俄羅斯藍', theme: '神秘禮物', style: '和風浮世繪', date: '2026-06-05' },
            { title: '豹貓的叢林', breed: '孟加拉豹貓', theme: '冒險', style: '紙雕', date: '2026-06-04' },
            { title: '摺耳貓的午後', breed: '蘇格蘭摺耳', theme: '午後時光', style: '昭和貓咪風', date: '2026-06-04' },
            { title: '橘貓的派對', breed: '橘貓', theme: '派對', style: '童趣蠟筆風', date: '2026-06-03' },
            { title: '英短的早餐', breed: '英短', theme: '美食', style: '薄霧水彩', date: '2026-06-03' },
            { title: '黑貓的神秘', breed: '黑貓', theme: '神秘禮物', style: '浮世貓風', date: '2026-06-02' },
            { title: '三花的工作日', breed: '三花', theme: '城市', style: '漫畫網點', date: '2026-06-02' },
            { title: '布偶的雨天的', breed: '布偶', theme: '雨天', style: '黏土陶藝風', date: '2026-06-01' },
            { title: '曼赤肯的滑雪', breed: '曼赤肯', theme: '冒險', style: '油畫', date: '2026-06-01' }
        ];

        let displayedCount = 10;

        // ===== Render Gallery =====
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            const items = galleryData.slice(0, displayedCount);
            
            grid.innerHTML = items.map((item, index) => `
                <div class="gallery-item" data-index="${index}">
                    <div class="gallery-item-image">🐱</div>
                </div>
            `).join('');
        }

        // ===== Initialize =====
        document.addEventListener('DOMContentLoaded', () => {
            ThemeManager.init();
            renderGallery();
            
            document.getElementById('loadMoreBtn').addEventListener('click', () => {
                displayedCount = Math.min(galleryData.length, displayedCount + 10);
                renderGallery();
                
                if (displayedCount >= galleryData.length) {
                    document.getElementById('loadMoreBtn').style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
