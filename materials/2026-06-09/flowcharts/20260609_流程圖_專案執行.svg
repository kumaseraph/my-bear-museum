<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-label="專案執行流程">
  <title>專案執行流程</title>
  <desc>四步驟流程圖：規劃 → 執行 → 審核 → 完成</desc>
  <defs>
    <linearGradient id="stepGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2D7DD2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27AE60;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="800" height="400" fill="#F8FBFF"/>
  <!--連接線 -->
  <path d="M175 200 L285 200" stroke="#B8D4E8" stroke-width="3" stroke-dasharray="8,4"/>
  <path d="M395 200 L505 200" stroke="#B8D4E8" stroke-width="3" stroke-dasharray="8,4"/>
  <path d="M615 200 L725 200" stroke="#B8D4E8" stroke-width="3" stroke-dasharray="8,4"/>
  <!-- 箭頭 -->
  <polygon points="280,195 295,200 280,205" fill="#B8D4E8"/>
  <polygon points="500,195 515,200 500,205" fill="#B8D4E8"/>
  <polygon points="720,195 735,200 720,205" fill="#B8D4E8"/>
  <!-- Step 1: 規劃 -->
  <rect x="50" y="150" width="130" height="100" rx="12" fill="url(#stepGrad)"/>
  <text x="115" y="195" text-anchor="middle" fill="white" font-size="18" font-weight="bold">STEP 1</text>
  <text x="115" y="220" text-anchor="middle" fill="white" font-size="14">規劃</text>
  <!-- Step 2: 執行 -->
  <rect x="290" y="150" width="130" height="100" rx="12" fill="url(#stepGrad)"/>
  <text x="355" y="195" text-anchor="middle" fill="white" font-size="18" font-weight="bold">STEP 2</text>
  <text x="355" y="220" text-anchor="middle" fill="white" font-size="14">執行</text>
  <!-- Step 3: 審核 -->
  <rect x="510" y="150" width="130" height="100" rx="12" fill="url(#stepGrad)"/>
  <text x="575" y="195" text-anchor="middle" fill="white" font-size="18" font-weight="bold">STEP 3</text>
  <text x="575" y="220" text-anchor="middle" fill="white" font-size="14">審核</text>
  <!-- Step 4: 完成 -->
  <rect x="730" y="150" width="130" height="100" rx="12" fill="#27AE60"/>
  <text x="795" y="195" text-anchor="middle" fill="white" font-size="18" font-weight="bold">STEP 4</text>
  <text x="795" y="220" text-anchor="middle" fill="white" font-size="14">完成</text>
  <!-- 標題 -->
  <text x="400" y="60" text-anchor="middle" fill="#2D7DD2" font-size="24" font-weight="bold">專案執行流程</text>
</svg>