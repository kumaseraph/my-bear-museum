<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- 熊熊衝刺 - 工作報告目標達成 -->
  <defs>
    <linearGradient id="bearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5A2B"/>
      <stop offset="100%" style="stop-color:#D2691E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  <!-- 熊熊身體 -->
  <ellipse cx="60" cy="65" rx="35" ry="30" fill="url(#bearGrad)"/>
  <!-- 熊熊頭部 -->
  <circle cx="60" cy="40" r="28" fill="url(#bearGrad)"/>
  <!-- 熊熊耳朵 -->
  <circle cx="35" cy="18" r="12" fill="url(#bearGrad)"/>
  <circle cx="85" cy="18" r="12" fill="url(#bearGrad)"/>
  <circle cx="35" cy="18" r="7" fill="#DEB887"/>
  <circle cx="85" cy="18" r="7" fill="#DEB887"/>
  <!-- 熊熊臉部 -->
  <ellipse cx="60" cy="45" rx="18" ry="14" fill="#DEB887"/>
  <!-- 眼睛 -->
  <circle cx="50" cy="38" r="4" fill="#2C1810"/>
  <circle cx="70" cy="38" r="4" fill="#2C1810"/>
  <circle cx="51" cy="37" r="1.5" fill="white"/>
  <circle cx="71" cy="37" r="1.5" fill="white"/>
  <!-- 鼻子 -->
  <ellipse cx="60" cy="46" rx="5" ry="3.5" fill="#2C1810"/>
  <!-- 嘴巴 -->
  <path d="M55 52 Q60 56 65 52" stroke="#2C1810" stroke-width="2" fill="none"/>
  <!-- 熊熊腮紅 -->
  <ellipse cx="38" cy="48" rx="6" ry="4" fill="#FFB6C1" opacity="0.6"/>
  <ellipse cx="82" cy="48" rx="6" ry="4" fill="#FFB6C1" opacity="0.6"/>
  <!-- 衝刺線條 -->
  <path d="M10 30 L25 35" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <path d="M5 45 L22 45" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <path d="M10 60 L25 55" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
  <!-- 星星裝飾 -->
  <polygon points="95,25 97,31 103,31 98,35 100,41 95,37 90,41 92,35 87,31 93,31" fill="url(#goldGrad)"/>
  <polygon points="105,50 106,53 109,53 107,55 108,58 105,56 102,58 103,55 101,53 104,53" fill="url(#goldGrad)"/>
  <!-- 熊熊雙手前進 -->
  <ellipse cx="25" cy="55" rx="10" ry="8" fill="url(#bearGrad)" transform="rotate(-30 25 55)"/>
  <ellipse cx="95" cy="55" rx="10" ry="8" fill="url(#bearGrad)" transform="rotate(30 95 55)"/>
  <!-- 熊熊雙腳 -->
  <ellipse cx="45" cy="92" rx="10" ry="6" fill="url(#bearGrad)"/>
  <ellipse cx="75" cy="92" rx="10" ry="6" fill="url(#bearGrad)"/>
</svg>