    ========================

    v3.0 - 銀河星空背景 + 五彩泡泡邊框 + 左右導航按鈕 + 甜甜圈導航置於下方
    v3.1 - 導航按鈕美化 + SVG箭頭 + 放在下方
    v4.0 - 全新博物館體驗：館藏編號制度 + 圓形館藏徽章 + 熊熊年鑑 + 詳細頁面
    v4.1 - 加入燈箱放大功能 + 熊熊年鑑點擊可看當月館藏
    v4.2 - 今日主角支援單一/輪播模式
    v4.3 - 今日新入住顯示當日熊熊 + 年鑑按編號排序 + 熊熊名稱顯示
    v4.4 - 導航列樣式更新：棕背景白文字 + hover/active 效果調整
    v4.5 - 導航列移至頁面最上方，取代 header 成為第一順位
    v4.7 - 重新調整館藏編號：2026-06-04 → No.0002-0006, 2026-06-05 → No.0007-0011
    v4.8 - 星星按鈕+localStorage、手機漢堡選單、lazy loading、5秒自動輪播、資訊卡圓形設計、熊熊標題按鈕、金色質感紀念熊
    v5.7 - 修復「今日新入住」顯示問題、年鑑accordion改為可展開/收合、按月份/按類別按鈕改為圓角長條
    v5.8 - 移除熊熊年鑑「全部」分類按鈕（使用者不需要此功能）
    v5.11 - 今日主角：只有被點擊星星的熊熊才會出現在輪播區，開館紀念熊亦同
    v5.12 - 修復輪播按鈕無法按、重新構建DOM元素確保事件監聽正確
    v5.13 - 版本統一、加入鍵盤 / 搜尋快捷鍵
    v6.0 - Google Fonts、視覺精緻化、夜間模式、OG Tag、燈箱zoom、PWA、導航抽出
    v6.1 - 熊熊年鑑全面升級：月份+特性雙分組、Modal輪播、鍵盤/觸控導航、localStorage記憶
    v6.2 - 新增沉浸式全螈幕模式（點擊⛶按鈕進入）
    v6.12 - 熊熊年鑑系列整合：19個系列整合成11個系列（童話夢境、星際冒險、浪漫時光、勇者傳奇、溫暖家園、暖心守護等），維持20個左右系列的目标；資訊卡翻頁改為純淡入，移除縮放動畫
    v6.13 - 開館紀念熊大改造：使用MiniMax生成專屬紀念熊圖、加入星星按鈕、動態渲染、尺寸變大（140px）、金色邊框+五色泡泡光芒效果
    v6.14 - 紀念熊尺寸再加大（170px）、更深的背景遮罩、背景加金色語錄
    v6.19 - 星星按鈕優化：大小32px、位置左上、移除圓圈外框；年鑑圖示置換為自製熊熊圖示
    v6.22 - 版面緊湊化、移除深色模式、年鑑新增全部熊熊Tab、category刪除改用series
    v6.33 - 星星按鈕 UI 優化：圓形背景+邊框、backdrop-filter、毛玻璃效果、加強光暈
    v6.34 - 圖片 hover 效果優化：放大+上浮+陰影、圖片 scale+亮度+飽和度過渡
    v6.36 - 縮圖框線改造：移除彩虹糖::before，紀念熊用金色光環(D)、一般熊熊用夢幻紫粉(E)

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>熊熊博物館 v6.36</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <meta name="description" content="🐻 熊熊線上博物館 — 收藏來自 MiniMax AI 的可愛熊熊圖片，分享你的熊熊故事">
    <meta property="og:title" content="🐻 熊熊線上博物館">
    <meta property="og:description" content="來自 MiniMax AI 的可愛熊熊收藏，分享你的熊熊故事">
    <meta property="og:image" content="https://kumaweb.pages.dev/images/og-image.jpg">
    <meta property="og:url" content="https://kumaweb.pages.dev/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#5d4037">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/images/icon-192.png">
    <style>
        /* ===== CSS Variables ===== */
        :root {
            /* Colors */
            --color-bg: #fdf8f3;
            --color-primary: #5d4037;
            --color-accent: #d4a574;
            --color-card: #ffffff;
            --color-border: #d7ccc8;
            --color-text-muted: #8b7355;

            /* Multi-layer shadows (Notion-style) */
            --shadow-soft: 0 4px 18px rgba(93,64,55,0.04), 0 2px 7.8px rgba(93,64,55,0.027), 0 0.8px 2.9px rgba(93,64,55,0.02), 0 0.17px 1px rgba(93,64,55,0.01);
            --shadow-medium: 0 6px 15px rgba(93,64,55,0.08), 0 2.5px 8px rgba(93,64,55,0.05), 0 0.8px 3px rgba(93,64,55,0.03);
            --shadow-deep: 0 1px 3px rgba(93,64,55,0.01), 0 3px 7px rgba(93,64,55,0.02), 0 7px 15px rgba(93,64,55,0.04), 0 14px 28px rgba(93,64,55,0.05);
            --shadow-card: 0 4px 18px rgba(93,64,55,0.04), 0 2.025px 7.84688px rgba(93,64,55,0.027), 0 0.8px 2.925px rgba(93,64,55,0.02), 0 0.175px 1.04062px rgba(93,64,55,0.01);
            /* Thin border */
            --border-thin: 1px solid rgba(93,64,55,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', 'Inter', 'Segoe UI', 'Microsoft JhengHei', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--color-bg);
            color: var(--color-primary);
            min-height: 100vh;
            padding: 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 30px 20px;
            margin-bottom: 20px;
        }
        header h1 {
            font-size: 2rem;
            color: var(--color-primary);
            margin-bottom: 10px;
        }
        header .subtitle {
            font-size: 1rem;
            color: var(--color-text-muted);
        }

        /* Info Cards - Circular Badge Style */
        .info-cards {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255,245,235,0.8), rgba(255,228,196,0.5));
            border-radius: 16px;
            border: 1px solid rgba(212,165,116,0.3);
        }
        .info-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: transform 0.3s ease;
        }
        .info-card:hover {
            transform: translateY(-3px);
        }
        .info-card .circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a574, #c49a6c);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(93, 64, 55, 0.25), 0 2px 4px rgba(93, 64, 55, 0.15);
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            transition: box-shadow 0.3s ease;
        }
        .info-card:hover .circle {
            box-shadow: 0 6px 18px rgba(93, 64, 55, 0.35), 0 3px 6px rgba(93, 64, 55, 0.2);
        }
        .info-card .label {
            font-size: 0.8rem;
            color: #8b7355;
            text-align: center;
        }
        .info-footer {
            text-align: center;
            font-size: 0.95rem;
            color: #8b7355;
            margin-bottom: 30px;
            padding: 10px;
        }

        /* Section */
        .section {
            max-width: 800px;
            margin: 0 auto 25px;
            padding: 25px 20px;
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(255,245,235,0.3) 100%);
            border-radius: 20px;
            border: 1px solid rgba(212,165,116,0.2);
            box-shadow: 0 2px 12px rgba(93, 64, 55, 0.08);
        }
        .section-title {
            font-size: 1.25rem;
            color: #5d4037;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(212,165,116,0.25);
        }

        /* Bear Thumbnails Grid */
        .bear-grid {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* Bear Thumbnail Button */
        .bear-thumb {
            width: 90px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            transition: transform 0.3s;
            flex-shrink: 0;
            position: relative;
        }
        .bear-thumb::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            width: 78px;
            height: 78px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffb6c1, #add8e6, #e6e6fa, #ffd1a4, #98fb98);
            background-size: 300% 300%;
            z-index: 0;
            animation: bubble-border 4s ease infinite;
        }
        @keyframes bubble-border {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .bear-thumb:hover {
            transform: scale(1.12) translateY(-3px);
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.25));
        }
        .bear-thumb:hover .thumb-circle {
            box-shadow: 0 0 20px rgba(255,182,193,0.8), 0 0 35px rgba(173,216,230,0.6);
        }
        .bear-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease, filter 0.3s ease;
        }
        .bear-thumb:hover img {
            transform: scale(1.05);
            filter: brightness(1.08) saturate(1.1);
        }
        /* Star button (top-left of bear thumb) */
        .star-btn {
            position: absolute;
            top: 6px;
            left: 6px;
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 215, 0, 0.4);
            border-radius: 50%;
            color: #FFD700;
            font-size: 18px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .star-btn:hover {
            color: #FFA500;
            transform: scale(1.2);
            background: rgba(255, 215, 0, 0.2);
            border-color: #FFA500;
        }
        .star-btn.starred {
            background: rgba(255, 215, 0, 0.25);
            border-color: #FFD700;
            color: #FFD700;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.5), 0 2px 8px rgba(0, 0, 0, 0.2);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }
        .star-btn.starred:hover {
            background: rgba(255, 165, 0, 0.3);
            border-color: #FFA500;
            box-shadow: 0 0 18px rgba(255, 165, 0, 0.7), 0 2px 8px rgba(0, 0, 0, 0.3);
            transform: scale(1.25);
        }
        .star-btn.popping {
            animation: star-pop 0.3s ease;
        }
        @keyframes star-pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); box-shadow: 0 0 25px rgba(255, 165, 0, 0.9); }
            100% { transform: scale(1); }
        }
        /* 一般熊熊縮圖 - 方案E：夢幻紫粉框 */
        .bear-thumb .thumb-circle {
            width: 78px;
            height: 78px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, #e6e6fa, #ffb6c1, #ffd1a4) border-box;
            box-shadow: 
                0 0 15px rgba(230,230,250,0.6),
                0 0 30px rgba(255,182,193,0.4),
                inset 0 0 10px rgba(255,182,193,0.2);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .bear-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .bear-thumb .thumb-no {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #8b7355;
        }
        .bear-thumb .thumb-name {
            font-size: 0.75rem;
            color: #a08060;
            margin-top: 2px;
        }

        /* Featured Section */
        .featured-section {
            background: url('images/featured-bg-4.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: var(--shadow-medium);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
            color: #fff;
        }
        .featured-section > * {
            position: relative;
            z-index: 1;
        }
        .featured-section .section-title {
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }
        .featured-section .featured-quote {
            font-size: 1.1rem;
            font-style: italic;
            color: #FFD700;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            margin-top: 15px;
        }
        .featured-thumb {
            width: 260px;
            height: 320px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s;
            flex-shrink: 0;
            position: relative;
            transform: scale(1.08);
            animation: featured-glow 2s ease-in-out infinite;
        }
        .featured-thumb:hover {
            transform: scale(1.12);
            animation: none;
        }
        @keyframes featured-glow {
            0%, 100% {
                transform: scale(1.08);
                filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.6));
            }
            50% {
                transform: scale(1.10);
                filter: drop-shadow(0 0 35px rgba(255, 215, 0, 0.9));
            }
        }
        .featured-thumb .thumb-circle {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            overflow: hidden;
            border: 6px solid #FFD700;
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.8),
                0 0 40px rgba(255, 215, 0, 0.5),
                0 0 60px rgba(255, 180, 0, 0.3),
                inset 0 0 25px rgba(255, 215, 0, 0.4);
            flex-shrink: 0;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #FFD700 100%);
            background-size: 200% 200%;
            animation: gold-shimmer 3s ease infinite;
            position: relative;
        }
        @keyframes gold-shimmer {
            0%, 100% { 
                background-position: 0% 50%; 
                box-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 215, 0, 0.5), 0 0 60px rgba(255, 180, 0, 0.3), inset 0 0 25px rgba(255, 215, 0, 0.4); 
            }
            50% { 
                background-position: 100% 50%; 
                box-shadow: 0 0 30px rgba(255, 165, 0, 0.9), 0 0 50px rgba(255, 215, 0, 0.6), 0 0 80px rgba(255, 180, 0, 0.4), inset 0 0 35px rgba(255, 215, 0, 0.5); 
            }
        }
        .featured-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)) drop-shadow(0 0 30px rgba(255, 200, 100, 0.4));
        }
        .featured-thumb .thumb-no {
            margin-top: 10px;
            font-size: 1rem;
            font-weight: bold;
            color: #5d4037;
            text-shadow: 0 1px 3px rgba(255,255,255,0.8);
        }
        .thumb-name {
            font-size: 0.8rem;
            color: #a08060;
            margin-top: 2px;
        }

        /* Yearbook */
        .yearbook-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .yearbook-item {
            background: #fff;
            border: var(--border-thin);
            border-radius: 12px;
            padding: 15px 25px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s;
        }
        .yearbook-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-medium);
        }
        .yearbook-item .month {
            font-size: 0.9rem;
            color: #8b7355;
        }
        .yearbook-item .count {
            font-size: 1.3rem;
            font-weight: bold;
            color: #5d4037;
        }

        /* Yearbook Tab Switch */
        .yearbook-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .yearbook-tab {
            padding: 10px 24px;
            border: 2px solid #d4a574;
            border-radius: 25px;
            background: #fff;
            color: #5d4037;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .yearbook-tab:hover {
            background: #fdf6e3;
            transform: translateY(-2px);
        }
        .yearbook-tab.active {
            background: linear-gradient(135deg, #5d4037, #6d4c41);
            color: #fff;
            border-color: #5d4037;
            box-shadow: 0 4px 12px rgba(93, 64, 55, 0.3);
        }

        /* Yearbook Accordion */
        .yearbook-accordion {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .yearbook-section {
            text-align: center;
        }
        .yearbook-year {
            margin-bottom: 10px;
        }
        .yearbook-year-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 14px 28px;
            background: linear-gradient(135deg, #5d4037, #6d4c41);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-medium);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 320px;
            margin: 0 auto 8px;
        }
        .yearbook-year-header:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-deep);
            background: linear-gradient(135deg, #6d4c41, #7d5c51);
        }
        .yearbook-year-header .year-count {
            background: rgba(255,255,255,0.2);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
        }
        .yearbook-year-header .arrow {
            transition: transform 0.3s ease;
            font-size: 0.75rem;
        }
        .yearbook-year-header.expanded .arrow {
            transform: rotate(180deg);
        }
        .yearbook-year-items {
            display: none;
            flex-direction: column;
            gap: 8px;
            padding: 10px 0;
        }
        .yearbook-year-items.show {
            display: flex;
        }
        .yearbook-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: linear-gradient(135deg, #d4a574, #c49a6c);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s ease;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }
        .yearbook-bar:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-medium);
            background: linear-gradient(135deg, #e0b085, #d4a574);
        }
        .yearbook-bar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .yearbook-bar .bar-arrow {
            transition: transform 0.3s ease;
            font-size: 0.7rem;
        }
        .yearbook-bar.expanded .bar-arrow {
            transform: rotate(90deg);
        }
        .yearbook-bar-count {
            background: rgba(255,255,255,0.25);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
        }
        .yearbook-bar-items {
            display: none;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            max-height: 500px;
            overflow-y: auto;
        }
        .yearbook-bar-items.show {
            display: flex;
        }
        .yearbook-item {
            background: #fff;
            border-radius: 12px;
            padding: 12px 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            transition: all 0.3s;
            min-width: 120px;
        }
        .yearbook-item:hover {

        .yearbook-item .label {

        /* Yearbook v6.1 - New Structure */
        .yearbook-year {
            margin-bottom: 15px;

        .yearbook-year-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 30px;
            background: linear-gradient(135deg, #5d4037, #6d4c41);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-medium);
            transition: all 0.3s;
            width: 100%;
            max-width: 300px;
            margin: 0 auto 10px;
        }
        .yearbook-year-header:hover {

            box-shadow: var(--shadow-deep);
            background: linear-gradient(135deg, #6d4c41, #7d5c4f);

        .yearbook-year-header .arrow {
            transition: transform 0.3s ease;
            font-size: 0.8rem;
        }
        .yearbook-year-header.expanded .arrow {

        .yearbook-year-items {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.6);
            border-radius: 12px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;

        .yearbook-year-items.show {
            display: flex;
            max-height: 2000px;
            opacity: 1;

        /* Month/Category Bar */
        .yearbook-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            background: linear-gradient(135deg, #d4a574, #c49a6c);
            border: none;
            border-radius: 10px;
            color: #5d4037;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(93, 64, 55, 0.15);
            transition: all 0.3s;
            width: 100%;
            text-align: left;
        }
        .yearbook-bar:hover {
            background: linear-gradient(135deg, #c49a6c, #b8956a);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(93, 64, 55, 0.2);
        }
        .yearbook-bar .bar-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .yearbook-bar .bar-arrow {
            transition: transform 0.3s ease;
            font-size: 0.7rem;
            color: #5d4037;
        }
        .yearbook-bar.expanded .bar-arrow {
            transform: rotate(180deg);
        }
        .yearbook-bar .bar-count {
            display: inline-block;
            padding: 3px 10px;
            background: #fff;
            border: 1.5px solid #d4a574;
            border-radius: 12px;
            font-size: 0.8rem;
            color: #8b7355;
            margin-left: 8px;
        }
        .yearbook-bar-items {
            display: none;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
        }
        .yearbook-bar-items.show {
            display: flex;
            max-height: 2000px;
            opacity: 1;
        }

        /* Search Box */
        .search-box {
            max-width: 400px;
            margin: 0 auto 20px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: var(--border-thin);
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: #fff;
            color: #5d4037;
            box-sizing: border-box;
            box-shadow: var(--shadow-soft);
        }
        .search-box input:focus {
            border-color: #d4a574;
            box-shadow: var(--shadow-medium);
        }
        .search-box input::placeholder {
            color: #a08060;
        }
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(93, 64, 55, 0.2);
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .search-results.show {
            display: block;
        }
        .search-result-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0ebe3;
            transition: background 0.2s;
        }
        .search-result-item:hover {
            background: #fdf6e3;
        }
        .search-result-item:last-child {
            border-bottom: none;
        }

        /* Category Filter */
        .category-filter {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .category-btn {
            padding: 8px 16px;
            border: 2px solid #d4a574;
            border-radius: 20px;
            background: #fff;
            color: #8b7355;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .category-btn:hover {
            background: #fdf6e3;
            transform: translateY(-2px);
        }
        .category-btn.active {
            background: linear-gradient(135deg, #d4a574, #c49a6c);
            color: #fff;
            border-color: #b8956a;
            box-shadow: 0 3px 10px rgba(93, 64, 55, 0.2);
        }
        .category-badge {
            display: inline-block;

            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 600;
            margin-top: 8px;

            color: #5d4037;

        .category-badge[data-series*="星際"] { background: #e6e6fa; color: #6b5b95; }
        .category-badge[data-series*="浪漫"] { background: #ffe4e1; color: #d87093; }
        .category-badge[data-series*="勇者"] { background: #b0e0e6; color: #4682b4; }
        .category-badge[data-series*="暖心"] { background: #ffd1a4; color: #8b6914; }
        .category-badge[data-series*="溫暖"] { background: #ffe4b5; color: #8b6914; }
        .category-badge[data-series*="紀念"] { background: linear-gradient(135deg, #FFD700, #FFA500); color: #8b6914; }

        /* Carousel for featured bears */
        .carousel-container {
            position: relative;
            max-width: 400px;
            margin: 0 auto;
            overflow: hidden;
        }
        .carousel-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .carousel-slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            padding: 10px 0;
        }
        .carousel-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
        }
        .carousel-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d4c4b0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .carousel-dot.active {
            background: #d4a574;
            transform: scale(1.2);
        }
        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.5rem;
            color: #d4a574;
            cursor: pointer;
            padding: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;

        }
        .carousel-nav:hover {
            background: #d4a574;
            color: white;
        }
        .carousel-prev { left: 10px; }
        .carousel-next { right: 10px; }

        /* Bear Detail Modal */
        .bear-modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);

            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease, backdrop-filter 0.3s ease;

            backdrop-filter: blur(8px);
        }
        .bear-modal-content {

            right: 16px;
            font-size: 1.5rem;
            color: #8b7355;

            width: 28px;
            height: 28px;

            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(93, 64, 55, 0.1);
        }
        .bear-modal-close:hover {
            opacity: 1;
            background: rgba(93, 64, 55, 0.2);
        }
        .bear-modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a574, #c49a6c);
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: var(--shadow-medium);

            display: flex;
            align-items: center;

        .bear-modal-position {
            position: absolute;
            top: 12px;
            left: 16px;

            font-size: 0.8rem;
            color: #8b7355;

        .bear-modal-image {

        .bear-modal-image:hover {
            transform: scale(1.05);

        .bear-modal-image img {
            width: 100%;

        /* Yearbook Grid Modal */
        .yearbook-grid-modal {
            display: none;

        /* Yearbook Slideshow Modal */

            display: none;

            justify-content: center;

        .slideshow-lightbox {

        /* Lightbox for full image preview */

            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0);
            backdrop-filter: blur(0px);
            z-index: 99999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s ease, backdrop-filter 0.3s ease;

        function updateSlideshow() {

            slideshowIndex = (slideshowIndex - 1 + slideshowGroup.length) % slideshowGroup.length;

            slideshowIndex = (slideshowIndex + 1) % slideshowGroup.length;
            updateSlideshow();

        // Touch swipe for slideshow
        let ssTouchStartX = 0;
        let ssTouchEndX = 0;
        document.getElementById('slideshowModal').addEventListener('touchstart', e => {
            ssTouchStartX = e.changedTouches[0].screenX;
        }, { passive: true });
        document.getElementById('slideshowModal').addEventListener('touchend', e => {
            ssTouchEndX = e.changedTouches[0].screenX;
            const diff = ssTouchStartX - ssTouchEndX;
            if (Math.abs(diff) > 50) {
                diff > 0 ? nextSlideshowBear() : prevSlideshowBear();
            }
        }, { passive: true });
        // Keyboard navigation for slideshow
        document.addEventListener('keydown', e => {
            if (!document.getElementById('slideshowModal').classList.contains('active')) return;
            if (e.key === 'ArrowLeft') prevSlideshowBear();
            if (e.key === 'ArrowRight') nextSlideshowBear();
            if (e.key === 'Escape') closeSlideshow();
        });

        // Restore yearbook state from localStorage
        function restoreYearbookState() {
            const saved = localStorage.getItem('kuma_yearbook_state');
            if (!saved) return;
            try {
                const state = JSON.parse(saved);
                // Restore tab
                if (state.tab) {
                    switchYearbookTab(state.tab);
                }
                // Restore expanded years
                state.expandedYears?.forEach(year => {
                    const header = document.querySelector(`.yearbook-year-header[data-year="${year}"]`);
                    if (header) header.classList.add('expanded');
                });
                // Restore expanded bars
                state.expandedBars?.forEach(barId => {
                    const bar = document.querySelector(`.yearbook-bar[data-bar="${barId}"]`);
                    if (bar) bar.classList.add('expanded');
                });
                // Apply show class to restored items
                document.querySelectorAll('.yearbook-year-header.expanded + .yearbook-year-items').forEach(el => el.classList.add('show'));
                document.querySelectorAll('.yearbook-bar.expanded + .yearbook-bar-items').forEach(el => el.classList.add('show'));

        }

        function updateTodayBearsDisplay() {

            // 使用台北時區，避免 UTC 時差問題
            const today = new Date().toLocaleDateString('zh-TW', { timeZone: 'Asia/Taipei' }).split('/').map(x => x.padStart(2, '0')).join('-');
            // Always show ALL today's bears regardless of category filter
            let todayBearsList = bears.filter(b => b.date === today);

            document.getElementById('todayCount').textContent = '+' + starredBears.length;
            document.getElementById('totalCount').textContent = bears.length + 1;
            // Calculate museum age
            const now = new Date();
            const [openY, openM, openD] = openDate.split('-').map(Number);
            const openDateObj = new Date(openY, openM - 1, openD);
            const diffTime = now - openDateObj;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('museumAge').textContent = diffDays + '日';

            const od = openDate.split('-');
            document.getElementById('openDateFull').textContent = `${od[0]}年${parseInt(od[1])}月${parseInt(od[2])}日`;

            todayBearsList.forEach((bear) => {
                const thumb = document.createElement('div');
                thumb.className = 'bear-thumb';
                thumb.onclick = () => openBearModalByBear(bear, todayBearsList);
                thumb.innerHTML = `
                    <button class="star-btn" data-no="${bear.collectionNo}" onclick="toggleStar(${bear.collectionNo}, event)">${starredBears.includes(bear.collectionNo) ? '★' : '☆'}</button>
                    <div class="thumb-circle"><img src="${bear.img}" alt="${bear.name}" loading="lazy"></div>
                    <div class="thumb-name">${bear.name}</div>
                    <span class="category-badge" data-series="${bear.series}">${bear.series}</span>
                `;
                grid.appendChild(thumb);
            });
        }

        // Open month browser modal (moved to bottom)

        // Close month modal
        function closeMonthModal(event) {
            if (!event || event.target.classList.contains('month-modal') || 
                event.target.classList.contains('month-modal-close')) {
                document.getElementById('monthModal').classList.remove('active');
            }
        }

        // Open lightbox
        function openLightbox() {
            const imgSrc = document.getElementById('modalImg').src;
            document.getElementById('lightboxFullImg').src = imgSrc;
            document.getElementById('imageLightbox').classList.add('active');
        }

        // Close lightbox
        function closeLightbox() {
            document.getElementById('imageLightbox').classList.remove('active');
        }

        // Modal carousel state
        let currentModalGroup = [];
        let currentModalIndex = 0;

        // Toggle immersive fullscreen mode
        let isImmersive = false;
        function toggleImmersiveMode() {
            const modal = document.getElementById('bearModal');
            isImmersive = !isImmersive;
            if (isImmersive) {
                modal.classList.add('immersive');
            } else {
                modal.classList.remove('immersive');
            }
        }

        // Open bear modal by bear object
        function openBearModalByBear(bear, group = null) {
            currentModalGroup = group || [bear];
            currentModalIndex = currentModalGroup.indexOf(bear);
            updateModalBear();
            document.getElementById('bearModal').classList.add('active');
            // Prevent background scroll
            document.body.style.overflow = 'hidden';
        }

        // Update modal content from current group
        function updateModalBear() {
            const bear = currentModalGroup[currentModalIndex];
            document.getElementById('modalImg').src = bear.img;
            document.getElementById('modalName').textContent = bear.name;
            // 顯示完整館藏資料
            const title = bear.title || '';
            const series = bear.series || '';
            const collectionNo = bear.collectionNo ? 'KB-' + bear.date.replace(/-/g, '') + '-' + String(bear.collectionNo).padStart(4, '0').slice(-4) : '';
            // 計算熊齡
            function getBearAge(birthday) {
                if (!birthday) return '';
                // 使用台北時區比對日期，避免時區問題
                const today = new Date().toLocaleDateString('zh-TW', { timeZone: 'Asia/Taipei' }).split('/').map(x => x.padStart(2, '0')).join('-');
                if (birthday === today) {
                    return '0天';
                }
                const birth = new Date(birthday);
                const now = new Date();
                const diffMs = now - birth;
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                const months = Math.floor(diffDays / 30);
                const years = Math.floor(months / 12);
                const remainingMonths = months % 12;
                if (years > 0) {
                    return remainingMonths > 0 ? `${years}歲${remainingMonths}個月` : `${years}歲`;
                } else if (months > 0) {
                    return `${months}個月`;
                } else {
                    return `${diffDays}天`;
                }
            }
            const bearAge = getBearAge(bear.birthday || bear.date);
            document.getElementById('modalMeta').innerHTML = `
                ${title ? '<div class="modal-title">' + title + '</div>' : ''}
                ${series ? '<div class="modal-series">' + series + '</div>' : ''}
                <div class="modal-info-grid">
                    <span class="modal-label">館藏編號</span><span class="modal-value">No.${String(bear.collectionNo).padStart(4, '0')}</span>
                    <span class="modal-label">入住編號</span><span class="modal-value">${bear.checkIn}</span>
                    <span class="modal-label">出生日期</span><span class="modal-value">${bear.birthday || bear.date}</span>
                    <span class="modal-label">熊齡</span><span class="modal-value">${bearAge}</span>
                </div>
                ${bear.personality ? '<div class="modal-personality">' + bear.personality + '</div>' : ''}
            `;
            const quote = bear.quote || bear.desc || '';
            document.getElementById('modalQuote').textContent = '「' + quote + '」';
            document.getElementById('modalPosition').textContent = `${currentModalIndex + 1}/${currentModalGroup.length}`;

            // Hide navigation buttons when only one bear in group
            const hideNav = currentModalGroup.length === 1;
            document.getElementById('modalPrevBtn').style.display = hideNav ? 'none' : 'flex';
            document.getElementById('modalNextBtn').style.display = hideNav ? 'none' : 'flex';
        }

        // Touch swipe support for modal
        let touchStartX = 0;
        let touchEndX = 0;
        const bearModal = document.getElementById('bearModal');

        bearModal.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        }, { passive: true });

        bearModal.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const diff = touchStartX - touchEndX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    nextModalBear();
                } else {
                    prevModalBear();
                }
            }
        }

        // Navigate to previous bear in modal
        function prevModalBear() {
            currentModalIndex = (currentModalIndex - 1 + currentModalGroup.length) % currentModalGroup.length;
            updateModalBear();
        }

        // Navigate to next bear in modal
        function nextModalBear() {
            currentModalIndex = (currentModalIndex + 1) % currentModalGroup.length;
            updateModalBear();
        }

        // Close bear modal
        function closeBearModal() {
            document.getElementById('bearModal').classList.remove('active', 'immersive');
            isImmersive = false;
            document.body.style.overflow = '';
        }

        // Close bear modal from background click
        function closeBearModalFromBackground(event) {
            if (event.target.classList.contains('bear-modal')) {
                closeBearModal();
            }
        }

        // Open bear modal (legacy - redirect to new function)
        function openBearModal(index) {
            let bear;
            let group;
            if (index === 0) {
                bear = featuredBear;
                // 只有一張，傳入只有自己的群組，隱藏左右導航
                group = [featuredBear];
            } else {
                // 使用台北時區
                const today = new Date().toLocaleDateString('zh-TW', { timeZone: 'Asia/Taipei' }).split('/').map(x => x.padStart(2, '0')).join('-');
                const todayBearsList = bears.filter(b => b.date === today);
                bear = todayBearsList[index - 1] || bears[index - 1];
                group = [featuredBear, ...bears];
            }
            openBearModalByBear(bear, group);
        }

        // Close modal (legacy - redirect)
        function closeModal(event) {
            closeBearModal();
        }

        // ESC to close
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeBearModal();
            }
            // Modal left/right navigation
            if (document.getElementById('bearModal').classList.contains('active')) {
                if (e.key === 'ArrowLeft') {
                    prevModalBear();
                } else if (e.key === 'ArrowRight') {
                    nextModalBear();
                }
            }
            // / key to focus search
            if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
                const target = e.target;
                if (target.tagName !== 'INPUT' && target.tagName !== 'TEXTAREA') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            }
        });

        // Featured bears for carousel - build dynamically from starredBears + featuredBear
        function getFeaturedBearsList() {
            const starred = bears.filter(b => starredBears.includes(b.collectionNo) && b.collectionNo !== featuredBear.collectionNo);
            // Only include featuredBear if it's been starred (has a star)
            if (starredBears.includes(featuredBear.collectionNo)) {
                return [featuredBear, ...starred];
            }
            return starred;
        }

        let carouselIndex = 0;
        let carouselTotal = 0;

        let autoSlideInterval = null;

        function startAutoSlide() {
            stopAutoSlide();
            autoSlideInterval = setInterval(nextSlide, 5000);
        }

        function stopAutoSlide() {
            if (autoSlideInterval) {
                clearInterval(autoSlideInterval);
                autoSlideInterval = null;
            }
        }

        function renderFeaturedCarousel() {
            const container = document.getElementById('featuredCarousel');
            const featuredList = getFeaturedBearsList();

            // Reset carousel index when re-rendering
            carouselIndex = 0;

            // Show nothing if no bears are featured (no stars)
            if (featuredList.length === 0) {
                container.innerHTML = '';
                stopAutoSlide();
                return;
            }

            // Show single bear if only 1 featured bear
            if (featuredList.length === 1) {
                const bear = featuredList[0];
                const isOpeningBear = bear.collectionNo === featuredBear.collectionNo;
                container.innerHTML = `
                    <div class="featured-thumb" onclick="openBearModalByRef('${isOpeningBear ? 'opening' : bear.collectionNo}')" style="display: inline-flex; flex-direction: column; align-items: center; cursor: pointer; position: relative;">
                        <button class="star-btn${starredBears.includes(bear.collectionNo) ? ' starred' : ''}" data-no="${bear.collectionNo}" onclick="toggleStar(${bear.collectionNo}, event)" style="position: absolute; top: 0; right: 10px; z-index: 5;">${starredBears.includes(bear.collectionNo) ? '★' : '☆'}</button>
                        <div class="thumb-circle" style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 4px solid #d4a574; box-shadow: 0 6px 15px rgba(93, 64, 55, 0.2);">
                            <img src="${bear.img}" alt="${bear.name}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                    </div>
                `;
                stopAutoSlide();
                return;
            }

            // Multi mode - render carousel with featuredList
            carouselTotal = featuredList.length;
            
            // Clear container and rebuild
            container.innerHTML = '';
            
            const track = document.createElement('div');
            track.className = 'carousel-track';
            track.id = 'carouselTrack';
            
            const prevBtn = document.createElement('div');
            prevBtn.className = 'carousel-nav carousel-prev';
            prevBtn.id = 'carouselPrev';
            prevBtn.textContent = '❮';
            prevBtn.onclick = (e) => {
                e.stopPropagation();
                prevSlide();
            };
            
            const nextBtn = document.createElement('div');
            nextBtn.className = 'carousel-nav carousel-next';
            nextBtn.id = 'carouselNext';
            nextBtn.textContent = '❯';
            nextBtn.onclick = (e) => {
                e.stopPropagation();
                nextSlide();
            };
            
            const dots = document.createElement('div');
            dots.className = 'carousel-dots';
            dots.id = 'carouselDots';

            featuredList.forEach((bear, i) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                const isOpeningBear = bear.collectionNo === featuredBear.collectionNo;
                slide.innerHTML = `
                    <div class="featured-thumb" onclick="openBearModalByRef('${isOpeningBear ? 'opening' : bear.collectionNo}')" style="display: inline-flex; flex-direction: column; align-items: center; cursor: pointer; position: relative;">
                        <button class="star-btn${starredBears.includes(bear.collectionNo) ? ' starred' : ''}" data-no="${bear.collectionNo}" onclick="toggleStar(${bear.collectionNo}, event)" style="position: absolute; top: 0; right: 10px; z-index: 5;">${starredBears.includes(bear.collectionNo) ? '★' : '☆'}</button>
                        <div class="thumb-circle" style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; border: 4px solid #d4a574; box-shadow: 0 6px 15px rgba(93, 64, 55, 0.2);">
                            <img src="${bear.img}" alt="${bear.name}" style="width: 100%; height: 100%; object-fit: cover;">
                        </div>
                    </div>
                `;
                track.appendChild(slide);

                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => goToSlide(i);
                dots.appendChild(dot);
            });

            container.appendChild(track);
            container.appendChild(prevBtn);
            container.appendChild(nextBtn);
            container.appendChild(dots);

            // Re-attach touch swipe
            setupCarouselSwipe();

            // Start auto-slide
            startAutoSlide();
        }

        function goToSlide(index) {
            carouselIndex = index;
            const track = document.getElementById('carouselTrack');
            track.style.transform = `translateX(-${index * 100}%)`;
            document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });
        }

        function nextSlide() {
            carouselIndex = (carouselIndex + 1) % carouselTotal;
            goToSlide(carouselIndex);
        }

        function prevSlide() {
            carouselIndex = (carouselIndex - 1 + carouselTotal) % carouselTotal;
            goToSlide(carouselIndex);
        }

        // Open bear modal by reference string
        function openBearModalByRef(ref) {
            if (ref === 'opening') {
                openBearModal(0);
            } else {
                const bear = bears.find(b => b.collectionNo === parseInt(ref));
                if (bear) openBearModalByBear(bear);
            }
        }

        // Mobile nav toggle
        function toggleNav() {
            document.getElementById('mainNav').classList.toggle('expanded');
        }

        // Initialize
        renderFeaturedCarousel();
        renderTodayBears();
        renderYearbook();
        updateStarButtons();
        renderCategoryFilter();
        // Initialize display with current category filter
        if (currentCategory === '全部') {
            filterByCategory('全部');
        }

        // Search functionality
        function handleSearch(query) {
            const resultsDiv = document.getElementById('searchResults');
            if (!query || query.length < 1) {
                resultsDiv.classList.remove('show');
                return;
            }
            const lowerQuery = query.toLowerCase();
            const results = bears.filter(b =>
                String(b.collectionNo).padStart(4, '0').includes(query) ||
                b.name.toLowerCase().includes(lowerQuery) ||
                b.date.includes(query)
            );
            // Also include opening bear
            if (String(featuredBear.collectionNo).padStart(4, '0').includes(query) ||
                featuredBear.name.toLowerCase().includes(lowerQuery)) {
                results.unshift(featuredBear);
            }
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="search-result-item">找不到符合的熊熊</div>';
            } else {
                resultsDiv.innerHTML = results.map(b => `
                    <div class="search-result-item" onclick="openBearModalByRef('${b.collectionNo === featuredBear.collectionNo ? 'opening' : b.collectionNo}'); document.getElementById('searchResults').classList.remove('show'); document.getElementById('searchInput').value = '';">
                        <strong>No.${String(b.collectionNo).padStart(4, '0')}</strong> ${b.name}
                    </div>
                `).join('');
            }
            resultsDiv.classList.add('show');
        }

        // Month modal navigation
        let currentMonthBears = [];
        let currentMonthIndex = 0;

        function openMonthModal(month) {
            const [year, m] = month.split('-');
            document.getElementById('monthModalTitle').textContent = `${year}年${parseInt(m)}月 館藏`;
            
            const grid = document.getElementById('monthModalGrid');
            grid.innerHTML = '';
            
            // Filter bears by month
            currentMonthBears = bears.filter(b => b.date.substring(0, 7) === month);
            
            // Sort by collectionNo ascending
            currentMonthBears.sort((a, b) => a.collectionNo - b.collectionNo);
            
            // Add opening bear if it's the opening month
            if (month === openDate.substring(0, 7)) {
                currentMonthBears.unshift(featuredBear);
            }
            currentMonthIndex = 0;
            
            renderMonthModalContent();
            document.getElementById('monthModal').classList.add('active');
        }

        function renderMonthModalContent() {
            const grid = document.getElementById('monthModalGrid');
            grid.innerHTML = '';
            const bear = currentMonthBears[currentMonthIndex];
            if (!bear) return;
            
            const thumb = document.createElement('div');
            thumb.className = 'bear-thumb featured-month-bear';
            thumb.style.cssText = 'width: 150px; height: 180px;';
            thumb.onclick = () => { closeMonthModal(); openBearModalByRef(bear.collectionNo === featuredBear.collectionNo ? 'opening' : bear.collectionNo); };
            thumb.innerHTML = `
                <button class="star-btn" data-no="${bear.collectionNo}" onclick="toggleStar(${bear.collectionNo}, event)">${starredBears.includes(bear.collectionNo) ? '★' : '☆'}</button>
                <div class="thumb-circle" style="width: 120px; height: 120px;"><img src="${bear.img}" alt="${bear.name}" loading="lazy"></div>
                <div class="thumb-name">${bear.name}</div>
            `;
            grid.appendChild(thumb);
            
            // Update counter
            const counter = document.getElementById('monthModalCounter');
            if (counter) counter.textContent = `${currentMonthIndex + 1} / ${currentMonthBears.length}`;
            
            // Update nav buttons
            updateMonthNavButtons();
        }

        function updateMonthNavButtons() {
            const prevBtn = document.getElementById('monthModalPrev');
            const nextBtn = document.getElementById('monthModalNext');
            if (prevBtn) prevBtn.style.opacity = currentMonthIndex > 0 ? '1' : '0.3';
            if (nextBtn) nextBtn.style.opacity = currentMonthIndex < currentMonthBears.length - 1 ? '1' : '0.3';
        }

        function prevMonthBear() {
            if (currentMonthIndex > 0) {
                currentMonthIndex--;
                renderMonthModalContent();
            }
        }

        function nextMonthBear() {
            if (currentMonthIndex < currentMonthBears.length - 1) {
                currentMonthIndex++;
                renderMonthModalContent();
            }
        }

        // Keyboard navigation for month modal
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('monthModal');
            if (modal.classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevMonthBear();
                if (e.key === 'ArrowRight') nextMonthBear();
                if (e.key === 'Escape') closeMonthModal({target: document.getElementById('monthModal')});
            }
        });

        // Close search when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-box')) {
                document.getElementById('searchResults').classList.remove('show');
            }
        });

        // Touch swipe support for carousel
        function setupCarouselSwipe() {
            const carouselEl = document.getElementById('featuredCarousel');
            if (!carouselEl) return;
            let touchStartX = 0;
            let touchEndX = 0;
            carouselEl.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });
            carouselEl.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                if (touchStartX - touchEndX > 50) nextSlide();
                if (touchEndX - touchStartX > 50) prevSlide();
            }, { passive: true });
        }

        // Initialize swipe on page load
        setupCarouselSwipe();

        // Register PWA service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
