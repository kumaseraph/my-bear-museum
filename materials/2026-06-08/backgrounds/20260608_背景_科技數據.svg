<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1b263b"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#415a77" stroke-width="0.5" opacity="0.3"/>
    </pattern>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Base background -->
  <rect width="1920" height="1080" fill="url(#bgGrad2)"/>
  
  <!-- Grid pattern -->
  <rect width="1920" height="1080" fill="url(#grid)"/>
  
  <!-- Center glow -->
  <ellipse cx="960" cy="540" rx="600" ry="400" fill="url(#centerGlow)"/>
  
  <!-- Horizontal accent lines -->
  <rect x="100" y="300" width="1720" height="1" fill="url(#glowLine)" opacity="0.5"/>
  <rect x="100" y="780" width="1720" height="1" fill="url(#glowLine)" opacity="0.5"/>
  
  <!-- Side accent bars -->
  <rect x="0" y="400" width="6" height="280" fill="#00d4ff" opacity="0.6"/>
  <rect x="1914" y="400" width="6" height="280" fill="#00d4ff" opacity="0.6"/>
  
  <!-- Tech corner elements -->
  <path d="M0,0 L80,0 L80,5 L5,5 L5,80 L0,80 Z" fill="#00d4ff" opacity="0.4"/>
  <path d="M1920,0 L1840,0 L1840,5 L1915,5 L1915,80 L1920,80 Z" fill="#00d4ff" opacity="0.4"/>
  <path d="M0,1080 L80,1080 L80,1075 L5,1075 L5,1000 L0,1000 Z" fill="#00d4ff" opacity="0.4"/>
  <path d="M1920,1080 L1840,1080 L1840,1075 L1915,1075 L1915,1000 L1920,1000 Z" fill="#00d4ff" opacity="0.4"/>
  
  <!-- Decorative dots -->
  <circle cx="960" cy="540" r="8" fill="#00d4ff" opacity="0.6"/>
  <circle cx="960" cy="540" r="20" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.3"/>
  <circle cx="960" cy="540" r="40" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.2"/>
</svg>