<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 目標達成 icon - 極簡風格的達成勾選圖標 -->
  <!-- 風格：Monoline 線性風格、統一 2px 線寬 -->
  <g fill="none" stroke="#5d4037" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- 圓形靶心/目標外框 -->
    <circle cx="32" cy="32" r="26"/>
    <!-- 內圈 -->
    <circle cx="32" cy="32" r="18"/>
    <!-- 中心點 -->
    <circle cx="32" cy="32" r="6" fill="#5d4037"/>
    <!-- 達成標記 - 右上角勾選 -->
    <polyline points="42,14 50,22 60,8"/>
  </g>
</svg>